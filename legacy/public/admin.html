async function loadSignaturePanel(r) {
  const body = document.querySelector('#sign-panel-body');
  if (!body) return;

  // Cargar sociedades + apoderados sugeridos.
  let sociedades = [];
  try {
    const sr = await fetch('/api/matriz/sociedades', { credentials: 'include' });
    if (sr.ok) sociedades = await sr.json();
  } catch {}

  const currentSoc = sociedades.find((s) => s.name === r.sociedad_contratante);
  let suggested = [];
  if (currentSoc) {
    try {
      const ar = await fetch(`/api/matriz/apoderados/suggest?sociedad_id=${currentSoc.id}&tipo_proveedor=${encodeURIComponent(r.tipo_proveedor ?? '')}`, { credentials: 'include' });
      if (ar.ok) suggested = await ar.json();
    } catch {}
  }
  const persisted = Array.isArray(r.apoderados_firmantes) ? r.apoderados_firmantes : [];

  // Si hay persistidos, usar esos. Sino, los sugeridos.
  const initial = persisted.length ? persisted : suggested.map((a) => ({
    apoderado_id: a.id, name: a.name, email: a.email ?? '',
    role: a.priority === 1 ? 'siempre' : 'secundario',
    notes: a.notes ?? '',
    status: 'pending',
  }));

  window.__signSelected = initial;
  window.__signAllApoderados = []; // para el dropdown "agregar otro"
  if (currentSoc) {
    const ar2 = await fetch(`/api/matriz/apoderados?sociedad_id=${currentSoc.id}`, { credentials: 'include' });
    if (ar2.ok) window.__signAllApoderados = await ar2.json();
  }

  body.innerHTML = `
    <p style="color:var(--muted);font-size:13px;margin-bottom:18px">Confirma la sociedad + apoderados que firman. Los marcados como <b>"siempre"</b> son obligatorios según la matriz; el secundario se auto-seleccionó según el tipo de proveedor (${r.tipo_proveedor ?? '—'}). Puedes cambiarlos.</p>

    <div style="margin-bottom:16px">
      <label>Sociedad contratante</label>
      <select id="sign-sociedad-select">
        <option value="">— Elige —</option>
        ${sociedades.map((s) => `<option value="${s.id}" data-name="${s.name}" ${r.sociedad_contratante === s.name ? 'selected' : ''}>${s.name}</option>`).join('')}
      </select>
    </div>

    <div style="margin-bottom:16px">
      <label>Apoderados firmantes</label>
      <div id="sign-apoderados-list" style="display:flex;flex-direction:column;gap:8px;margin-top:8px"></div>
      <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
        <select id="sign-add-select" style="flex:1">
          <option value="">+ Agregar otro apoderado</option>
        </select>
        <button type="button" class="ghost" id="sign-add-btn" style="padding:8px 14px">Agregar</button>
      </div>
    </div>

    <div style="margin-bottom:16px">
      <label>Nota interna (opcional)</label>
      <textarea id="sign-note" rows="2" placeholder="Ej: 'Apoderado de turno: Andrés; Maria está de vacaciones'"></textarea>
    </div>

    <div id="sign-err" class="err" hidden></div>
    <div id="sign-ok" class="ok" hidden></div>

    <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">
      <button class="secondary" type="button" onclick="saveSignatureConfig('${r.id}', false)">Guardar config</button>
      <button class="primary" type="button" onclick="saveSignatureConfig('${r.id}', true)">Confirmar y enviar a SignNow →</button>
    </div>
  `;

  renderSignersList();
  refreshAddDropdown();

  document.querySelector('#sign-sociedad-select').addEventListener('change', async (e) => {
    const opt = e.target.selectedOptions[0];
    const socId = opt.value;
    const socName = opt.dataset.name;
    if (!socId) return;
    // Recargar apoderados sugeridos para la nueva sociedad.
    const ar = await fetch(`/api/matriz/apoderados/suggest?sociedad_id=${socId}&tipo_proveedor=${encodeURIComponent(r.tipo_proveedor ?? '')}`, { credentials: 'include' });
    if (ar.ok) {
      const sug = await ar.json();
      window.__signSelected = sug.map((a) => ({
        apoderado_id: a.id, name: a.name, email: a.email ?? '',
        role: a.priority === 1 ? 'siempre' : 'secundario',
        notes: a.notes ?? '',
        status: 'pending',
      }));
      renderSignersList();
    }
    const ar2 = await fetch(`/api/matriz/apoderados?sociedad_id=${socId}`, { credentials: 'include' });
    if (ar2.ok) {
      window.__signAllApoderados = await ar2.json();
      refreshAddDropdown();
    }
  });

  document.querySelector('#sign-add-btn').addEventListener('click', () => {
    const sel = document.querySelector('#sign-add-select');
    const id = sel.value;
    if (!id) return;
    const apo = window.__signAllApoderados.find((a) => a.id === id);
    if (!apo) return;
    if (window.__signSelected.find((s) => s.apoderado_id === id)) return;
    window.__signSelected.push({
      apoderado_id: apo.id, name: apo.name, email: apo.email ?? '',
      role: apo.priority === 1 ? 'siempre' : 'secundario',
      notes: apo.notes ?? '',
      status: 'pending',
    });
    sel.value = '';
    renderSignersList();
    refreshAddDropdown();
  });
}

function renderSignersList() {
  const list = document.querySelector('#sign-apoderados-list');
  if (!list) return;
  if (!window.__signSelected?.length) {
    list.innerHTML = '<div class="muted" style="font-size:12.5px;padding:10px;background:var(--surface);border-radius:8px">Sin apoderados sugeridos. Agrega uno abajo.</div>';
    return;
  }
  list.innerHTML = window.__signSelected.map((s, i) => `
    <div class="signer-row" data-idx="${i}">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <b style="font-size:13.5px">${escapeHtml(s.name)}</b>
          <span class="pill ${s.role === 'siempre' ? 'green' : 'blue'}" style="font-size:10.5px">${s.role}</span>
        </div>
        ${s.notes ? `<div class="muted" style="font-size:11.5px;margin-top:2px">${escapeHtml(s.notes)}</div>` : ''}
        <input type="email" placeholder="email apoderado@global66.com" value="${escapeHtml(s.email)}" data-idx="${i}" class="signer-email" style="margin-top:6px;font-size:12.5px;padding:6px 10px">
      </div>
      <button type="button" class="ghost signer-remove" data-idx="${i}" style="padding:4px 10px" ${s.role === 'siempre' ? 'disabled title="Apoderado obligatorio — no se puede quitar"' : ''}>×</button>
    </div>
  `).join('');
  list.querySelectorAll('.signer-email').forEach((inp) => inp.addEventListener('input', (e) => {
    window.__signSelected[Number(e.target.dataset.idx)].email = e.target.value;
  }));
  list.querySelectorAll('.signer-remove').forEach((btn) => btn.addEventListener('click', (e) => {
    if (e.currentTarget.disabled) return;
    window.__signSelected.splice(Number(e.currentTarget.dataset.idx), 1);
    renderSignersList();
    refreshAddDropdown();
  }));
}

function refreshAddDropdown() {
  const sel = document.querySelector('#sign-add-select');
  if (!sel) return;
  const taken = new Set((window.__signSelected ?? []).map((s) => s.apoderado_id));
  const available = (window.__signAllApoderados ?? []).filter((a) => !taken.has(a.id));
  sel.innerHTML = '<option value="">+ Agregar otro apoderado</option>' +
    available.map((a) => `<option value="${a.id}">${escapeHtml(a.name)}${a.scope === 'siempre' ? ' (siempre)' : ''}</option>`).join('');
}

window.saveSignatureConfig = async function (runId, sendToSignNow) {
  const sociedadOpt = document.querySelector('#sign-sociedad-select')?.selectedOptions[0];
  const sociedad = sociedadOpt?.dataset.name;
  const note = document.getElementById('sign-note').value.trim();
  const errEl = document.getElementById('sign-err');
  const okEl = document.getElementById('sign-ok');
  errEl.hidden = true; okEl.hidden = true;
  const signers = window.__signSelected ?? [];

  if (sendToSignNow) {
    if (!sociedad) { errEl.textContent = 'Sociedad requerida.'; errEl.hidden = false; return; }
    if (!signers.length) { errEl.textContent = 'Al menos 1 apoderado firmante requerido.'; errEl.hidden = false; return; }
    const missingEmails = signers.filter((s) => !s.email || !/^.+@.+\..+$/.test(s.email));
    if (missingEmails.length) { errEl.textContent = `Email faltante o inválido para: ${missingEmails.map((s) => s.name).join(', ')}`; errEl.hidden = false; return; }
  }

  try {
    const r = await fetch('/api/intake/signature-config', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        run_id: runId,
        sociedad_contratante: sociedad || undefined,
        sociedad_apoderado_email: signers[0]?.email || undefined,
        apoderados_firmantes: signers,
        note,
        send_to_signnow: !!sendToSignNow,
      }),
    });
    const result = await r.json();
    if (!r.ok) throw new Error(result.error ?? 'Error');
    okEl.innerHTML = sendToSignNow
      ? `✓ Enviado a SignNow. Document ID: <code>${result.signnow_document_id ?? '(pendiente)'}</code> — ${signers.length} firmante${signers.length > 1 ? 's' : ''}.`
      : `✓ Configuración guardada (${signers.length} apoderado${signers.length > 1 ? 's' : ''}).`;
    okEl.hidden = false;
    if (sendToSignNow) setTimeout(() => location.reload(), 1500);
  } catch (e) {
    errEl.textContent = e.message;
    errEl.hidden = false;
  }
};

function renderApprovalPanel(r) {

async function matrizPage() {
  if (!hasRole('admin')) {
    view.innerHTML = '<div class="err">Solo administradores pueden ver esta sección.</div>';
    return;
  }
  view.innerHTML = `
    <div class="header-row">
      <h2>Matriz contratos</h2>
      <span class="muted" style="font-size:13px">Sociedades · apoderados · documentos por país</span>
    </div>
    <div class="matriz-tabs">

      <button type="button" class="matriz-tab" data-tab="documentos">📄 Documentos</button>

async function renderMatrizTab(tab) {
  const body = document.querySelector('#matriz-body');
  body.innerHTML = '<div class="muted" style="padding:20px;text-align:center">Cargando…</div>';
  if (tab === 'sociedades') return renderSociedadesTab(body);
  if (tab === 'apoderados') return renderApoderadosTab(body);
  if (tab === 'documentos') return renderDocumentosTab(body);
  if (tab === 'branding') return renderBrandingTab(body);
}

    <p style="color:var(--muted);font-size:13px;margin-bottom:18px">Aparece arriba a la izquierda del sidebar. PNG/JPG/WebP/SVG, máx 2MB. Idealmente cuadrado (32×32 o más).</p>

        ${currentLogo ? `<img src="${currentLogo}" style="width:100%;height:100%;object-fit:cover" alt="Logo actual">` : '<span style="color:white;font-family:Montserrat;font-weight:800;font-size:36px">G</span>'}

    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:14px">

        <label>Link (opcional)</label>
        <input type="text" id="banner-link" placeholder="https://..." value="${escapeHtml(banner.link ?? '')}">
      </div>
      <div class="question" style="margin:0">
        <label>Color de fondo</label>
        <input type="color" id="banner-bg" value="${banner.bg_color ?? '#1F49B6'}" style="height:44px;padding:4px;cursor:pointer">
      </div>

        <label>Estado</label>
        <select id="banner-enabled">
          <option value="false" ${!banner.enabled ? 'selected' : ''}>Inactivo</option>
          <option value="true" ${banner.enabled ? 'selected' : ''}>Activo</option>
        </select>
      </div>

  const preview = document.querySelector('#banner-preview');
  document.querySelector('#banner-text').addEventListener('input', (e) => {
    previewText.textContent = e.target.value || '— sin texto —';
  });
  document.querySelector('#banner-bg').addEventListener('input', (e) => {
    preview.style.background = e.target.value;
  });
  document.querySelector('#banner-save').addEventListener('click', async () => {
    const value = {
      enabled: document.querySelector('#banner-enabled').value === 'true',
      text: document.querySelector('#banner-text').value.trim(),
      link: document.querySelector('#banner-link').value.trim(),
      bg_color: document.querySelector('#banner-bg').value,
    };
    const status = document.querySelector('#banner-status');
    status.innerHTML = '<span class="muted">Guardando…</span>';
    const r = await fetch('/api/admin/settings', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: 'banner', value }),
    });
    if (!r.ok) { status.innerHTML = `<span style="color:var(--red)">${await r.text()}</span>`; return; }
    status.innerHTML = '<span style="color:var(--green)">✓ Banner guardado</span>';
    setTimeout(() => loadBranding(), 500);
  });
}

async function renderSociedadesTab(body) {

      <h3>Sociedades (${list.length})</h3>

    <table>
      <thead><tr><th>Slug</th><th>Nombre</th><th>País</th><th>Activa</th><th></th></tr></thead>

        <td><b>${escapeHtml(s.name)}</b></td>
        <td>${escapeHtml(s.country)}</td>

    </table>
  `;
  document.querySelector('#add-soc').addEventListener('click', () => sociedadModal());

  body.querySelectorAll('.del-soc').forEach((b) => b.addEventListener('click', async (e) => {
    if (!confirm(`¿Eliminar sociedad "${e.currentTarget.dataset.name}"? Esto también borra sus apoderados y documentos.`)) return;
    const r = await fetch(`/api/admin/matriz/sociedades?id=${e.currentTarget.dataset.id}`, { method: 'DELETE', credentials: 'include' });

      <div style="margin-top:10px"><label>País *</label><input type="text" id="soc-country" value="${escapeHtml(existing?.country ?? '')}"></div>
      <div style="margin-top:10px"><label><input type="checkbox" id="soc-active" ${(existing?.active ?? true) ? 'checked' : ''}> Activa</label></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px">
        <button type="button" class="secondary" id="soc-cancel">Cancelar</button>
        <button type="button" class="primary" id="soc-save">Guardar</button>
      </div>
    </div>
  `;
  document.body.appendChild(m);
  m.querySelector('.ai-modal-backdrop').addEventListener('click', () => m.remove());
  m.querySelector('#soc-cancel').addEventListener('click', () => m.remove());
  m.querySelector('#soc-save').addEventListener('click', async () => {
    const payload = {
      slug: m.querySelector('#soc-slug').value.trim(),
      name: m.querySelector('#soc-name').value.trim(),
      country: m.querySelector('#soc-country').value.trim(),
      active: m.querySelector('#soc-active').checked,
    };
    if (!payload.name || !payload.country || (!existing && !payload.slug)) {
      alert('Slug, nombre y país son obligatorios');

    const url = existing ? `/api/admin/matriz/sociedades?id=${existing.id}` : '/api/admin/matriz/sociedades';
    const method = existing ? 'PATCH' : 'POST';
    const r = await fetch(url, { method, credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    if (!r.ok) { alert(await r.text()); return; }
    m.remove();
    renderSociedadesTab(document.querySelector('#matriz-body'));
  });
}

async function renderApoderadosTab(body) {
  const [socsR, aposR] = await Promise.all([
    fetch('/api/matriz/sociedades', { credentials: 'include' }),
    fetch('/api/matriz/apoderados', { credentials: 'include' }),
  ]);
  const socs = socsR.ok ? await socsR.json() : [];
  const apos = aposR.ok ? await aposR.json() : [];
  const socById = Object.fromEntries(socs.map((s) => [s.id, s]));

  body.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3>Apoderados (${apos.length})</h3>
      <button type="button" class="primary" id="add-apo" style="padding:8px 14px;font-size:13px">+ Nuevo apoderado</button>
    </div>
    <table>
      <thead><tr><th>Nombre</th><th>Email</th><th>Sociedad</th><th>Scope</th><th>Prio</th><th>Tipos</th><th></th></tr></thead>
      <tbody>${apos.map((a) => `<tr>
        <td><b>${escapeHtml(a.name)}</b>${a.notes ? `<div class="muted" style="font-size:11px">${escapeHtml(a.notes)}</div>` : ''}</td>
        <td class="muted" style="font-size:12px">${escapeHtml(a.email ?? '—')}</td>
        <td>${escapeHtml(socById[a.sociedad_id]?.name ?? '—')}</td>
        <td><span class="pill ${a.scope === 'siempre' ? 'green' : 'blue'}">${a.scope}</span></td>
        <td>${a.priority}</td>
        <td class="muted" style="font-size:11.5px">${(a.tipo_proveedor_match ?? []).join(', ') || '—'}</td>
        <td style="text-align:right">
          <button type="button" class="ghost edit-apo" data-row='${JSON.stringify(a)}' style="padding:4px 10px;font-size:12px">Editar</button>
          <button type="button" class="ghost del-apo" data-id="${a.id}" data-name="${escapeHtml(a.name)}" style="padding:4px 10px;font-size:12px;color:var(--red)">×</button>
        </td>
      </tr>`).join('') || '<tr><td colspan=7 class="muted" style="text-align:center;padding:24px">Sin apoderados</td></tr>'}</tbody>
    </table>
  `;
  document.querySelector('#add-apo').addEventListener('click', () => apoderadoModal(null, socs));
  body.querySelectorAll('.edit-apo').forEach((b) => b.addEventListener('click', (e) => apoderadoModal(JSON.parse(e.currentTarget.dataset.row), socs)));
  body.querySelectorAll('.del-apo').forEach((b) => b.addEventListener('click', async (e) => {
    if (!confirm(`¿Eliminar apoderado "${e.currentTarget.dataset.name}"?`)) return;
    const r = await fetch(`/api/admin/matriz/apoderados?id=${e.currentTarget.dataset.id}`, { method: 'DELETE', credentials: 'include' });
    if (!r.ok) alert(await r.text());
    renderApoderadosTab(body);
  }));
}

  body.innerHTML = `

  async function loadDocs() {

          <td><span class="pill ${d.kind === 'sign' ? 'yellow' : 'blue'}">${d.kind}</span></td>
          <td>${d.required ? '✓' : '—'}</td>
          <td class="muted">${d.valid_months ? d.valid_months + 'm' : '—'}</td>
          <td style="text-align:right">
            <button type="button" class="ghost edit-doc" data-row='${JSON.stringify(d)}' style="padding:4px 10px;font-size:12px">Editar</button>
            <button type="button" class="ghost del-doc" data-id="${d.id}" data-name="${escapeHtml(d.name)}" style="padding:4px 10px;font-size:12px;color:var(--red)">×</button>
          </td>
        </tr>`).join('') || '<tr><td colspan=6 class="muted" style="text-align:center;padding:24px">Sin documentos para esta sociedad</td></tr>'}</tbody>
      </table>
    `;
    list.querySelectorAll('.edit-doc').forEach((b) => b.addEventListener('click', (e) => docModal(JSON.parse(e.currentTarget.dataset.row), sel.value)));
    list.querySelectorAll('.del-doc').forEach((b) => b.addEventListener('click', async (e) => {
      if (!confirm(`¿Eliminar documento "${e.currentTarget.dataset.name}"?`)) return;
      const r = await fetch(`/api/admin/matriz/documents?id=${e.currentTarget.dataset.id}`, { method: 'DELETE', credentials: 'include' });
      if (!r.ok) alert(await r.text());
      loadDocs();
    }));
  }
  sel.addEventListener('change', loadDocs);
  document.querySelector('#add-doc').addEventListener('click', () => docModal(null, sel.value));
  await loadDocs();

  window.__refreshDocs = loadDocs;
}

function docModal(existing, sociedadId) {
  const m = document.createElement('div');
  m.className = 'ai-modal';
  m.innerHTML = `
    <div class="ai-modal-backdrop"></div>
    <div class="ai-modal-card">
      <h3>${existing ? 'Editar' : 'Nuevo'} documento</h3>
      <div style="margin-top:14px"><label>Nombre *</label><input type="text" id="doc-name" value="${escapeHtml(existing?.name ?? '')}"></div>
      <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
        <div><label>Tipo</label>
          <select id="doc-kind">
            <option value="base" ${(!existing || existing.kind === 'base') ? 'selected' : ''}>base</option>
            <option value="sign" ${existing?.kind === 'sign' ? 'selected' : ''}>sign (a firmar)</option>
          </select>
        </div>
        <div><label>Orden</label><input type="number" id="doc-order" value="${existing?.sort_order ?? 99}"></div>
        <div><label>Vigencia (meses)</label><input type="number" id="doc-valid" value="${existing?.valid_months ?? ''}" placeholder="opcional"></div>
      </div>
      <div style="margin-top:10px"><label><input type="checkbox" id="doc-req" ${(existing?.required ?? true) ? 'checked' : ''}> Obligatorio</label></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px">
        <button type="button" class="secondary" id="doc-cancel">Cancelar</button>
        <button type="button" class="primary" id="doc-save">Guardar</button>
      </div>
    </div>
  `;
  document.body.appendChild(m);
  m.querySelector('.ai-modal-backdrop').addEventListener('click', () => m.remove());
  m.querySelector('#doc-cancel').addEventListener('click', () => m.remove());
  m.querySelector('#doc-save').addEventListener('click', async () => {
    const payload = {
      sociedad_id: sociedadId,
      name: m.querySelector('#doc-name').value.trim(),
      kind: m.querySelector('#doc-kind').value,
      sort_order: Number(m.querySelector('#doc-order').value) || 0,
      valid_months: m.querySelector('#doc-valid').value ? Number(m.querySelector('#doc-valid').value) : null,
      required: m.querySelector('#doc-req').checked,
    };
    if (!payload.name) { alert('Nombre obligatorio'); return; }
    const url = existing ? `/api/admin/matriz/documents?id=${existing.id}` : '/api/admin/matriz/documents';
    const method = existing ? 'PATCH' : 'POST';
    const r = await fetch(url, { method, credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    if (!r.ok) { alert(await r.text()); return; }
    m.remove();
    if (window.__refreshDocs) window.__refreshDocs();
  });
}

async function authedFetch(path, opts = {}) {
  // Cookie httpOnly viaja sola. No leemos tokens del JS.
  return fetch(path, {
    ...opts,
    credentials: 'include',
    headers: { ...(opts.headers ?? {}) },
  });
}

            `).join('')}

        </div>
        <button class="primary" id="invite-btn">Invitar →</button>
      </div>
      <div id="invite-result" style="margin-top:12px"></div>

    <div class="table-card">

    });
  });

window.submitRegcheqManual = async function (runId, providerId) {
  const errEl = document.getElementById('rcq-manual-err');
  const okEl = document.getElementById('rcq-manual-ok');
  if (errEl) errEl.hidden = true;
  if (okEl) okEl.hidden = true;
  const decision = document.getElementById('rcq-decision')?.value ?? '';
  const reason = (document.getElementById('rcq-reason')?.value ?? '').trim();
  const file = document.getElementById('rcq-file')?.files?.[0] ?? null;
  if (!providerId) { errEl.textContent = 'No se pudo resolver el proveedor de esta solicitud.'; errEl.hidden = false; return; }
  if (!decision) { errEl.textContent = 'Elegí una decisión (bloquear / revisión / aprobar).'; errEl.hidden = false; return; }
  const fd = new FormData();
  fd.append('provider_id', providerId);
  fd.append('run_id', runId);
  fd.append('decision', decision);
  if (reason) fd.append('reason', reason);
  if (file) fd.append('file', file, file.name);
  try {
    const r = await fetch('/api/regcheq/manual', { method: 'POST', credentials: 'include', body: fd });
    const result = await r.json();
    if (!r.ok) throw new Error(result.error ?? 'Error');
    okEl.innerHTML = `✓ Decisión <b>${result.decision}</b> guardada${result.report_filename ? ` + informe <code>${result.report_filename}</code>` : ' (sin informe adjunto)'}.`;
    okEl.hidden = false;
    setTimeout(() => location.reload(), 1300);
  } catch (e) {
    errEl.textContent = e.message;
    errEl.hidden = false;
  }
};

window.submitApproval = async function (runId, decision) {
  const sociedad = document.getElementById('approve-sociedad').value;
  const comment = document.getElementById('approve-comment').value;
  if (decision === 'approved' && !sociedad) {
    document.getElementById('approve-err').textContent = 'Confirma la sociedad contratante antes de aprobar';
    document.getElementById('approve-err').hidden = false;
    return;
  }
  try {
    const r = await fetch('/api/intake/approve', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        run_id: runId,
        decision,
        sociedad_contratante: sociedad || undefined,
        comment,
        approver_email: window.__me?.email,
      }),
    });
    const result = await r.json();
    if (!r.ok) throw new Error(result.error ?? 'Error');
    const ok = document.getElementById('approve-ok');
    ok.innerHTML = decision === 'approved'
      ? `✓ Aprobado. ${result.provider_invited ? 'Email enviado al proveedor.' : 'Proveedor sin email.'} <a href="${result.profile_url}" target="_blank">Link perfil</a>`
      : `Decisión registrada: ${decision}`;
    ok.hidden = false;
    setTimeout(() => location.reload(), 1500);
  } catch (e) {
    document.getElementById('approve-err').textContent = e.message;
    document.getElementById('approve-err').hidden = false;
  }
};

    'Chile':           ['Global 81 SpA (Chile)', 'Global Card S.A. (Chile)'],
    'Colombia':        ['Global Colombia 81 (Colombia)'],
    'Argentina':       ['ArgPagos (Argentina)'],
    'Perú':            ['Andes Latam (Perú)'],
    'Estados Unidos':  ['100x Corp'],
    'México':          ['100x Corp'],
    'Panamá':          ['100x Corp'],
    'Brasil':          ['100x Corp'],
    'Ecuador':         ['100x Corp'],
    'Uruguay':         ['100x Corp'],
    'Otro':            ['100x Corp'],
  };
  const paisSelect = document.querySelector('#pais-select');
  const sociedadWrap = document.querySelector('#sociedad-wrap');
  const sociedadSelect = document.querySelector('#sociedad-select');
  function syncSociedad() {
    const country = paisSelect.value;
    if (!country) { sociedadWrap.hidden = true; sociedadSelect.required = false; sociedadSelect.innerHTML = '<option value="">—</option>'; return; }
    const options = SOCIEDADES_BY_COUNTRY[country] ?? ['100x Corp'];
    sociedadWrap.hidden = false;
    sociedadSelect.required = true;
    sociedadSelect.innerHTML = options.map((s) => `<option value="${s}">${s}</option>`).join('');
    // Auto-seleccionar la primera (siempre hay al menos una).
    sociedadSelect.value = options[0];
  }
  paisSelect.addEventListener('change', syncSociedad);
  window.syncSociedadGlobal = syncSociedad;

  // Autocomplete provider por RUT/Tax ID (lookup en /api/providers/lookup).
  const rutInput = document.querySelector('[name=rut]');
  let lookupBanner = null;
  function setLookupBanner(html, kind) {
    if (!lookupBanner) {
      lookupBanner = document.createElement('div');
      lookupBanner.style.cssText = 'margin-top:8px;padding:8px 12px;border-radius:8px;font-size:12.5px';
      rutInput.parentNode.appendChild(lookupBanner);
    }
    lookupBanner.innerHTML = html;
    lookupBanner.style.background = kind === 'ok' ? 'rgba(2,167,87,0.08)' : kind === 'info' ? 'rgba(31,73,182,0.08)' : 'rgba(240,180,41,0.08)';
    lookupBanner.style.color = kind === 'ok' ? '#02A757' : kind === 'info' ? '#1F49B6' : '#a8780a';
  }
  async function lookupProvider() {
    const v = rutInput.value.trim();
    if (!v) { lookupBanner?.remove(); lookupBanner = null; return; }
    setLookupBanner('Buscando…', 'info');
    try {
      const r = await fetch(`/api/providers/lookup?tax_id=${encodeURIComponent(v)}`, { credentials: 'include' });
      if (r.status === 404) { setLookupBanner('🆕 Proveedor nuevo. Completa los datos abajo.', 'info'); return; }
      if (!r.ok) { setLookupBanner('Error consulta: ' + r.status, 'warn'); return; }
      const p = await r.json();
      const pd = p.profile_data ?? {};

      const map = {
        razon_social: p.razon_social,
        pais: p.pais,
        tipo_proveedor: p.tipo_proveedor,
        representante_legal: p.representante_legal ?? pd.representante_legal,
        email_contacto: p.email_contacto ?? pd.contacto_comercial_email,
        email_facturacion: p.email_facturacion ?? pd.email_facturacion,
        proveedor_existente: 'true',
      };
      for (const [field, value] of Object.entries(map)) {
        if (value == null || value === '') continue;
        const el = document.querySelector(`[name=${field}]`);
        if (!el) continue;
        if (el.tagName === 'SELECT') {
          const opt = Array.from(el.options).find((o) => o.value === value || o.text === value);
          if (opt) el.value = opt.value;
        } else {
          el.value = value;
        }
        // Trigger change para que se actualicen los conditionals (sociedad por país, etc.).
        el.dispatchEvent(new Event('change', { bubbles: true }));
      }
      const runCount = p.run_count ?? 0;
      const profileDone = p.profile_completed_at ? 'perfil completo ✓' : 'perfil pendiente';
      setLookupBanner(
        `✓ <b>${p.razon_social}</b> ya registrado · ${runCount > 0 ? `${runCount} solicitud${runCount > 1 ? 'es' : ''} previa${runCount > 1 ? 's' : ''}` : 'sin solicitudes previas'} · ${profileDone}.<br><span style="font-size:11.5px">Campos autocompletados. Puedes editar lo que necesites — los cambios actualizan el registro del proveedor.</span>`,
        'ok'
      );
    } catch (e) {
      setLookupBanner('Error: ' + e.message, 'warn');
    }
  }
  rutInput.addEventListener('blur', lookupProvider);
  rutInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); lookupProvider(); } });

  // Auto: si soy Owner, prefill email
  document.querySelector('#owner-toggle').addEventListener('change', (e) => {
    if (e.target.value === 'true') {
      const oe = document.querySelector('[name=owner_email]');
      const se = document.querySelector('[name=solicitante_email]').value;
      if (!oe.value && se) oe.value = se;
    }
  });

  // Dropzones: registrar y mantener archivos pendientes en memoria.
  const pendingFiles = { main: null, anexo: [] };
  function wireDropzone(el) {
    const kind = el.dataset.kind;
    const input = el.querySelector('input[type=file]');
    const list = el.querySelector('.drop-list');
    el.querySelector('.drop-pick').addEventListener('click', (e) => { e.preventDefault(); input.click(); });
    ['dragenter', 'dragover'].forEach((ev) => el.addEventListener(ev, (e) => { e.preventDefault(); el.classList.add('drag'); }));
    ['dragleave', 'drop'].forEach((ev) => el.addEventListener(ev, (e) => { e.preventDefault(); el.classList.remove('drag'); }));
    el.addEventListener('drop', (e) => { input.files = e.dataTransfer.files; addFiles(input.files); });
    input.addEventListener('change', () => addFiles(input.files));

    function addFiles(fileList) {
      const arr = Array.from(fileList ?? []);
      if (!arr.length) return;
      if (kind === 'main') pendingFiles.main = arr[0];
      else pendingFiles.anexo.push(...arr);
      render();
    }
    function render() {
      const items = kind === 'main' ? (pendingFiles.main ? [pendingFiles.main] : []) : pendingFiles.anexo;
      list.innerHTML = items.map((f, i) => `
        <div class="drop-item" data-idx="${i}">
          <span class="drop-icon">${f.type.includes('pdf') ? '📕' : f.type.includes('word') || f.name.match(/\\.docx?$/) ? '📘' : '📎'}</span>
          <span class="drop-name">${f.name}</span>
          <span class="drop-size">${(f.size / 1024 / 1024).toFixed(2)} MB</span>
          <span class="drop-status" data-status="ready">listo</span>
          <button type="button" class="drop-remove" aria-label="Quitar">×</button>
        </div>
      `).join('');
      list.querySelectorAll('.drop-remove').forEach((b) => b.addEventListener('click', (e) => {
        const idx = Number(e.target.closest('.drop-item').dataset.idx);
        if (kind === 'main') pendingFiles.main = null;
        else pendingFiles.anexo.splice(idx, 1);
        render();
      }));
    }
  }
  document.querySelectorAll('#drop-main, #drop-anexos').forEach(wireDropzone);

  async function uploadOne(runId, providerId, kind, file, statusEl) {
    if (statusEl) { statusEl.dataset.status = 'uploading'; statusEl.textContent = 'subiendo…'; }
    const fd = new FormData();
    fd.append('workflow_run_id', runId);
    if (providerId) fd.append('provider_id', providerId);
    fd.append('kind', kind);
    fd.append('file', file);
    const r = await fetch('/api/files/upload', { method: 'POST', credentials: 'include', body: fd });
    if (!r.ok) {
      const err = await r.text();
      if (statusEl) { statusEl.dataset.status = 'error'; statusEl.textContent = 'error'; }
      throw new Error(err);
    }
    if (statusEl) { statusEl.dataset.status = 'done'; statusEl.textContent = '✓ subido'; }
    return r.json();
  }

  // Tally-style controller: navegación entre steps + validación + review.
  const tallySteps = Array.from(document.querySelectorAll('.tally-step'));
  const tallyTotal = tallySteps.length;
  let tallyIdx = 0;
  const tallyPrev = document.querySelector('#tally-prev');
  const tallyNext = document.querySelector('#tally-next');
  const tallySubmitBtn = document.querySelector('#submit-intake');
  const tallyFill = document.querySelector('#tally-fill');
  const tallyName = document.querySelector('#tally-step-name');
  const tallyHint = document.querySelector('#tally-step-hint');

  function tallyShow(i) {
    tallyIdx = Math.max(0, Math.min(tallyTotal - 1, i));
    tallySteps.forEach((s, k) => {
      s.hidden = k !== tallyIdx;
      if (k === tallyIdx) s.classList.add('tally-enter');
      else s.classList.remove('tally-enter');
    });
    tallyFill.style.width = `${Math.round(((tallyIdx + 1) / tallyTotal) * 100)}%`;
    tallyName.textContent = `Paso ${tallyIdx + 1} de ${tallyTotal}`;
    tallyHint.textContent = tallySteps[tallyIdx].dataset.stepName ?? '';
    tallyPrev.hidden = tallyIdx === 0;
    const isLast = tallyIdx === tallyTotal - 1;
    tallyNext.hidden = isLast;
    tallySubmitBtn.hidden = !isLast;
    if (isLast) renderTallyReview();
    setTimeout(() => {
      const firstInput = tallySteps[tallyIdx].querySelector('input:not([type=hidden]), select, textarea');
      firstInput?.focus({ preventScroll: true });
    }, 80);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function tallyValidateCurrent() {
    const step = tallySteps[tallyIdx];
    const fields = step.querySelectorAll('input, select, textarea');
    for (const f of fields) {
      if (f.closest('[hidden]')) continue;
      if (!f.checkValidity()) {
        f.reportValidity();
        f.focus();
        return false;
      }
    }
    // Paso adjuntos (4): chequear archivo principal pendiente.
    if (step.dataset.step === '4' && !pendingFiles.main) {
      document.querySelector('#intake-err').textContent = 'El borrador del contrato (archivo principal) es obligatorio.';
      document.querySelector('#intake-err').hidden = false;
      return false;
    }
    document.querySelector('#intake-err').hidden = true;
    return true;
  }

  function renderTallyReview() {
    const fd = new FormData(document.querySelector('#intake-form'));
    const data = Object.fromEntries(fd);
    const fmt = (v) => v == null || v === '' ? '<span class="muted">—</span>' : String(v).replace(/[<>&]/g, (c) => ({ '<':'&lt;', '>':'&gt;', '&':'&amp;' }[c]));
    const rows = [
      ['Solicitante', `${fmt(data.solicitante_nombre)} · ${fmt(data.solicitante_email)} · ${fmt(data.solicitante_area)}`],
      ['Owner', `${data.owner_es_solicitante === 'true' ? 'Mismo solicitante' : fmt(data.owner_nombre)} · ${fmt(data.owner_email)}`],
      ['Backup', fmt(data.responsable_backup_email)],
      ['Proveedor', `<b>${fmt(data.razon_social)}</b> · ${fmt(data.rut)} · ${fmt(data.pais)}`],
      ['Sociedad contratante', fmt(data.sociedad_contratante)],
      ['Tipo de proveedor', fmt(data.tipo_proveedor)],
      ['Representante', `${fmt(data.representante_legal)} · contacto ${fmt(data.email_contacto)}`],
      ['Servicio', fmt(data.servicio_descripcion)],
      ['Periodicidad / Monto', `${fmt(data.periodicidad)} · ${fmt(data.monto)} ${fmt(data.moneda)}`],
      ['Duración', `${fmt(data.tipo_duracion)}${data.fecha_inicio ? ` · desde ${fmt(data.fecha_inicio)}` : ''}${data.fecha_fin ? ` hasta ${fmt(data.fecha_fin)}` : ''}`],
      ['Archivos', `📄 ${pendingFiles.main?.name ?? '—'}${pendingFiles.anexo.length ? ` + ${pendingFiles.anexo.length} anexo${pendingFiles.anexo.length > 1 ? 's' : ''}` : ''}`],
    ];
    document.querySelector('#tally-review').innerHTML = rows.map(([k, v]) => `
      <div class="tally-review-row"><div class="tally-review-key">${k}</div><div class="tally-review-val">${v}</div></div>
    `).join('');
  }

  tallyPrev.addEventListener('click', () => tallyShow(tallyIdx - 1));
  tallyNext.addEventListener('click', () => {
    if (tallyValidateCurrent()) tallyShow(tallyIdx + 1);
  });

  // Enter avanza step (no en textarea).
  document.querySelector('#intake-form').addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' || e.target.tagName === 'TEXTAREA') return;
    if (tallyIdx < tallyTotal - 1) {
      e.preventDefault();
      if (tallyValidateCurrent()) tallyShow(tallyIdx + 1);
    }
  });

  tallyShow(0);

  document.querySelector('#intake-form').addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const data = Object.fromEntries(new FormData(ev.target));
    data.monto = data.monto ? Number(data.monto) : null;
    // Sanitize fechas: strings vacíos rompen DATE columns en Postgres.
    if (!data.fecha_inicio) delete data.fecha_inicio;
    if (!data.fecha_fin) delete data.fecha_fin;
    data.owner_es_solicitante = data.owner_es_solicitante === 'true';
    data.proveedor_existente = data.proveedor_existente === 'true';
    data.id = `intake-${Date.now()}`;

    if (!pendingFiles.main) {
      document.querySelector('#intake-err').textContent = 'El borrador del contrato (archivo principal) es obligatorio.';
      document.querySelector('#intake-err').hidden = false;
      return;
    }

    const btn = document.querySelector('#submit-intake');
    btn.disabled = true; btn.textContent = 'Creando solicitud…';
    document.querySelector('#intake-err').hidden = true;

    try {
      const r = await fetch('/api/intake', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const result = await r.json();
      if (!r.ok) throw new Error(result.error ?? 'Error');

      btn.textContent = 'Subiendo archivos…';

      const runId = result.run_id;
      const provId = result.provider_id;
      const statusEls = Array.from(document.querySelectorAll('.drop-status'));
      const uploads = [];
      uploads.push(uploadOne(runId, provId, 'main', pendingFiles.main, statusEls[0]));
      pendingFiles.anexo.forEach((f, i) => uploads.push(uploadOne(runId, provId, 'anexo', f, statusEls[i + 1])));
      const results = await Promise.allSettled(uploads);
      const okCount = results.filter((r) => r.status === 'fulfilled').length;
      const failed = results.filter((r) => r.status === 'rejected');

      const ok = document.querySelector('#intake-ok');
      ok.innerHTML = `
        ✓ Solicitud creada · <code>${runId.slice(0, 8)}</code><br>
        ${result.provider_new ? `📨 Email al proveedor enviado` : `📂 Proveedor reusado`}<br>
        📎 ${okCount} de ${uploads.length} archivos subidos correctamente${failed.length ? ` (${failed.length} con error)` : ''}
        <div style="margin-top:12px;display:flex;gap:8px">
          <a href="#workflows/${runId}" class="primary" style="background:var(--blue-500);color:white;padding:8px 14px;border-radius:999px;text-decoration:none;font-weight:600;font-size:13px">Ver detalle →</a>
          <button type="button" class="secondary" id="crear-otra-btn" style="padding:8px 14px;font-size:13px">Crear otra solicitud</button>
        </div>
      `;
      ok.hidden = false;
      if (failed.length) {
        document.querySelector('#intake-err').textContent = 'Errores en uploads: ' + failed.map((f) => f.reason?.message ?? 'unknown').join('; ');
        document.querySelector('#intake-err').hidden = false;
      }
      // Reset state + ocultar submit button del nav (ya no hay form activo).
      btn.disabled = false; btn.textContent = 'Crear solicitud →'; btn.hidden = true;
      tallyPrev.hidden = true; tallyNext.hidden = true;

      document.querySelector('#crear-otra-btn').addEventListener('click', () => {
        // Limpiar todo + volver al step 1.
        ev.target.reset();
        pendingFiles.main = null; pendingFiles.anexo = [];
        document.querySelectorAll('.drop-list').forEach((el) => el.innerHTML = '');
        document.querySelector('#intake-ok').hidden = true;
        document.querySelector('#intake-err').hidden = true;
        // Re-sincronizar conditionals (sociedad, fechas, owner).
        syncFechas();
        if (window.syncSociedadGlobal) window.syncSociedadGlobal();
        tallyShow(0);
      });

      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (e) {
      document.querySelector('#intake-err').textContent = e.message;
      document.querySelector('#intake-err').hidden = false;
      btn.disabled = false; btn.textContent = 'Crear solicitud →';
    }
  });
}

let pdfjsLoaded = null;
async function ensurePdfJs() {
  if (pdfjsLoaded) return pdfjsLoaded;
  pdfjsLoaded = (async () => {
    const mod = await import('https://esm.sh/pdfjs-dist@4.7.76/build/pdf.mjs');
    mod.GlobalWorkerOptions.workerSrc = 'https://esm.sh/pdfjs-dist@4.7.76/build/pdf.worker.mjs';
    return mod;
  })();
  return pdfjsLoaded;
}

let mammothLoaded = null;
async function ensureMammoth() {
  if (mammothLoaded) return mammothLoaded;
  mammothLoaded = (async () => {
    const mod = await import('https://esm.sh/mammoth@1.8.0/mammoth.browser.js');
    return mod.default ?? mod;
  })();
  return mammothLoaded;
}

async function fetchSignedUrl(fileId, { download = false } = {}) {
  const r = await fetch(`/api/files/url?id=${fileId}${download ? '&download=1' : ''}`, { credentials: 'include' });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function renderPdf(container, url) {
  const pdfjs = await ensurePdfJs();
  const doc = await pdfjs.getDocument(url).promise;
  container.innerHTML = '';
  for (let p = 1; p <= doc.numPages; p++) {
    const page = await doc.getPage(p);
    const viewport = page.getViewport({ scale: 1.4 });

    const pageWrap = document.createElement('div');
    pageWrap.className = 'pdf-page';
    pageWrap.dataset.page = p;
    pageWrap.style.width = viewport.width + 'px';
    pageWrap.style.height = viewport.height + 'px';

    const canvas = document.createElement('canvas');
    canvas.width = viewport.width; canvas.height = viewport.height;
    pageWrap.appendChild(canvas);

    const textLayer = document.createElement('div');
    textLayer.className = 'pdf-text-layer';
    pageWrap.appendChild(textLayer);

    container.appendChild(pageWrap);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

    const textContent = await page.getTextContent();
    if (pdfjs.renderTextLayer) {
      pdfjs.renderTextLayer({
        textContentSource: textContent,
        container: textLayer,
        viewport,
        textDivs: [],
      });
    }
  }
}

async function renderDocx(container, url, { editable = false } = {}) {
  const mammoth = await ensureMammoth();
  const r = await fetch(url);
  const buf = await r.arrayBuffer();
  const { value } = await mammoth.convertToHtml({ arrayBuffer: buf });
  const wrap = document.createElement('div');
  wrap.className = 'docx-render';
  if (editable) wrap.contentEditable = 'true';
  wrap.innerHTML = value;
  container.innerHTML = '';
  container.appendChild(wrap);
  return wrap;
}

window.__activeFile = null;
window.__activeRunId = null;
window.__lastSelection = null;
window.__editingDocx = false;

async function mountDocViewer(runId) {
  window.__activeRunId = runId;
  const host = document.querySelector('#doc-viewer-host');
  if (!host) return;
  const files = await fetch(`/api/files?workflow_run_id=${runId}`, { credentials: 'include' }).then((r) => r.json()).catch(() => []);
  if (!files.length) {
    host.innerHTML = '<div class="muted" style="padding:16px">Aún no hay archivos subidos para este flujo.</div>';
    return;
  }

  const sorted = files.sort((a, b) => (a.kind === 'main' ? -1 : 1));
  host.innerHTML = `
    <div class="doc-files-list">
      ${sorted.map((f) => `
        <span class="file-pill" data-id="${f.id}" data-mime="${f.mime_type}" data-name="${f.filename}" data-version="${f.version ?? 1}">
          ${f.kind === 'main' ? '⭐' : f.kind === 'anexo' ? '📎' : '📁'} ${f.filename}
          ${f.version > 1 ? `<span class="muted" style="margin-left:4px;font-size:10px;background:var(--blue-100);color:var(--blue-700);padding:1px 5px;border-radius:8px">v${f.version}</span>` : ''}
          <span class="muted" style="margin-left:6px;font-size:11px">${(f.size_bytes / 1024 / 1024).toFixed(1)}MB</span>
        </span>
      `).join('')}
    </div>
    <div class="doc-viewer-wrap">
      <div class="doc-preview">
        <div class="doc-preview-header">
          <span id="doc-active-name" style="font-weight:600">Selecciona un archivo</span>
          <span style="margin-left:auto;display:flex;gap:6px;align-items:center">
            <button type="button" id="doc-ai-edit" hidden style="padding:6px 14px;font-size:12.5px;background:linear-gradient(135deg,#1F49B6,#3F5EDF);color:white;border:none;border-radius:99px;cursor:pointer;font-weight:600">🪄 Aplicar IA</button>
            <button type="button" class="ghost" id="doc-edit-toggle" hidden>✏️ Editar</button>
            <button type="button" class="primary" id="doc-save-v2" hidden style="padding:6px 14px;font-size:12.5px">Guardar v2</button>
            <button type="button" class="ghost" id="doc-download">Descargar</button>
          </span>
        </div>
        <div class="doc-preview-body" id="doc-preview-body"><div class="muted" style="padding:16px">Click un archivo arriba para previsualizar.</div></div>
      </div>
      <div class="comments-panel" id="comments-panel">
        <div class="comments-header"><span>Comentarios</span><span class="muted" id="comments-count" style="font-size:12px"></span></div>
        <div class="comments-list" id="comments-list"><div class="muted" style="padding:16px;font-size:12.5px">Selecciona un archivo para ver el hilo.</div></div>
      </div>
    </div>
    <button type="button" id="selection-fab" class="selection-fab" hidden>💬 Comentar</button>
  `;

  async function selectFile(fileId, mime, name) {
    window.__activeFile = { id: fileId, mime, name };
    window.__editingDocx = false;
    host.querySelectorAll('.file-pill').forEach((p) => p.classList.toggle('active', p.dataset.id === fileId));
    document.querySelector('#doc-active-name').textContent = name;
    const isDocx = mime === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' || name.toLowerCase().endsWith('.docx');
    document.querySelector('#doc-edit-toggle').hidden = !isDocx;
    document.querySelector('#doc-save-v2').hidden = true;
    document.querySelector('#doc-edit-toggle').textContent = '✏️ Editar';
    // Botón AI visible para admin/aprobador en archivo principal (PDF o docx).
    const aiBtn = document.querySelector('#doc-ai-edit');
    if (aiBtn) {
      const canAi = (typeof canCommentRoles === 'function' ? canCommentRoles() : true) && (mime === 'application/pdf' || isDocx);
      aiBtn.hidden = !canAi;
      aiBtn.onclick = () => runAiEditModal(fileId, runId, (window.__currentComments ?? []).filter(c => !c.resolved).length);
    }

    const body = document.querySelector('#doc-preview-body');
    body.innerHTML = '<div class="muted" style="padding:16px">Cargando preview…</div>';
    try {
      const signed = await fetchSignedUrl(fileId, { download: false });
      window.__activeFile.signedUrl = signed.url;
      if (mime === 'application/pdf') {
        body.innerHTML = '';
        await renderPdf(body, signed.url);
      } else if (isDocx) {
        await renderDocx(body, signed.url);
      } else if (mime?.startsWith('image/')) {
        body.innerHTML = `<img src="${signed.url}" style="max-width:100%;border-radius:8px">`;
      } else {
        body.innerHTML = `<div class="muted" style="padding:16px">Preview no soportado para ${mime}. <a href="${signed.url}" target="_blank">Descargar</a></div>`;
      }
    } catch (e) {
      body.innerHTML = `<div class="err">Error: ${e.message}</div>`;
    }
    await loadComments(fileId, runId);
    setTimeout(() => paintHighlights(), 100);
  }

  document.querySelector('#doc-download').addEventListener('click', async () => {
    if (!window.__activeFile) return;
    const signed = await fetchSignedUrl(window.__activeFile.id, { download: true });
    const a = document.createElement('a'); a.href = signed.url; a.download = signed.filename ?? 'archivo'; a.click();
  });

  document.querySelector('#doc-edit-toggle').addEventListener('click', async () => {
    if (!window.__activeFile) return;
    window.__editingDocx = !window.__editingDocx;
    const btn = document.querySelector('#doc-edit-toggle');
    btn.textContent = window.__editingDocx ? '👁 Vista' : '✏️ Editar';
    document.querySelector('#doc-save-v2').hidden = !window.__editingDocx;
    const body = document.querySelector('#doc-preview-body');
    body.innerHTML = '<div class="muted" style="padding:16px">Recargando…</div>';
    await renderDocx(body, window.__activeFile.signedUrl, { editable: window.__editingDocx });
    if (window.__editingDocx) {
      body.querySelector('.docx-render')?.focus();
    }
  });

  document.querySelector('#doc-save-v2').addEventListener('click', () => saveDocxAsV2());

  // Selection floating button (PR3.2)
  document.querySelector('#doc-preview-body').addEventListener('mouseup', handleSelection);
  document.querySelector('#selection-fab').addEventListener('mousedown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    openCommentComposerWithAnchor();
  });
  document.addEventListener('mousedown', (e) => {
    if (e.target.closest('#selection-fab')) return;
    if (!document.getSelection().toString().trim()) document.querySelector('#selection-fab').hidden = true;
  });

  host.querySelectorAll('.file-pill').forEach((p) => p.addEventListener('click', () => selectFile(p.dataset.id, p.dataset.mime, p.dataset.name)));
  // Auto-select: si ?file=X en query, abrir ese; sino main; sino primero.
  const qsFileId = new URLSearchParams(location.search).get('file');
  const wanted = qsFileId ? sorted.find((f) => f.id === qsFileId) : null;
  const main = wanted ?? sorted.find((f) => f.kind === 'main') ?? sorted[0];
  if (main) selectFile(main.id, main.mime_type, main.filename);
  // Limpiar ?file de URL después de usar (no contaminar futuras navegaciones).
  if (qsFileId) {
    const url = new URL(location.href);
    url.searchParams.delete('file');
    history.replaceState(null, '', url);
  }
}

function handleSelection(e) {
  const sel = document.getSelection();
  const text = (sel?.toString() ?? '').trim();
  const fab = document.querySelector('#selection-fab');
  if (!fab) return;
  if (!text || text.length < 3 || text.length > 800) { fab.hidden = true; return; }
  if (!canCommentRoles()) { fab.hidden = true; return; }
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  // Posicionar arriba de la selección.
  fab.style.position = 'fixed';
  fab.style.top = `${Math.max(8, rect.top - 42)}px`;
  fab.style.left = `${Math.max(8, rect.left + rect.width / 2 - 60)}px`;
  fab.hidden = false;
  // Determinar página (para PDF)
  const pageEl = e.target.closest('.pdf-page');
  const page = pageEl ? Number(pageEl.dataset.page) : null;
  window.__lastSelection = { text, page };
}

function openCommentComposerWithAnchor() {
  const fab = document.querySelector('#selection-fab');
  if (!window.__lastSelection || !window.__activeFile) return;
  fab.hidden = true;
  const composer = document.querySelector('#composer-body');
  if (!composer) return;
  composer.dataset.anchorText = window.__lastSelection.text;
  if (window.__lastSelection.page) {
    const pageInput = document.querySelector('#composer-page');
    if (pageInput) pageInput.value = window.__lastSelection.page;
  }
  // Banner anchor info en composer
  const composerEl = composer.closest('.comment-composer');
  composerEl.querySelector('.anchor-banner')?.remove();
  composerEl.insertAdjacentHTML('afterbegin', `
    <div class="anchor-banner" style="background:rgba(240,180,41,0.12);border-left:3px solid var(--yellow);padding:6px 10px;border-radius:6px;font-size:12px;margin-bottom:8px">
      📌 Anclado a: "<i>${escapeHtml(window.__lastSelection.text.slice(0, 80))}${window.__lastSelection.text.length > 80 ? '…' : ''}</i>"
      <button type="button" style="float:right;background:none;border:none;color:var(--muted);cursor:pointer">×</button>
    </div>
  `);
  composerEl.querySelector('.anchor-banner button').addEventListener('click', (e) => {
    e.target.closest('.anchor-banner').remove();
    delete composer.dataset.anchorText;
  });

}

function paintHighlights() {
  if (!window.__currentComments?.length) return;
  const body = document.querySelector('#doc-preview-body');
  if (!body) return;
  const anchored = window.__currentComments.filter((c) => c.anchor_text);
  if (!anchored.length) return;
  // Simple text-search + wrap. Idempotent (skip si ya wrapeado).
  for (const c of anchored) {
    const needle = c.anchor_text.trim();
    if (needle.length < 3) continue;
    wrapTextOccurrences(body, needle, c);
  }
}

function wrapTextOccurrences(root, needle, comment) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      if (node.parentElement?.closest('.anchor-highlight')) return NodeFilter.FILTER_REJECT;
      return node.textContent.includes(needle) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
    },
  });
  const matches = [];
  while (walker.nextNode()) matches.push(walker.currentNode);
  for (const n of matches) {
    const idx = n.textContent.indexOf(needle);
    if (idx < 0) continue;
    const after = n.splitText(idx);
    after.splitText(needle.length);
    const span = document.createElement('span');
    span.className = 'anchor-highlight';
    span.dataset.commentId = comment.id;
    span.title = `${comment.author_email}: ${comment.body.slice(0, 80)}`;
    span.textContent = after.textContent;
    after.replaceWith(span);
    span.addEventListener('click', () => {
      document.querySelector(`[data-comment="${comment.id}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      document.querySelector(`[data-comment="${comment.id}"]`)?.classList.add('flash');
      setTimeout(() => document.querySelector(`[data-comment="${comment.id}"]`)?.classList.remove('flash'), 1500);
    });
  }
}

async function saveDocxAsV2() {
  if (!window.__activeFile) return;
  const wrap = document.querySelector('#doc-preview-body .docx-render');
  if (!wrap) { alert('No hay docx editable. Activa modo Editar primero.'); return; }
  const btn = document.querySelector('#doc-save-v2');
  btn.disabled = true; btn.textContent = 'Generando .docx…';
  try {
    if (!window.htmlDocx) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://unpkg.com/html-docx-js/dist/html-docx.js';
        s.onload = res;
        s.onerror = () => rej(new Error('No se pudo cargar html-docx-js (CDN bloqueado?)'));
        document.head.appendChild(s);
      });
    }
    const fullHtml = `<!doctype html><html><head><meta charset="utf-8"><style>body{font-family:Arial,sans-serif;font-size:11pt}p{margin:6pt 0}h1,h2,h3{font-family:Arial,sans-serif}</style></head><body>${wrap.innerHTML}</body></html>`;
    const blob = window.htmlDocx.asBlob(fullHtml);
    if (!blob || blob.size < 100) throw new Error('html-docx-js devolvió blob vacío');

    btn.textContent = 'Subiendo…';
    const fd = new FormData();
    fd.append('workflow_run_id', window.__activeRunId);
    fd.append('kind', 'main');
    fd.append('previous_version_id', window.__activeFile.id);
    const baseName = (window.__activeFile.name ?? 'contrato.docx').replace(/\.docx$/i, '');
    const ts = new Date().toISOString().slice(0, 10);
    const newName = `${baseName}_editado_${ts}.docx`;
    fd.append('file', new File([blob], newName, { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' }));
    const r = await fetch('/api/files/upload', { method: 'POST', credentials: 'include', body: fd });
    const responseText = await r.text();
    if (!r.ok) throw new Error(`upload ${r.status}: ${responseText}`);
    let saved;
    try { saved = JSON.parse(responseText); } catch { throw new Error('Server devolvió JSON inválido: ' + responseText.slice(0, 200)); }
    if (!saved.id) throw new Error('Server no devolvió file id. Response: ' + responseText.slice(0, 200));

    btn.textContent = `✓ v${saved.version ?? '2'} guardado`;
    setTimeout(() => mountDocViewer(window.__activeRunId), 1000);
  } catch (e) {
    console.error('[saveDocxAsV2]', e);
    alert('Error guardar v2: ' + e.message);
    btn.disabled = false; btn.textContent = 'Guardar v2';
  }
}

const canCommentRoles = () => hasRole('admin') || hasRole('aprobador');

async function loadComments(fileId, runId) {
  const listEl = document.querySelector('#comments-list');
  const countEl = document.querySelector('#comments-count');
  listEl.innerHTML = '<div class="muted" style="padding:16px;font-size:12.5px">Cargando…</div>';
  const r = await fetch(`/api/comments?file_id=${fileId}`, { credentials: 'include' });
  if (!r.ok) { listEl.innerHTML = `<div class="err">${await r.text()}</div>`; return; }
  const comments = await r.json();
  const pending = comments.filter((c) => !c.resolved);
  countEl.textContent = comments.length ? `${comments.length} comentarios${pending.length !== comments.length ? ` · ${pending.length} pendientes` : ''}` : '';
  window.__currentComments = comments;
  renderAiButton(fileId, runId, pending.length);
  if (!comments.length) {
    listEl.innerHTML = '<div class="muted" style="padding:16px;font-size:12.5px">Aún sin comentarios. Inicia el hilo abajo.</div>';
  } else {
    const meEmail = window.__me?.email;
    listEl.innerHTML = comments.map((c) => {
      const avatar = c.author_avatar_url
        ? `<div class="comment-avatar"><img src="${c.author_avatar_url}" alt=""></div>`
        : `<div class="comment-avatar">${(c.author_email[0] ?? '?').toUpperCase()}</div>`;
      const displayName = c.author_display_name ?? c.author_email.split('@')[0].replace(/\./g, ' ');
      return `
      <div class="comment ${c.author_email === meEmail ? 'is-mine' : ''}" data-comment="${c.id}">
        <div class="comment-meta">
          ${avatar}
          <span class="comment-author" title="${c.author_email}">${escapeHtml(displayName)}</span>
          ${c.page_number ? `<span class="comment-page">p.${c.page_number}</span>` : ''}
          ${c.resolved ? '<span class="pill green" style="font-size:10px">resuelto</span>' : ''}
          <span class="ts" style="margin-left:auto">${dt(c.created_at)}</span>
        </div>
        ${c.anchor_text ? `<div class="anchor-quote">📌 "${escapeHtml(c.anchor_text.slice(0, 100))}${c.anchor_text.length > 100 ? '…' : ''}"</div>` : ''}
        <div class="comment-body">${highlightMentions(escapeHtml(c.body))}</div>
      </div>
    `;
    }).join('');
  }
  renderComposer(fileId, runId);
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function highlightMentions(html) {
  return html.replace(/@([a-z0-9._-]+@[a-z0-9.-]+\.[a-z]{2,})/gi, '<span class="mention">@$1</span>');
}

function wireMentionAutocomplete(textarea) {
  let popup = null; let focusIdx = 0; let items = [];

  function close() { popup?.remove(); popup = null; items = []; focusIdx = 0; }
  async function showAt(query) {
    const r = await fetch(`/api/users/mentions?q=${encodeURIComponent(query)}`, { credentials: 'include' });
    items = r.ok ? await r.json() : [];
    if (!items.length) { close(); return; }
    if (!popup) {
      popup = document.createElement('div');
      popup.className = 'mention-popup';
      textarea.closest('.comment-composer').appendChild(popup);
    }
    popup.innerHTML = items.map((u, i) => {
      const av = u.avatar_url
        ? `<div class="mention-avatar"><img src="${u.avatar_url}"></div>`
        : `<div class="mention-avatar">${(u.email[0] ?? '?').toUpperCase()}</div>`;
      return `
      <div class="mention-item ${i === focusIdx ? 'focus' : ''}" data-email="${u.email}">
        ${av}
        <span>${escapeHtml(u.display_name ?? u.email.split('@')[0])}</span>
        <span class="mention-roles">${(u.roles ?? []).join(', ')}</span>
      </div>
    `;
    }).join('');
    popup.querySelectorAll('.mention-item').forEach((el, i) => el.addEventListener('click', () => insert(items[i].email)));
  }

  function insert(email) {
    const v = textarea.value;
    const caret = textarea.selectionStart;
    const before = v.slice(0, caret);
    const after = v.slice(caret);
    const m = before.match(/@[^\s@]*$/);
    const start = m ? caret - m[0].length : caret;
    textarea.value = v.slice(0, start) + `@${email} ` + after;
    textarea.focus();
    const pos = start + email.length + 2;
    textarea.setSelectionRange(pos, pos);
    close();
  }

  textarea.addEventListener('input', () => {
    const caret = textarea.selectionStart;
    const before = textarea.value.slice(0, caret);
    const m = before.match(/@([^\s@]*)$/);
    if (m) showAt(m[1]);
    else close();
  });
  textarea.addEventListener('keydown', (e) => {
    if (!popup) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); focusIdx = Math.min(items.length - 1, focusIdx + 1); showAt(''); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); focusIdx = Math.max(0, focusIdx - 1); showAt(''); }
    else if (e.key === 'Enter' && items[focusIdx]) { e.preventDefault(); insert(items[focusIdx].email); }
    else if (e.key === 'Escape') close();
  });
  textarea.addEventListener('blur', () => setTimeout(close, 200));
}

async function refreshNotifBadge() {
  if (!window.__me) return;

    const { items, unread_count } = await r.json();
    window.__notifications = items;

    const trig = document.querySelector('#profile-trigger');

          dot = document.createElement('span');

          trig.querySelector('.avatar-wrap')?.appendChild(dot);

    const cnt = document.querySelector('#pp-notif-count');
    if (cnt) cnt.textContent = unread_count > 0 ? String(unread_count) : '';
  } catch {}
}

function toggleNotifPopup() {
  let pop = document.querySelector('#notif-popup');
  if (pop) { pop.remove(); return; }
  const items = window.__notifications ?? [];
  pop = document.createElement('div');
  pop.id = 'notif-popup';
  pop.className = 'notif-popup';
  pop.innerHTML = `
    <div class="notif-popup-header">
      <span>Notificaciones</span>
      <button type="button" class="ghost" id="notif-mark-all" style="padding:2px 8px;font-size:11px">Marcar leídas</button>
    </div>
    <div class="notif-popup-list">
      ${items.length ? items.map((n) => `
        <div class="notif-item ${n.read_at ? '' : 'unread'}" data-id="${n.id}" data-run="${n.workflow_run_id ?? ''}" data-file="${n.payload?.file_id ?? ''}">
          <div><span class="notif-author">${n.payload?.author ?? '—'}</span> te mencionó${n.payload?.page ? ` · p.${n.payload.page}` : ''}</div>
          <div class="muted" style="font-size:12px;margin-top:2px">${(n.payload?.body ?? '').slice(0, 100)}</div>
          <div class="notif-time">${dt(n.created_at)}</div>
        </div>
      `).join('') : '<div class="muted" style="padding:20px;text-align:center;font-size:12.5px">Sin notificaciones</div>'}
    </div>
  `;
  document.body.appendChild(pop);
  pop.querySelector('#notif-mark-all').addEventListener('click', async () => {
    await fetch('/api/notifications/read', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ all: true }),
    });
    pop.remove();
    refreshNotifBadge();
  });
  pop.querySelectorAll('.notif-item').forEach((el) => el.addEventListener('click', async () => {
    await fetch('/api/notifications/read', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids: [el.dataset.id] }),
    });
    const runId = el.dataset.run; const fileId = el.dataset.file;
    if (runId) {
      if (fileId) {
        // Setear ?file= en query antes del hash y navegar.
        const url = new URL(location.href);
        url.searchParams.set('file', fileId);
        url.hash = `workflows/${runId}`;
        history.pushState(null, '', url);
        window.dispatchEvent(new HashChangeEvent('hashchange'));
      } else {
        location.hash = `workflows/${runId}`;
      }
    } else {
      location.hash = 'dashboard';
    }
    pop.remove();
    refreshNotifBadge();
  }));
}

// Init: chequear sesión via cookie, montar bell, poll notif cada 60s.
checkAuth().then(() => {
  if (window.__me) {
    refreshNotifBadge();
    setInterval(refreshNotifBadge, 60000);
  }
});
</script>

     Carga React+Agentation desde esm.sh ESM CDN.
     Disable: agregar ?agentation=0 a URL. -->
<script type="module">
(async () => {
  if (location.search.includes('agentation=0')) return;
  try {
    const [{ default: React }, ReactDOM, mod] = await Promise.all([
      import('https://esm.sh/react@18'),
      import('https://esm.sh/react-dom@18/client'),
      import('https://esm.sh/agentation'),
    ]);
    const Agentation = mod.Agentation ?? mod.default;
    if (!Agentation) throw new Error('Agentation export not found');
    const host = document.createElement('div');
    host.id = 'agentation-root';
    host.dataset.devOnly = '1';
    document.body.appendChild(host);
    ReactDOM.createRoot(host).render(React.createElement(Agentation));
    console.info('[agentation] mounted (dev, hostname=%s)', location.hostname);
  } catch (err) {
    console.warn('[agentation] failed to load:', err);
  }
})();
</script>
