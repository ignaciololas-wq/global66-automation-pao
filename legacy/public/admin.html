<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Global66 — Plataforma Contratos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/themes/airbnb.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13"></script>
<script src="https://npmcdn.com/flatpickr@4.6.13/dist/l10n/es.js"></script>
<style>
  :root {
    --blue-50:  #f5f7fe;
    --blue-100: #E9EDF8;
    --blue-200: #9ba9d0;
    --blue-400: #3F5EDF;
    --blue-500: #1F49B6;
    --blue-600: #003eea;
    --blue-700: #102a97;
    --blue-800: #0b1f4b;
    --blue-900: #132046;
    --green:    #02A757;
    --mint:     #33d9b2;
    --red:      #e64a4a;
    --yellow:   #f0b429;
    --text:     #132046;
    --muted:    #565656;
    --bg:       #ffffff;
    --surface:  #f5f7fe;
    --border:   #E9EDF8;
    --shadow-sm: 0 1px 2px rgba(19,32,70,0.04);
    --shadow:    0 1px 3px rgba(19,32,70,0.04), 0 8px 24px rgba(19,32,70,0.06);
    --shadow-lg: 0 4px 12px rgba(19,32,70,0.08), 0 20px 60px rgba(19,32,70,0.12);
    --radius:    14px;
    --radius-sm: 8px;
    --radius-pill: 999px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0 }
  html, body { background: var(--bg); color: var(--text); font: 14px/1.55 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; -webkit-font-smoothing: antialiased }
  h1, h2, h3, h4 { font-family: 'Montserrat', sans-serif; font-weight: 700; letter-spacing: -0.01em }
  h1 { font-size: 22px }
  h2 { font-size: 28px; letter-spacing: -0.02em }
  h3 { font-size: 16px }
  a { color: var(--blue-500); text-decoration: none }
  a:hover { color: var(--blue-600) }
  button { font-family: inherit; cursor: pointer }
  input, select, textarea { font-family: inherit }

  /* ─── Layout ─────────────────────────────────────────── */
  /* .shell rule overridden below — line ~132 */
  .shell.sidebar-collapsed { grid-template-columns: 0 minmax(0, 1fr) }
  .shell.sidebar-collapsed aside { transform: translateX(-100%); pointer-events: none }
  aside { transition: transform .25s ease }
  /* Handle pegado al borde del sidebar (tab-style, no flotante). */
  .sidebar-toggle { display: none }
  body.logged-in .sidebar-toggle {
    position: fixed; top: 50%; transform: translateY(-50%);
    z-index: 150;
    width: 22px; height: 64px;
    background: var(--blue-900); color: rgba(255,255,255,0.75);
    border: 1px solid rgba(255,255,255,0.08);
    border-left: none;
    border-radius: 0 10px 10px 0;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 4px 0 12px rgba(0,0,0,0.12);
    left: 240px; padding: 0;
    transition: left .25s ease, background .15s ease, color .15s ease;
  }
  .sidebar-toggle:hover { background: var(--blue-800); color: white }
  body.sidebar-collapsed .sidebar-toggle { left: 0 }
  .sidebar-toggle svg { width: 14px; height: 14px; transition: transform .25s ease }
  body:not(.sidebar-collapsed) .sidebar-toggle svg { transform: rotate(180deg) }
  aside {
    background: var(--blue-900); color: white;
    padding: 24px 16px; display: flex; flex-direction: column; gap: 4px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .logo { display: flex; align-items: center; gap: 10px; padding: 8px 12px 28px; }
  .logo-mark {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--blue-400), var(--mint));
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: white; font-family: 'Montserrat'; font-size: 18px;
  }
  .logo-text { font-family: 'Montserrat'; font-weight: 800; font-size: 15px; letter-spacing: -0.02em; line-height: 1.1 }
  .logo-text small { display: block; color: var(--blue-200); font-weight: 500; font-size: 11px; letter-spacing: 0 }
  #brand-logo-img { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; display: block }

  nav a {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: var(--radius-sm);
    color: rgba(255,255,255,0.7); font-weight: 500; font-size: 13.5px;
    transition: all .15s ease;
  }
  nav a:hover { background: rgba(255,255,255,0.06); color: white }
  nav a.active { background: var(--blue-500); color: white; box-shadow: 0 4px 12px rgba(31,73,182,0.4) }
  nav a svg { width: 18px; height: 18px; opacity: 0.85 }

  .nav-section { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--blue-200); padding: 16px 12px 6px; font-weight: 600 }

  .nav-bottom {
    margin-top: auto; padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 12px; color: var(--blue-200);
    display: flex; flex-direction: column; gap: 8px;
  }
  .profile-trigger {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    color: white; cursor: pointer; font: inherit; box-sizing: border-box;
    transition: background .15s ease, border-color .15s ease;
  }
  .profile-trigger:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.15) }
  .profile-trigger.open { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2) }
  .profile-info { display: flex; flex-direction: column; align-items: flex-start; min-width: 0; flex: 1; text-align: left; gap: 2px }
  .profile-name { font-size: 13.5px; font-weight: 600; color: white; max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2 }
  .profile-role {
    font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--mint); background: rgba(51,217,178,0.12);
    padding: 2px 8px; border-radius: 99px; line-height: 1.4;
  }
  .profile-chevron { color: var(--blue-200); flex-shrink: 0; transition: transform .2s ease }
  .profile-trigger.open .profile-chevron { transform: rotate(180deg) }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue-400), var(--mint));
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 14px; font-family: 'Montserrat';
    flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .avatar-wrap { position: relative; width: 36px; height: 36px; flex-shrink: 0 }
  .profile-unread-dot { position: absolute; top: -2px; right: -2px; width: 12px; height: 12px; background: var(--red); border-radius: 50%; border: 2px solid var(--blue-900); box-shadow: 0 0 0 1px rgba(255,255,255,0.1) }
  .avatar-img {
    width: 36px; height: 36px; border-radius: 50%; object-fit: cover; display: block;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  /* Profile popup (ChatGPT-style) */
  .profile-popup {
    position: fixed; bottom: 70px; left: 16px; width: 248px;
    background: var(--blue-900); color: white;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    padding: 6px; z-index: 200;
    animation: profile-fade .15s ease-out both;
  }
  @keyframes profile-fade { 0% { opacity: 0; transform: translateY(6px) } 100% { opacity: 1; transform: translateY(0) } }
  .profile-popup-header {
    padding: 10px 12px; font-size: 12px; color: var(--blue-200);
    border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 4px;
    word-break: break-all;
  }
  .profile-popup .item {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 8px 12px;
    background: transparent; border: none;
    color: white; font: 13px/1 inherit; cursor: pointer;
    border-radius: 8px; text-align: left;
    transition: background .12s ease;
  }
  .profile-popup .item:hover { background: rgba(255,255,255,0.08) }
  .profile-popup .item svg { width: 16px; height: 16px; opacity: 0.7; flex-shrink: 0 }
  .profile-popup .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 4px 6px }
  .profile-popup .item.danger { color: #ff8a8a }
  .profile-popup .item.danger:hover { background: rgba(230,74,74,0.15) }
  .comment-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; background: var(--blue-500); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 12px; font-family: 'Montserrat'; overflow: hidden }
  .comment-avatar img { width: 100%; height: 100%; object-fit: cover; display: block }
  .mention-avatar { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; background: var(--blue-100); color: var(--blue-700); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 11px; overflow: hidden }
  .mention-avatar img { width: 100%; height: 100%; object-fit: cover; display: block }
  .nav-bottom button { width: 100%; margin-top: 8px; background: transparent; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); padding: 8px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500 }
  .nav-bottom button:hover { background: rgba(255,255,255,0.06); color: white }

  main { padding: 32px 40px; width: 100%; max-width: none; min-width: 0; overflow-x: hidden }
  .shell { display: grid; grid-template-columns: 240px minmax(0, 1fr); min-height: 100vh; width: 100% }

  /* ─── Login ─────────────────────────────────────────── */
  .login-shell { min-height: 100vh; display: grid; place-items: center; background: linear-gradient(135deg, var(--blue-50), white) }
  .login-card {
    background: white; padding: 40px; border-radius: 20px;
    box-shadow: var(--shadow-lg); width: 100%; max-width: 420px;
    text-align: center;
  }
  .login-card .logo { justify-content: center; padding: 0 0 20px }
  .login-card h1 { margin-bottom: 8px }
  .login-card > p { color: var(--muted); margin-bottom: 28px; font-size: 14px }
  .login-card form { display: flex; flex-direction: column; gap: 12px; text-align: left }

  /* ─── Forms ─────────────────────────────────────────── */
  input[type=text],input[type=email],input[type=password],input[type=search],select,textarea {
    background: white; color: var(--text);
    border: 1.5px solid var(--border); padding: 11px 14px;
    border-radius: var(--radius-sm); font-size: 14px;
    transition: all .15s ease; width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--blue-500); box-shadow: 0 0 0 4px rgba(31,73,182,0.08) }
  label { font-size: 12.5px; font-weight: 500; color: var(--muted); margin-bottom: 4px; display: block }

  button.primary {
    background: var(--blue-500); color: white; border: none;
    padding: 11px 22px; border-radius: var(--radius-pill);
    font-weight: 600; font-size: 14px; letter-spacing: -0.01em;
    transition: all .15s ease;
    box-shadow: 0 2px 6px rgba(31,73,182,0.25);
  }
  button.primary:hover { background: var(--blue-600); box-shadow: 0 4px 14px rgba(31,73,182,0.35); transform: translateY(-1px) }
  button.secondary {
    background: white; color: var(--blue-500);
    border: 1.5px solid var(--blue-100);
    padding: 11px 22px; border-radius: var(--radius-pill);
    font-weight: 600; font-size: 14px;
  }
  button.secondary:hover { border-color: var(--blue-500); background: var(--blue-50) }
  button.ghost { background: transparent; color: var(--muted); border: none; padding: 8px 12px; border-radius: var(--radius-sm); font-weight: 500; font-size: 13px }
  button.ghost:hover { color: var(--text); background: var(--surface) }

  /* ─── Stepper ───────────────────────────────────────── */
  .stepper { display: flex; gap: 0; margin: 8px 0 24px; align-items: stretch; flex-wrap: wrap }
  .step { flex: 1; min-width: 130px; display: flex; flex-direction: column; align-items: center; padding: 14px 8px; position: relative; background: white; border: 1px solid var(--border); border-radius: var(--radius); margin-right: -1px }
  .step:first-child { border-radius: var(--radius) 0 0 var(--radius) }
  .step:last-child { border-radius: 0 var(--radius) var(--radius) 0; margin-right: 0 }
  .step .num { width: 30px; height: 30px; border-radius: 50%; background: var(--blue-100); color: var(--blue-700); display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: 'Montserrat'; font-size: 13px; margin-bottom: 6px }
  .step .label { font-size: 12px; font-weight: 600; text-align: center; color: var(--text) }
  .step .who { font-size: 10px; color: var(--muted); margin-top: 3px; text-align: center }
  .step.done { background: var(--blue-50); border-color: var(--blue-200) }
  .step.done .num { background: var(--green); color: white }
  .step.active { background: white; border-color: var(--blue-500); border-width: 2px; box-shadow: 0 4px 14px rgba(31,73,182,0.15) }
  .step.active .num { background: var(--blue-500); color: white; box-shadow: 0 0 0 4px rgba(31,73,182,0.15) }
  .step.rejected { background: rgba(230,74,74,0.05); border-color: var(--red) }
  .step.rejected .num { background: var(--red); color: white }

  /* ─── Cards ─────────────────────────────────────────── */
  .grid { display: grid; gap: 16px; margin-bottom: 24px }
  .grid-4 { grid-template-columns: repeat(auto-fit, minmax(220px,1fr)) }
  .grid-2 { grid-template-columns: repeat(auto-fit, minmax(360px,1fr)) }

  .card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow-sm); transition: box-shadow .2s ease }
  .card.lift:hover { box-shadow: var(--shadow) }
  .stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 600; margin-bottom: 8px }
  .stat-num { font-family: 'Montserrat'; font-size: 32px; font-weight: 700; line-height: 1; letter-spacing: -0.025em; color: var(--blue-800) }
  .stat-num small { font-size: 14px; color: var(--muted); font-weight: 500; margin-left: 6px; letter-spacing: 0 }
  .stat-delta { color: var(--green); font-size: 12px; margin-top: 8px; font-weight: 500 }

  /* ─── Tables ────────────────────────────────────────── */
  .table-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm) }
  table { width: 100%; border-collapse: collapse; font-size: 13px }
  th, td { text-align: left; padding: 14px 18px; border-bottom: 1px solid var(--border) }
  th { background: var(--surface); color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em }
  tr:last-child td { border-bottom: none }
  tr.clickable { cursor: pointer; transition: background .12s ease }
  tr.clickable:hover td { background: var(--blue-50) }
  td.muted { color: var(--muted) }
  td.right { text-align: right; font-variant-numeric: tabular-nums }

  /* ─── Pills ─────────────────────────────────────────── */
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: var(--radius-pill); font-size: 12px; font-weight: 600; line-height: 1.6 }
  .pill.green  { background: rgba(2,167,87,0.1);   color: var(--green) }
  .pill.yellow { background: rgba(240,180,41,0.12); color: #a8780a }
  .pill.red    { background: rgba(230,74,74,0.1);  color: var(--red) }
  .pill.blue   { background: var(--blue-100);       color: var(--blue-700) }
  .pill.gray   { background: #f0f2f6;               color: var(--muted) }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor }

  /* ─── Misc ──────────────────────────────────────────── */
  .toolbar { display: flex; gap: 12px; margin-bottom: 18px; align-items: center; flex-wrap: wrap }
  .toolbar input, .toolbar select { max-width: 320px }
  .breadcrumb { color: var(--muted); font-size: 13px; margin-bottom: 8px }
  .breadcrumb a { color: var(--muted) }
  .breadcrumb a:hover { color: var(--blue-500) }
  .header-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap }

  .timeline { list-style: none; border-left: 2px solid var(--border); padding-left: 24px; margin-left: 4px }
  .timeline li { position: relative; padding: 10px 0; font-size: 13px }
  .timeline li::before { content: ''; position: absolute; left: -31px; top: 16px; width: 12px; height: 12px; border-radius: 50%; background: var(--blue-500); border: 2px solid white; box-shadow: 0 0 0 1px var(--blue-100) }
  .timeline .ts { color: var(--muted); font-size: 11px; margin-top: 2px; display: block }

  dl.props { display: grid; grid-template-columns: minmax(120px, 180px) minmax(0, 1fr); gap: 10px 18px; font-size: 14px; align-items: baseline }
  dl.props dt { color: var(--muted); font-weight: 500; white-space: nowrap }
  dl.props dd { font-weight: 500; color: var(--text); word-break: break-word; overflow-wrap: anywhere; min-width: 0 }

  .err { background: rgba(230,74,74,0.08); border: 1px solid rgba(230,74,74,0.3); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--red); font-size: 13px; margin: 12px 0 }
  .ok  { background: rgba(2,167,87,0.08); border: 1px solid rgba(2,167,87,0.3); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--green); font-size: 13px; margin: 12px 0 }

  #loading { padding: 60px; text-align: center; color: var(--muted) }
  .empty { padding: 60px 20px; text-align: center; color: var(--muted) }
  .empty p { margin-top: 8px; font-size: 13px }

  pre { background: var(--surface); padding: 12px; border-radius: var(--radius-sm); font-size: 11px; overflow: auto; color: var(--text) }

  /* Matriz admin tabs (PR11) */
  .matriz-tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); padding: 0 4px }
  .matriz-tab {
    background: transparent; border: none; padding: 12px 18px; font-size: 13.5px;
    font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
    margin-bottom: -2px; transition: all .15s ease;
  }
  .matriz-tab:hover { color: var(--text) }
  .matriz-tab.active { color: var(--blue-500); border-bottom-color: var(--blue-500) }

  /* Signer rows (nodo Firma PR10) */
  .signer-row {
    display: flex; gap: 12px; align-items: flex-start;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
  }
  .signer-row .signer-email {
    width: 100%; padding: 6px 10px; font-size: 12.5px;
    border: 1.5px solid var(--border); border-radius: 8px;
  }
  .signer-row .signer-email:focus { outline: none; border-color: var(--blue-500); box-shadow: 0 0 0 3px rgba(31,73,182,0.08) }
  .signer-row .signer-remove {
    border: none; background: transparent; color: var(--muted); cursor: pointer;
    font-size: 18px; padding: 4px 10px; border-radius: 8px;
  }
  .signer-row .signer-remove:not(:disabled):hover { color: var(--red); background: rgba(230,74,74,0.08) }
  .signer-row .signer-remove:disabled { cursor: not-allowed; opacity: 0.4 }

  /* Flow canvas Lever-style — cards compactas con avatares + fechas */
  .flow-canvas-wrap { position: relative; margin-bottom: 24px }
  .flow-canvas {
    overflow: auto;
    padding: 32px 20px;
    background:
      radial-gradient(circle, rgba(19,32,70,0.08) 1px, transparent 1px) 0 0 / 18px 18px;
    background-color: #fafbff;
    border: 1px solid var(--border); border-radius: 14px;
    max-height: 380px;
  }
  .flow-canvas-inner {
    display: flex; align-items: center; gap: 0;
    transform-origin: 0 50%;
    transition: transform .2s ease;
    min-width: max-content;
  }
  .flow-zoom {
    position: absolute; top: 16px; right: 16px; z-index: 5;
    display: flex; flex-direction: column; gap: 4px;
    background: white; border-radius: 10px; padding: 4px;
    box-shadow: 0 2px 8px rgba(19,32,70,0.1); border: 1px solid var(--border);
  }
  .flow-zoom button {
    width: 28px; height: 28px; border: none; background: transparent;
    color: var(--muted); cursor: pointer; border-radius: 6px;
    font-size: 16px; line-height: 1; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }
  .flow-zoom button:hover { background: var(--blue-50); color: var(--blue-700) }

  /* Diseño Finnecto/Lever exacto */
  .lever-node, .flow-node {
    position: relative;
    flex: 0 0 230px; max-width: 230px;
    background: white;
    border: 1px solid #e8eaf0; border-radius: 8px;
    padding: 14px 16px; text-align: left;
    box-shadow: 0 1px 2px rgba(19,32,70,0.04);
    transition: all .2s ease;
  }
  .lever-node:hover, .flow-node:hover { box-shadow: 0 4px 12px rgba(19,32,70,0.08) }
  .lever-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; gap: 8px;
  }
  .lever-pill {
    display: inline-flex; align-items: center;
    font-size: 11px; font-weight: 500;
    padding: 2px 10px; border-radius: 99px;
    background: #eef0f4; color: #6b7280;
    text-transform: none; letter-spacing: 0; line-height: 1.5;
  }
  .lever-pill-done    { background: #d8f5e6; color: #047857 }
  .lever-pill-active  { background: #dbeafe; color: #1d4ed8 }
  .lever-pill-rejected{ background: #fee2e2; color: #b91c1c }
  .lever-pill-pending { background: #eef0f4; color: #6b7280 }
  .lever-date { font-size: 11px; color: #9ca3af; white-space: nowrap; font-variant-numeric: tabular-nums }
  .lever-title { font-weight: 700; font-size: 13.5px; color: #0f172a; margin-bottom: 10px; letter-spacing: -0.005em; line-height: 1.3 }
  .lever-person { display: flex; align-items: center; gap: 10px }
  .lever-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: #e5e7eb;
    color: #6b7280; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden;
  }
  .lever-avatar svg { width: 16px; height: 16px }
  .lever-avatar.lever-avatar-initials { font-weight: 600; font-family: 'Inter', sans-serif; font-size: 10.5px; background: #cbd5e1; color: #475569 }
  img.lever-avatar { object-fit: cover; display: block }
  .lever-person-info { display: flex; flex-direction: column; min-width: 0; flex: 1; gap: 0 }
  .lever-person-name { font-size: 12.5px; font-weight: 500; color: #1f2937; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3 }
  .lever-person-area { font-size: 11px; color: #9ca3af; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: none; line-height: 1.3 }

  .flow-node-done { border-color: rgba(2,167,87,0.4) }
  .flow-node-active { border-color: var(--blue-500); border-width: 2px; padding: 7px 9px }
  .flow-node-rejected { border-color: rgba(230,74,74,0.4) }
  .flow-node-pending { opacity: 0.55 }
  .flow-node-pending:hover { opacity: 1 }

  .flow-node-pulse {
    position: absolute; inset: -5px; border-radius: 14px;
    border: 2px solid var(--blue-500); opacity: 0;
    animation: flow-pulse 2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes flow-pulse {
    0%   { opacity: 0.6; transform: scale(0.99) }
    100% { opacity: 0;   transform: scale(1.03) }
  }

  /* Edges: línea + dot pequeño tipo Lever */
  .flow-edge {
    display: flex; align-items: center;
    color: var(--blue-200); padding: 0; margin: 0 -1px;
  }
  .flow-edge svg { display: none }
  .flow-edge::before {
    content: ''; width: 24px; height: 1.5px;
    background: currentColor;
  }
  .flow-edge::after {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; margin-left: -2px;
  }
  .flow-node-done + .flow-edge { color: var(--green) }
  .flow-node-active + .flow-edge { color: var(--blue-500) }

  /* Paralelo group para nodos 2+3 (compacto, sin borde) */
  .flow-parallel-col {
    display: flex; flex-direction: column; gap: 4px; align-items: stretch;
    padding: 0; position: relative;
  }
  .flow-parallel-tag {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); font-weight: 700; text-align: center;
    margin-bottom: 2px;
  }
  .flow-parallel-stack { display: flex; flex-direction: column; gap: 8px }
  .flow-split {
    width: 24px; align-self: stretch; position: relative;
    color: var(--blue-200);
  }
  .flow-split::before {
    content: ''; position: absolute; top: 50%; left: 0; right: 0;
    height: 1.5px; background: currentColor; transform: translateY(-50%);
  }
  .flow-split::after {
    content: ''; position: absolute; left: 50%; width: 1.5px;
    background: currentColor;
    top: 30%; bottom: 30%; transform: translateX(-50%);
  }
  .flow-node-done + .flow-split, .flow-node-active + .flow-split { color: var(--green) }

  /* Lever-style cards (PR-A) */
  .lever-node {
    flex: 0 0 220px; max-width: 220px;
    padding: 14px 16px;
    text-align: left;
    border-radius: 12px;
  }
  .lever-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; gap: 8px;
  }
  .lever-pill {
    font-size: 10.5px; font-weight: 600;
    padding: 3px 10px; border-radius: 999px;
    text-transform: none; letter-spacing: 0;
  }
  .lever-pill-done { background: rgba(2,167,87,0.12); color: var(--green) }
  .lever-pill-rejected { background: rgba(230,74,74,0.12); color: var(--red) }
  .lever-pill-active { background: rgba(31,73,182,0.12); color: var(--blue-700) }
  .lever-pill-pending { background: #f0f0f0; color: var(--muted) }
  .lever-date { font-size: 11px; color: var(--muted); font-weight: 500 }
  .lever-title {
    font-weight: 700; font-size: 14px; color: var(--text);
    margin-bottom: 14px; letter-spacing: -0.01em; line-height: 1.3;
  }
  .lever-person { display: flex; align-items: center; gap: 10px }
  .lever-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    object-fit: cover; flex-shrink: 0;
    background: var(--blue-50);
    border: 1.5px solid var(--border);
  }
  .lever-avatar-initials {
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px; color: var(--blue-700);
    background: linear-gradient(135deg, var(--blue-100), var(--blue-50));
  }
  .lever-person-info { min-width: 0; flex: 1 }
  .lever-person-name {
    font-size: 13px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .lever-person-area {
    font-size: 11px; color: var(--muted); font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Zoom controls overlay */
  .flow-canvas-wrap { position: relative }
  .flow-zoom {
    position: absolute; top: 18px; right: 18px;
    display: flex; flex-direction: column; gap: 4px;
    background: white; border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    z-index: 10;
  }
  .flow-zoom button {
    background: none; border: none; padding: 8px 10px;
    cursor: pointer; color: var(--muted); font-size: 16px;
    border-bottom: 1px solid var(--border);
  }
  .flow-zoom button:last-child { border-bottom: none }
  .flow-zoom button:hover { background: var(--blue-50); color: var(--blue-700) }
  .flow-canvas-inner {
    display: flex; align-items: stretch; gap: 0;
    transform-origin: top left; transition: transform .15s ease;
  }

  @media (max-width: 1100px) {
    .flow-canvas { padding: 16px 8px }
    .flow-node { flex-basis: 150px; max-width: 150px }
    .lever-node { flex-basis: 200px; max-width: 200px }
  }

  /* Dashboard funnel (PR3-fix UX) */
  .funnel { display: flex; align-items: stretch; gap: 6px; overflow-x: auto; padding: 4px 0 }
  .funnel-stage {
    flex: 1; min-width: 140px;
    background: linear-gradient(180deg, white, color-mix(in srgb, var(--funnel-color) 8%, white));
    border: 1px solid color-mix(in srgb, var(--funnel-color) 20%, var(--border));
    border-radius: 12px; padding: 14px 12px; text-align: center;
    box-shadow: 0 1px 3px rgba(19,32,70,0.04);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .funnel-stage:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(19,32,70,0.08) }
  .funnel-icon { font-size: 22px; margin-bottom: 4px }
  .funnel-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); font-weight: 600; margin-bottom: 6px }
  .funnel-count { font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 700; color: var(--funnel-color); line-height: 1; letter-spacing: -0.02em }
  .funnel-bar { height: 4px; background: var(--border); border-radius: 99px; margin: 8px 0 6px; overflow: hidden }
  .funnel-bar-fill { height: 100%; background: var(--funnel-color); border-radius: 99px; transition: width .6s ease }
  .funnel-semaforos { font-size: 10.5px; color: var(--muted); display: flex; gap: 6px; justify-content: center; min-height: 14px }
  .funnel-arrow { display: flex; align-items: center; color: var(--muted); font-size: 18px; opacity: 0.5; padding: 0 2px }

  .approval-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px }
  .approval-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px }
  .approval-team { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 600; margin-bottom: 6px }
  .approval-hours { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 700; color: var(--blue-800); line-height: 1 }
  .approval-hours small { font-size: 11px; color: var(--muted); font-weight: 500; margin-left: 4px; letter-spacing: 0 }
  .approval-counts { display: flex; gap: 6px; margin-top: 10px }

  /* Tally-style form (PR4) */
  .tally-shell { display: flex; flex-direction: column; gap: 14px }
  .tally-topbar { display: flex; flex-direction: column; gap: 6px; padding: 4px 2px }
  .tally-progress { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden }
  .tally-progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--blue-500), var(--mint));
    border-radius: 99px; transition: width .35s cubic-bezier(.22,.61,.36,1);
  }
  .tally-step-meta { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: var(--blue-700); letter-spacing: 0.02em }
  .tally-step-meta .muted { font-weight: 500 }

  .tally-step { animation: none }
  .tally-step.tally-enter { animation: tally-slide 0.32s cubic-bezier(.22,.61,.36,1) both }
  @keyframes tally-slide {
    0%   { opacity: 0; transform: translateY(14px) }
    100% { opacity: 1; transform: translateY(0) }
  }

  .tally-nav {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 0 8px;
    position: sticky; bottom: 0;
    background: linear-gradient(transparent, white 30%);
  }
  .tally-nav .ghost { padding: 10px 16px }

  .tally-review {
    background: var(--surface); border-radius: 12px; padding: 4px 0;
    border: 1px solid var(--border);
  }
  .tally-review-row {
    display: grid; grid-template-columns: minmax(140px, 200px) 1fr;
    gap: 12px 18px; padding: 12px 18px;
    border-bottom: 1px solid var(--border); font-size: 13.5px;
  }
  .tally-review-row:last-child { border-bottom: none }
  .tally-review-key { color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; font-size: 11px }
  .tally-review-val { color: var(--text); font-weight: 500; word-break: break-word }

  /* Date field — pill styling consistente (PR3-fix) */
  .date-field { position: relative }
  .date-field input[type=date] {
    appearance: none; -webkit-appearance: none;
    background: white; color: var(--text);
    border: 1.5px solid var(--border); padding: 11px 38px 11px 14px;
    border-radius: var(--radius-sm); font-size: 14px;
    width: 100%; transition: all .15s ease;
    font-family: inherit;
  }
  .date-field input[type=date]:focus { outline: none; border-color: var(--blue-500); box-shadow: 0 0 0 4px rgba(31,73,182,0.08) }
  .date-field input[type=date]:hover { border-color: var(--blue-200) }
  .date-field input[type=date]::-webkit-calendar-picker-indicator {
    opacity: 0; cursor: pointer; position: absolute; right: 0; top: 0; bottom: 0; width: 100%; margin: 0;
  }
  .date-field .date-icon {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    pointer-events: none; font-size: 16px; opacity: 0.6;
  }
  .date-field:hover .date-icon { opacity: 1 }

  /* Dropzones (PR2) */
  .dropzone { border: 1.5px dashed var(--blue-100); border-radius: var(--radius); padding: 18px; background: var(--blue-50); transition: all .15s ease }
  .dropzone.drag { border-color: var(--blue-500); background: rgba(31,73,182,0.05) }
  .drop-hint { font-size: 13.5px; color: var(--muted); text-align: center }
  .drop-hint a { font-weight: 600 }
  .drop-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px }
  .drop-list:empty { margin: 0 }
  .drop-item { display: flex; gap: 10px; align-items: center; background: white; border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; font-size: 13px }
  .drop-icon { font-size: 18px }
  .drop-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500 }
  .drop-size { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums }
  .drop-status { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600 }
  .drop-status[data-status="ready"] { background: var(--blue-100); color: var(--blue-700) }
  .drop-status[data-status="uploading"] { background: rgba(240,180,41,0.15); color: #a8780a }
  .drop-status[data-status="done"] { background: rgba(2,167,87,0.12); color: var(--green) }
  .drop-status[data-status="error"] { background: rgba(230,74,74,0.12); color: var(--red) }
  .drop-remove { border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 18px; padding: 0 4px }
  .drop-remove:hover { color: var(--red) }

  /* Doc viewer + comments (PR2) */
  .doc-viewer-wrap { display: grid; grid-template-columns: minmax(0,1fr) 360px; gap: 16px; margin-top: 16px }
  .doc-preview { background: white; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; min-height: 520px; display: flex; flex-direction: column }
  .doc-preview-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; font-size: 13px; background: var(--surface) }
  .doc-preview-body { flex: 1; overflow: auto; padding: 16px; background: #fafbff }
  .doc-preview-body iframe { width: 100%; height: 100%; min-height: 480px; border: none }
  /* Docx render como hoja de Word: paper white, Times serif, márgenes generosos */
  .doc-preview-body .docx-render {
    background: white; padding: 60px 72px;
    max-width: 816px; margin: 0 auto;
    box-shadow: 0 1px 3px rgba(19,32,70,0.08), 0 8px 24px rgba(19,32,70,0.06);
    font-family: 'Times New Roman', 'Times', serif;
    font-size: 14px; line-height: 1.65; color: #0f172a;
    border: 1px solid #e8eaf0;
  }
  .doc-preview-body .docx-render p { margin: 0 0 12px; text-align: justify; hyphens: auto }
  .doc-preview-body .docx-render h1 { font-size: 22px; font-weight: 700; margin: 24px 0 14px; text-align: center; letter-spacing: -0.005em }
  .doc-preview-body .docx-render h2 { font-size: 17px; font-weight: 700; margin: 20px 0 10px }
  .doc-preview-body .docx-render h3 { font-size: 15px; font-weight: 700; margin: 16px 0 8px }
  .doc-preview-body .docx-render ul, .doc-preview-body .docx-render ol { margin: 8px 0 14px; padding-left: 32px }
  .doc-preview-body .docx-render li { margin: 4px 0 }
  .doc-preview-body .docx-render strong, .doc-preview-body .docx-render b { font-weight: 700 }
  .doc-preview-body .docx-render em, .doc-preview-body .docx-render i { font-style: italic }
  .doc-preview-body .docx-render table { border-collapse: collapse; margin: 14px 0; width: 100% }
  .doc-preview-body .docx-render td, .doc-preview-body .docx-render th { border: 1px solid #d1d5db; padding: 6px 10px; font-size: 13px; vertical-align: top }
  .doc-preview-body .docx-render th { background: #f3f4f6; font-weight: 700 }
  .doc-preview-body .docx-render a { color: var(--blue-500); text-decoration: underline }
  .doc-preview-body .docx-render img { max-width: 100%; height: auto; margin: 14px 0 }

  .doc-files-list { display: flex; flex-direction: column; gap: 4px; padding: 10px 14px; border-bottom: 1px solid var(--border); background: white; font-size: 12.5px }
  .doc-files-list .file-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: var(--blue-50); color: var(--blue-700); cursor: pointer; border: 1px solid transparent }
  .doc-files-list .file-pill.active { background: var(--blue-500); color: white }
  .doc-files-list .file-pill:hover:not(.active) { border-color: var(--blue-200) }

  .comments-panel { background: white; border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; max-height: 720px }
  .comments-header { padding: 12px 14px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; display: flex; justify-content: space-between; align-items: center }
  .comments-list { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; gap: 12px }
  .comment { background: var(--surface); border-radius: 10px; padding: 10px 12px; font-size: 13px }
  .comment.is-mine { background: var(--blue-50) }
  .comment-meta { display: flex; gap: 8px; align-items: center; font-size: 11.5px; color: var(--muted); margin-bottom: 4px }
  .comment-author { font-weight: 600; color: var(--text) }
  .comment-page { background: var(--blue-100); color: var(--blue-700); padding: 1px 6px; border-radius: 999px; font-weight: 600 }
  .comment-body { white-space: pre-wrap; word-break: break-word }
  .comment-body .mention { background: rgba(31,73,182,0.1); color: var(--blue-700); padding: 1px 6px; border-radius: 999px; font-weight: 500 }
  .comment-composer { border-top: 1px solid var(--border); padding: 12px 14px; position: relative }
  .comment-composer textarea { min-height: 60px; resize: vertical; font-size: 13px }
  .comment-composer .composer-row { display: flex; gap: 8px; align-items: center; margin-top: 8px }
  .comment-composer input[type=number] { width: 80px }
  .mention-popup { position: absolute; bottom: 80px; left: 14px; right: 14px; background: white; border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow); max-height: 220px; overflow-y: auto; z-index: 20 }
  .mention-popup .mention-item { padding: 8px 12px; cursor: pointer; font-size: 13px; display: flex; gap: 8px; align-items: center }
  .mention-popup .mention-item:hover, .mention-popup .mention-item.focus { background: var(--blue-50) }
  .mention-popup .mention-roles { color: var(--muted); font-size: 11px; margin-left: auto }

  /* PR3.2 — PDF text layer + highlights + selection FAB */
  .pdf-page { position: relative; margin: 0 auto 12px; box-shadow: 0 1px 6px rgba(19,32,70,0.1); background: white }
  .pdf-page canvas { display: block }
  .pdf-text-layer { position: absolute; inset: 0; overflow: hidden; line-height: 1; opacity: 1; pointer-events: auto }
  .pdf-text-layer > span, .pdf-text-layer > br { color: transparent; position: absolute; white-space: pre; cursor: text; transform-origin: 0% 0%; user-select: text }
  .pdf-text-layer ::selection { background: rgba(255,214,90,0.35); color: transparent }

  .docx-render ::selection { background: rgba(255,214,90,0.35) }
  .docx-render[contenteditable=true] { outline: 2px dashed var(--blue-400); outline-offset: 6px; padding: 16px; min-height: 400px }
  .docx-render[contenteditable=true]:focus { outline-color: var(--blue-500) }

  .anchor-highlight { background: linear-gradient(transparent 55%, rgba(255,214,90,0.65) 55%); cursor: pointer; padding: 0 1px; border-radius: 2px }
  .anchor-highlight:hover { background: linear-gradient(transparent 35%, rgba(255,214,90,0.85) 35%) }

  .selection-fab { position: fixed; z-index: 250; background: linear-gradient(135deg, #1F49B6, #3F5EDF); color: white; border: none; padding: 8px 14px; border-radius: 999px; font-size: 12.5px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 14px rgba(31,73,182,0.35); display: flex; align-items: center; gap: 6px }
  .selection-fab:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(31,73,182,0.45) }

  .anchor-quote { font-size: 12px; color: var(--muted); font-style: italic; background: rgba(255,214,90,0.12); border-left: 2px solid var(--yellow); padding: 4px 8px; border-radius: 4px; margin: 4px 0; line-height: 1.4 }

  .comment.flash { animation: comment-flash 1.4s ease-out }
  @keyframes comment-flash {
    0%   { background: rgba(255,214,90,0.4); transform: scale(1.02) }
    100% { background: var(--surface); transform: scale(1) }
  }

  /* AI edit modal (PR3) */
  .ai-modal { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px }
  .ai-modal-backdrop { position: absolute; inset: 0; background: rgba(11,31,75,0.55); backdrop-filter: blur(2px) }
  .ai-modal-card { position: relative; background: white; border-radius: 16px; box-shadow: var(--shadow-lg); padding: 28px; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto }
  .ai-modal-card h3 { font-family: 'Montserrat', sans-serif; font-size: 18px }
  .ai-modal-card textarea { width: 100%; min-height: 80px; resize: vertical; font-size: 13.5px; padding: 10px 12px; border-radius: 10px; border: 1.5px solid var(--border) }
  .ai-modal-card .err, .ai-modal-card .ok { font-size: 12.5px }

  /* Profile modal */
  .profile-modal-card { display: flex; flex-direction: column; gap: 18px; max-width: 440px }
  .profile-modal-card h3 { margin: 0; font-family: 'Montserrat', sans-serif; font-size: 18px; color: var(--blue-900) }
  .profile-avatar-big { width: 96px; height: 96px; border-radius: 50%; background: var(--blue-500); color: white; display: flex; align-items: center; justify-content: center; font-size: 38px; font-weight: 600; font-family: 'Montserrat'; margin: 0 auto; overflow: hidden; flex-shrink: 0 }
  .profile-avatar-big img { width: 100%; height: 100%; object-fit: cover }
  .profile-actions-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap }
  .profile-btn { padding: 8px 14px; border-radius: 8px; border: 1.5px solid var(--border); background: white; font-size: 13px; cursor: pointer; font-family: inherit; color: var(--blue-900) }
  .profile-btn:hover { background: var(--blue-50); border-color: var(--blue-500) }
  .profile-btn.danger { color: #c0392b; border-color: #f3c7c2 }
  .profile-btn.danger:hover { background: #fdecea; border-color: #c0392b }
  .profile-btn.primary { background: var(--blue-500); color: white; border-color: var(--blue-500) }
  .profile-btn.primary:hover { background: var(--blue-700); border-color: var(--blue-700) }
  .profile-field { display: flex; flex-direction: column; gap: 4px }
  .profile-field label { font-size: 12px; color: var(--text-muted); font-weight: 500 }
  .profile-field input { padding: 8px 10px; border-radius: 8px; border: 1.5px solid var(--border); font-size: 13.5px; font-family: inherit }
  .profile-field input:focus { outline: none; border-color: var(--blue-500) }
  .profile-field .readonly { padding: 8px 10px; border-radius: 8px; background: var(--blue-50); font-size: 13.5px; color: var(--blue-900) }
  .profile-footer { display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid var(--border); padding-top: 14px }
  .profile-msg { font-size: 12.5px; min-height: 16px }
  .profile-msg.err { color: #c0392b }
  .profile-msg.ok { color: #1e7e34 }

  /* Notif badge */
  .notif-bell {
    position: relative; cursor: pointer;
    padding: 8px 12px; border-radius: 10px;
    background: rgba(255,255,255,0.04); color: white;
    font-size: 14px; border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; gap: 6px;
    transition: background .15s ease, border-color .15s ease;
  }
  .notif-bell:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.15) }
  .notif-bell .badge { position: absolute; top: -2px; right: -2px; background: var(--red); color: white; border-radius: 999px; font-size: 10px; font-weight: 700; padding: 0 5px; min-width: 16px; text-align: center; line-height: 16px }
  .notif-popup { position: fixed; left: 16px; bottom: 70px; width: 340px; background: white; border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); z-index: 250; max-height: 480px; display: flex; flex-direction: column }
  .notif-popup-header { padding: 12px 14px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; display: flex; justify-content: space-between; align-items: center }
  .notif-popup-list { flex: 1; overflow-y: auto }
  .notif-item { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13px }
  .notif-item:hover { background: var(--surface) }
  .notif-item.unread { background: var(--blue-50) }
  .notif-item .notif-author { font-weight: 600; color: var(--blue-700) }
  .notif-item .notif-time { color: var(--muted); font-size: 11px }

  @media (max-width: 900px) {
    .doc-viewer-wrap { grid-template-columns: 1fr }
  }

  /* Risk severity */
  .risk { display: flex; gap: 10px; padding: 10px 0; align-items: flex-start; border-bottom: 1px solid var(--border) }
  .risk:last-child { border-bottom: none }
  .risk b { color: var(--text); font-weight: 600 }
  .risk span.desc { color: var(--muted); font-size: 13px; display: block; margin-top: 2px }

  @media (max-width: 900px) {
    .shell { grid-template-columns: 1fr }
    aside { position: relative; height: auto; flex-direction: row; flex-wrap: wrap; gap: 6px; padding: 16px }
    .logo, .nav-section, .nav-bottom { display: none }
    main { padding: 20px }
  }
</style>
</head>
<body>

<script type="module">
const $ = (s) => document.querySelector(s);
const view = $('#view');
const loading = $('#loading');

// Estado auth poblado por checkAuth().
window.__me = null;
window.__role = null;
window.__roles = [];

function hasRole(r) {
  return Array.isArray(window.__roles) && window.__roles.includes(r);
}
window.hasRole = hasRole;

function showAuthBanner(msg) {
  document.body.insertAdjacentHTML('afterbegin',
    `<div style="position:fixed;top:0;left:0;right:0;background:#e64a4a;color:white;padding:14px;text-align:center;z-index:9999;font-family:system-ui">Auth error: ${msg}</div>`);
}

async function checkAuth() {
  // Quita banner de error si la URL trae auth_error.
  const qs = new URLSearchParams(location.search);
  if (qs.get('auth_error')) {
    showAuthBanner(qs.get('auth_error'));
    history.replaceState(null, '', location.pathname);
  }

  let me = null;
  try {
    const r = await fetch('/api/auth/me', { credentials: 'include' });
    if (r.ok) me = await r.json();
  } catch {}

  if (!me?.ok) {
    $('#login-screen').hidden = false; $('#login-screen').style.display = '';
    $('#app-shell').hidden = true;
    document.body.classList.remove('logged-in');
    return;
  }

  window.__me = me;
  window.__roles = me.roles ?? [];
  window.__role = me.roles?.includes('admin') ? 'admin' : (me.roles?.[0] ?? 'solicitante');

  $('#login-screen').hidden = true; $('#login-screen').style.display = 'none';
  $('#app-shell').hidden = false;
  document.body.classList.add('logged-in');

  const email = me.email ?? '';
  const name = me.display_name ?? email.split('@')[0].replace(/\./g, ' ').replace(/\b\w/g, l => l.toUpperCase());
  $('#user-name').textContent = name;
  const primaryRole = hasRole('admin') ? 'Admin' : hasRole('aprobador') ? 'Aprobador' : 'Solicitante';
  $('#user-role-pill').textContent = `${primaryRole}${me.bypass ? ' · DEV' : ''}`;
  $('#avatar').textContent = (email[0] ?? '?').toUpperCase();
  const avImg = $('#avatar-img');
  if (me.avatar_url) {
    avImg.src = me.avatar_url + '?t=' + Date.now();
    avImg.hidden = false;
    $('#avatar').style.display = 'none';
  } else {
    avImg.hidden = true;
    $('#avatar').style.display = '';
  }
  $('#nav-users').hidden = !hasRole('admin');
  $('#nav-matriz').hidden = !hasRole('admin');
  route();
}

// ===== Profile modal =====
function syncSidebarAvatar() {
  const me = window.__me ?? {};
  const email = me.email ?? '';
  const img = document.querySelector('#avatar-img');
  const ph = document.querySelector('#avatar');
  ph.textContent = (email[0] ?? '?').toUpperCase();
  if (me.avatar_url) {
    img.src = me.avatar_url + '?t=' + Date.now();
    img.hidden = false;
    ph.style.display = 'none';
  } else {
    img.hidden = true;
    img.removeAttribute('src');
    ph.style.display = '';
  }
  const name = me.display_name ?? email.split('@')[0].replace(/\./g, ' ').replace(/\b\w/g, l => l.toUpperCase());
  document.querySelector('#user-name').textContent = name;
}

function renderProfileAvatar(container) {
  const me = window.__me ?? {};
  const email = me.email ?? '';
  if (me.avatar_url) {
    container.innerHTML = `<img src="${me.avatar_url}?t=${Date.now()}" alt="">`;
  } else {
    container.textContent = (email[0] ?? '?').toUpperCase();
  }
}

function setProfileMsg(text, kind) {
  const el = document.querySelector('#profile-msg');
  if (!el) return;
  el.textContent = text ?? '';
  el.className = 'profile-msg' + (kind ? ' ' + kind : '');
}

function closeProfileModal() {
  document.querySelector('#profile-modal')?.remove();
}

function openProfileModal() {
  closeProfileModal();
  const me = window.__me ?? {};
  const email = me.email ?? '';
  const roles = (window.__roles ?? []).join(', ') || '—';
  const m = document.createElement('div');
  m.id = 'profile-modal';
  m.className = 'ai-modal';
  m.innerHTML = `
    <div class="ai-modal-backdrop" data-close="1"></div>
    <div class="ai-modal-card profile-modal-card">
      <h3>Mi perfil</h3>
      <div id="profile-avatar-big" class="profile-avatar-big"></div>
      <div class="profile-actions-row">
        <button type="button" class="profile-btn" id="profile-change-photo">Cambiar foto</button>
        <button type="button" class="profile-btn danger" id="profile-remove-photo" ${me.avatar_url ? '' : 'disabled style="opacity:0.5;cursor:not-allowed"'}>Eliminar foto</button>
      </div>
      <div class="profile-field">
        <label for="profile-display-name">Nombre</label>
        <input id="profile-display-name" type="text" maxlength="80" value="${(me.display_name ?? '').replace(/"/g, '&quot;')}" placeholder="Tu nombre">
      </div>
      <div class="profile-field">
        <label>Email</label>
        <div class="readonly">${email}</div>
      </div>
      <div class="profile-field">
        <label>Roles</label>
        <div class="readonly">${roles}</div>
      </div>
      <div id="profile-msg" class="profile-msg"></div>
      <div class="profile-footer">
        <button type="button" class="profile-btn" data-close="1">Cerrar</button>
        <button type="button" class="profile-btn primary" id="profile-save">Guardar</button>
      </div>
    </div>
  `;
  document.body.appendChild(m);
  renderProfileAvatar(m.querySelector('#profile-avatar-big'));

  m.addEventListener('click', (ev) => {
    if (ev.target.dataset?.close) closeProfileModal();
  });

  m.querySelector('#profile-change-photo').addEventListener('click', () => {
    document.querySelector('#avatar-input').click();
  });

  m.querySelector('#profile-remove-photo').addEventListener('click', async () => {
    if (!window.__me?.avatar_url) return;
    if (!confirm('¿Eliminar foto de perfil?')) return;
    setProfileMsg('Eliminando…');
    try {
      const r = await fetch('/api/profile/avatar', { method: 'DELETE', credentials: 'include' });
      if (!r.ok) throw new Error(await r.text());
      window.__me.avatar_url = null;
      renderProfileAvatar(m.querySelector('#profile-avatar-big'));
      m.querySelector('#profile-remove-photo').disabled = true;
      m.querySelector('#profile-remove-photo').style.opacity = '0.5';
      syncSidebarAvatar();
      setProfileMsg('Foto eliminada', 'ok');
    } catch (err) {
      setProfileMsg('Error: ' + err.message, 'err');
    }
  });

  m.querySelector('#profile-save').addEventListener('click', async () => {
    const name = m.querySelector('#profile-display-name').value.trim();
    setProfileMsg('Guardando…');
    try {
      const r = await fetch('/api/profile/me', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ display_name: name }),
      });
      if (!r.ok) throw new Error(await r.text());
      window.__me.display_name = name;
      syncSidebarAvatar();
      setProfileMsg('Guardado', 'ok');
    } catch (err) {
      setProfileMsg('Error: ' + err.message, 'err');
    }
  });

  document.addEventListener('keydown', escClose);
  function escClose(ev) {
    if (ev.key === 'Escape') {
      closeProfileModal();
      document.removeEventListener('keydown', escClose);
    }
  }
}

document.addEventListener('click', (e) => {
  if (e.target.closest('#open-profile')) {
    e.preventDefault();
    openProfileModal();
    return;
  }
  if (e.target.closest('#profile-trigger')) {
    e.preventDefault();
    toggleProfilePopup();
    return;
  }
  if (!e.target.closest('.profile-popup') && !e.target.closest('#profile-trigger')) {
    document.querySelector('.profile-popup')?.remove();
    document.querySelector('#profile-trigger')?.classList.remove('open');
  }
});

function toggleProfilePopup() {
  const existing = document.querySelector('.profile-popup');
  if (existing) {
    existing.remove();
    document.querySelector('#profile-trigger')?.classList.remove('open');
    return;
  }
  const me = window.__me ?? {};
  const pop = document.createElement('div');
  pop.className = 'profile-popup';
  pop.innerHTML = `
    <div class="profile-popup-header">
      <div style="font-weight:600;color:white;font-size:13px;margin-bottom:2px">${escapeHtml(me.display_name ?? (me.email ?? '').split('@')[0])}</div>
      ${escapeHtml(me.email ?? '')}${me.bypass ? ' · DEV' : ''}
    </div>
    <button type="button" class="item" id="pp-profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-2a4 4 0 014-4h8a4 4 0 014 4v2"/></svg>
      Mi perfil
    </button>
    <button type="button" class="item" id="pp-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      Cambiar foto
    </button>
    <button type="button" class="item" id="pp-notif">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span style="flex:1">Notificaciones</span>
      <span id="pp-notif-count" style="background:var(--red);color:white;border-radius:999px;font-size:10px;font-weight:700;padding:1px 7px;min-width:18px;text-align:center">${window.__notifUnread > 0 ? window.__notifUnread : ''}</span>
    </button>
    ${hasRole('admin') ? `<button type="button" class="item" id="pp-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Configuración (logo + branding)
    </button>
    <button type="button" class="item" id="pp-users">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      Gestión usuarios
    </button>
    <button type="button" class="item" id="pp-matriz">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Matriz contratos
    </button>` : ''}
    <div class="divider"></div>
    <button type="button" class="item danger" id="pp-logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Cerrar sesión
    </button>
  `;
  document.body.appendChild(pop);
  document.querySelector('#profile-trigger')?.classList.add('open');
  pop.querySelector('#pp-profile').addEventListener('click', () => { pop.remove(); openProfileModal(); });
  pop.querySelector('#pp-avatar').addEventListener('click', () => { pop.remove(); document.querySelector('#avatar-input').click(); });
  pop.querySelector('#pp-notif').addEventListener('click', () => { pop.remove(); document.querySelector('#profile-trigger')?.classList.remove('open'); toggleNotifPopup(); });
  pop.querySelector('#pp-users')?.addEventListener('click', () => { pop.remove(); location.hash = 'users'; });
  pop.querySelector('#pp-matriz')?.addEventListener('click', () => { pop.remove(); location.hash = 'matriz'; });
  pop.querySelector('#pp-settings')?.addEventListener('click', () => { pop.remove(); location.hash = 'matriz'; setTimeout(() => document.querySelector('.matriz-tab[data-tab="branding"]')?.click(), 200); });
  pop.querySelector('#pp-logout').addEventListener('click', () => {
    // GET-redirect server-side: la MISMA request HTTP setea cookie cleared y
    // redirige. No hay window donde la cookie vieja sobreviva.
    try {
      Object.keys(localStorage).filter(k => k.startsWith('sb-') || k === 'g66_sidebar_collapsed').forEach(k => localStorage.removeItem(k));
    } catch {}
    window.location.href = '/api/auth/logout?next=/admin';
  });
}

// Avatar file change → upload (triggered from modal "Cambiar foto").
document.addEventListener('change', async (e) => {
  if (e.target.id !== 'avatar-input') return;
  const f = e.target.files[0];
  if (!f) return;
  if (f.size > 2 * 1024 * 1024) {
    setProfileMsg('Archivo > 2MB', 'err');
    e.target.value = '';
    return;
  }
  const fd = new FormData();
  fd.append('file', f);
  setProfileMsg('Subiendo…');
  try {
    const r = await fetch('/api/profile/avatar', { method: 'POST', credentials: 'include', body: fd });
    if (!r.ok) throw new Error(await r.text());
    const { avatar_url } = await r.json();
    window.__me.avatar_url = avatar_url;
    const big = document.querySelector('#profile-avatar-big');
    if (big) renderProfileAvatar(big);
    const removeBtn = document.querySelector('#profile-remove-photo');
    if (removeBtn) { removeBtn.disabled = false; removeBtn.style.opacity = ''; }
    syncSidebarAvatar();
    setProfileMsg('Foto actualizada', 'ok');
  } catch (err) {
    setProfileMsg('Error subir avatar: ' + err.message, 'err');
  } finally {
    e.target.value = '';
  }
});

async function sendMagicLinkViaServer(email) {
  const r = await fetch('/api/auth/magic-link', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ email }),
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) return { error: data.error ?? `HTTP ${r.status}` };
  return { ok: true };
}

async function doLogin(ev) {
  if (ev) ev.preventDefault();
  $('#login-err').hidden = true; $('#login-ok').hidden = true;
  const email = ($('#login-email').value || '').trim();
  const password = $('#login-password').value;
  if (!email) { $('#login-err').textContent = 'Email requerido'; $('#login-err').hidden = false; return; }

  if (!password) {
    const r = await sendMagicLinkViaServer(email);
    if (r.error) { $('#login-err').textContent = r.error; $('#login-err').hidden = false; }
    else { $('#login-ok').textContent = 'Revisa tu email — te mandamos un link de acceso'; $('#login-ok').hidden = false; }
    return;
  }

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password }),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) { $('#login-err').textContent = data.error || 'Login fallido'; $('#login-err').hidden = false; return; }
    checkAuth();
  } catch (e) {
    $('#login-err').textContent = 'Excepción: ' + e.message;
    $('#login-err').hidden = false;
  }
}

$('#login-form').addEventListener('submit', doLogin);
document.querySelector('#login-form button[type=submit]')?.addEventListener('click', (ev) => {
  if (!ev.defaultPrevented) doLogin(ev);
});

$('#magic-link').addEventListener('click', async () => {
  const email = $('#login-email').value;
  if (!email) { $('#login-err').textContent = 'Ingresa tu email primero'; $('#login-err').hidden = false; return; }
  const r = await sendMagicLinkViaServer(email);
  if (r.error) { $('#login-err').textContent = r.error; $('#login-err').hidden = false; }
  else { $('#login-ok').textContent = 'Revisa tu email — te mandamos un link'; $('#login-ok').hidden = false; }
});

// Branding logo load
async function loadBranding() {
  const img = document.querySelector('#brand-logo-img');
  const mark = document.querySelector('#brand-logo-mark');
  try {
    const r = await fetch('/api/settings?t=' + Date.now());
    const settings = r.ok ? await r.json() : {};
    const logoUrl = settings.logo_url?.url;
    if (img && mark) {
      if (logoUrl) {
        img.src = logoUrl;
        img.hidden = false;
        mark.style.display = 'none';
      } else {
        img.hidden = true; img.removeAttribute('src');
        mark.style.display = '';
        mark.textContent = 'G';
      }
    }
    renderTopBanner(settings.banner);
  } catch {
    if (img && mark) {
      img.hidden = true;
      mark.style.display = '';
      mark.textContent = 'G';
    }
  }
}

function renderTopBanner(banner) {
  let host = document.querySelector('#top-banner');
  if (!banner?.enabled || !banner.text) {
    if (host) host.remove();
    return;
  }
  // Dismiss persistente por hash del contenido (vuelve a aparecer si cambian)
  const fp = btoa(unescape(encodeURIComponent(`${banner.text}|${banner.link}|${banner.bg_color}`))).slice(0, 24);
  if (localStorage.getItem('g66_banner_dismiss') === fp) {
    if (host) host.remove();
    return;
  }
  if (!host) {
    host = document.createElement('div');
    host.id = 'top-banner';
    document.body.insertBefore(host, document.body.firstChild);
  }
  host.style.cssText = `padding:11px 18px;color:white;background:${banner.bg_color || '#1F49B6'};display:flex;justify-content:space-between;align-items:center;font-size:13.5px;font-weight:500;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,0.08)`;
  const textHtml = banner.link
    ? `<a href="${banner.link}" target="_blank" style="color:white;text-decoration:underline">${banner.text}</a>`
    : `<span>${banner.text}</span>`;
  host.innerHTML = `${textHtml}<button type="button" id="top-banner-close" style="background:none;border:none;color:white;cursor:pointer;font-size:18px;padding:0 6px;line-height:1;opacity:0.8">✕</button>`;
  document.querySelector('#top-banner-close').addEventListener('click', () => {
    localStorage.setItem('g66_banner_dismiss', fp);
    host.remove();
  });
}

window.addEventListener('hashchange', route);

async function route() {
  const hash = location.hash.slice(1) || 'dashboard';
  const [page, ...params] = hash.split('/');
  document.querySelectorAll('#nav a, aside nav a').forEach((a) => a.classList.toggle('active', a.getAttribute('href').slice(1).split('/')[0] === page));
  loading.hidden = false; view.innerHTML = '';
  try {
    if (page === 'intake') return await intakeForm(params);
    if (page === 'users') return await usersPage();
    if (page === 'matriz') return await matrizPage();
    await (pages[page] ?? pages.dashboard)(params);
  }
  catch (e) { view.innerHTML = `<div class="err">${e.message}</div>`; }
  finally { loading.hidden = true; }
}

async function q(table, qs = '') {
  // Proxy server-side: la cookie httpOnly viaja sola; el server aplica RLS con el JWT.
  const params = qs ? `&${qs}` : '';
  const r = await fetch(`/api/data?table=${encodeURIComponent(table)}${params}`, {
    credentials: 'include',
  });
  if (!r.ok) throw new Error(`${table}: ${r.status} ${await r.text()}`);
  return r.json();
}

function renderFunnel(phasesData) {
  const byPhase = Object.fromEntries((phasesData ?? []).map((r) => [r.current_phase, r]));
  const rejected = byPhase['rejected']?.total ?? 0;
  const totalIn = FUNNEL_ORDER.reduce((a, p) => a + (byPhase[p]?.total ?? 0), 0);
  return `
    <div class="funnel">
      ${FUNNEL_ORDER.map((p, i) => {
        const row = byPhase[p];
        const total = row?.total ?? 0;
        const greenC = row?.green ?? 0;
        const yellowC = row?.yellow ?? 0;
        const redC = row?.red ?? 0;
        const meta = FUNNEL_META[p];
        const pct = totalIn ? Math.round((total / totalIn) * 100) : 0;
        return `
          <div class="funnel-stage" style="--funnel-color:${meta.color}">
            <div class="funnel-icon">${meta.icon}</div>
            <div class="funnel-label">${i + 1}. ${meta.label}</div>
            <div class="funnel-count">${total}</div>
            <div class="funnel-bar"><div class="funnel-bar-fill" style="width:${pct}%"></div></div>
            <div class="funnel-semaforos">
              ${greenC ? `<span title="Verde">🟢 ${greenC}</span>` : ''}
              ${yellowC ? `<span title="Amarillo">🟡 ${yellowC}</span>` : ''}
              ${redC ? `<span title="Rojo">🔴 ${redC}</span>` : ''}
            </div>
          </div>
          ${i < FUNNEL_ORDER.length - 1 ? '<div class="funnel-arrow">→</div>' : ''}
        `;

}

async function downloadFile(apiUrl) {
  try {

    if (!r.ok) throw new Error(await r.text());
    const j = await r.json();
    if (j.url) window.open(j.url, '_blank');

  } catch (e) {
    alert('Error descargando archivo: ' + e.message);

}

// ─── Stepper visual + Approval panel ────────────────────────────────────────

function renderStepper(r) {
  const phase = r.current_phase;
  const intRejected = r.internal_approval_status === 'rejected';
  // PR-B realmente paralelo: nodo 2 = aprobaciones internas Slack, nodo 3 = datos proveedor.
  // Ambos arrancan simultáneamente apenas se crea la solicitud (POST /api/intake).
  const providerDone = r.provider_data_completed_at != null || r.profile_completed_at != null;
  const approvalsDone = r.internal_approvals_completed_at != null;
  const arrancoParalelo = phase === 'parallel' || phase === 'fase2' || phase === 'fase3' || phase === 'signed';

  function stateOf(num) {
    if (intRejected || phase === 'rejected') return num === 1 ? 'done' : 'rejected';
    if (num === 1) {
      // Solicitud — done apenas creada (siempre)
      return 'done';
    }
    if (num === 2) {
      // Aprobaciones internas Slack (compliance + legal + admin)
      if (approvalsDone) return 'done';
      if (arrancoParalelo) return 'active';
      return 'pending';
    }
    if (num === 3) {
      // Datos proveedor (mail magic-link → llena form + sube docs)
      if (providerDone) return 'done';
      if (arrancoParalelo) return 'active';
      return 'pending';
    }
    if (num === 4) {
      // Validación docs + RegCheq AML/PEP — empieza cuando ambos branches paralelos terminaron
      if (phase === 'signed') return 'done';
      if (phase === 'fase3') return 'active';
      return 'pending';
    }
    if (num === 5) {
      if (phase === 'signed') return 'done';
      if (phase === 'fase3' && approvalsDone && providerDone) return 'active';
      return 'pending';
    }
    if (num === 6) return phase === 'signed' ? 'done' : 'pending';
    return 'pending';
  }

  const stages = {
    1: { num: 1, label: 'Se creó solicitud',  who: 'Solicitante',  icon: '📝', assignee: r.solicitante_email, date: r.created_at },
    2: { num: 2, label: 'Aprobación interna', who: 'Compliance + Legal + Admin', icon: '✅', assignee: r.internal_approver_email ?? 'Slack: compliance + legal + admin', date: r.internal_approvals_completed_at },
    3: { num: 3, label: 'Datos proveedor',    who: 'Proveedor',    icon: '🏢', assignee: r.email_contacto ?? '—', date: r.provider_data_completed_at ?? r.profile_completed_at },
    4: { num: 4, label: 'Validación docs',    who: 'IA + Compliance', icon: '🔍', assignee: 'compliance@global66.com', date: r.current_phase === 'fase3' || r.current_phase === 'signed' ? r.updated_at : null },
    5: { num: 5, label: 'Firma',              who: 'Apoderado',    icon: '✍️', assignee: r.sociedad_apoderado_email ?? 'Pendiente apoderado', date: r.current_phase === 'signed' ? r.updated_at : null },
    6: { num: 6, label: 'Cerrado',            who: 'Sistema',      icon: '🏁', assignee: '—', date: r.current_phase === 'signed' ? r.updated_at : null },
  };

  function nodeHtml(s, state) {
    const cls = state === 'rejected' ? 'flow-node-rejected' : state === 'done' ? 'flow-node-done' : state === 'active' ? 'flow-node-active' : 'flow-node-pending';
    const statusLabel = state === 'done' ? 'Aprobado' : state === 'rejected' ? 'Rechazado' : state === 'active' ? 'En curso' : 'Pendiente';
    const statusCls = state === 'done' ? 'lever-pill-done' : state === 'rejected' ? 'lever-pill-rejected' : state === 'active' ? 'lever-pill-active' : 'lever-pill-pending';
    // Fecha formato dd/mmm/yyyy con slashes (estilo Finnecto)
    const date = s.date
      ? (() => {
          const d = new Date(s.date);
          const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
          return `${String(d.getDate()).padStart(2,'0')}/${months[d.getMonth()]}/${d.getFullYear()}`;
        })()
      : '';

    const email = (s.assignee ?? '').toLowerCase();
    const profile = (window.__userProfiles ?? {})[email];
    const hasAssignee = s.assignee && !s.assignee.startsWith('Pendiente') && !s.assignee.startsWith('compliance@') && s.assignee !== '—';
    const displayName = profile?.display_name || (hasAssignee ? s.assignee.split('@')[0].replace(/\./g, ' ').replace(/\b\w/g, c => c.toUpperCase()) : '—');
    const area = profile?.roles?.[0] ?? s.who;
    const avatarUrl = profile?.avatar_url;
    const avatarHtml = avatarUrl
      ? `<img src="${avatarUrl}" class="lever-avatar" alt="">`
      : `<div class="lever-avatar"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a4 4 0 100-8 4 4 0 000 8zm0 2c-3 0-9 1.5-9 5v1h18v-1c0-3.5-6-5-9-5z"/></svg></div>`;

    return `<div class="flow-node lever-node ${cls}">
      <div class="lever-header">
        <span class="lever-pill ${statusCls}">${statusLabel}</span>
        ${date ? `<span class="lever-date">${date}</span>` : ''}
      </div>
      <div class="lever-title">${s.label}</div>
      <div class="lever-person">
        ${avatarHtml}
        <div class="lever-person-info">
          <div class="lever-person-name">${displayName}</div>
          <div class="lever-person-area">${area}</div>
        </div>
      </div>
      ${state === 'active' ? '<div class="flow-node-pulse"></div>' : ''}
    </div>`;
  }

  const arrow = '<div class="flow-edge"><svg width="48" height="14" viewBox="0 0 48 14"><path d="M0 7 L40 7 M34 1 L40 7 L34 13" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>';
  const splitMerge = (dir) => `<div class="flow-split flow-split-${dir}"></div>`;

  return `<div class="flow-canvas-wrap">
    <div class="flow-zoom">
      <button type="button" title="Zoom in" onclick="flowZoom(1)">+</button>
      <button type="button" title="Zoom out" onclick="flowZoom(-1)">−</button>
      <button type="button" title="Ajustar" onclick="flowZoom(0)">⛶</button>
    </div>
    <div class="flow-canvas">
      <div class="flow-canvas-inner">
        ${nodeHtml(stages[1], stateOf(1))}
        ${splitMerge('split')}
        <div class="flow-parallel-col">
          <div class="flow-parallel-tag">paralelo</div>
          <div class="flow-parallel-stack">
            ${nodeHtml(stages[2], stateOf(2))}
            ${nodeHtml(stages[3], stateOf(3))}
          </div>
        </div>
        ${splitMerge('merge')}
        ${nodeHtml(stages[4], stateOf(4))}
        ${arrow}
        ${nodeHtml(stages[5], stateOf(5))}
        ${arrow}
        ${nodeHtml(stages[6], stateOf(6))}
      </div>
    </div>
  </div>`;
}

window.__flowZoom = 1;
function flowZoom(dir) {
  const inner = document.querySelector('.flow-canvas-inner');
  if (!inner) return;
  if (dir === 0) window.__flowZoom = 1;
  else window.__flowZoom = Math.max(0.5, Math.min(1.8, window.__flowZoom + dir * 0.1));
  inner.style.transform = `scale(${window.__flowZoom})`;
}

function shouldShowSignaturePanel(r) {
  // Nodo 5: aprobación interna completada + docs validados o avanzados, sin firma todavía.
  if (!r) return false;
  if (r.current_phase === 'signed' || r.current_phase === 'rejected' || r.current_phase === 'cancelled') return false;
  return r.internal_approval_status === 'approved' && ['fase2', 'fase3'].includes(r.current_phase);
}

function renderSignaturePanel(r) {

      <span class="pill blue">paso final</span>
    </div>
