<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Global66 — Plataforma Contratos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-50:  #f5f7fe;
    --blue-100: #E9EDF8;
    --blue-200: #9ba9d0;
    --blue-400: #3F5EDF;
    --blue-500: #1F49B6;
    --blue-600: #003eea;
    --blue-700: #102a97;
    --blue-800: #0b1f4b;
    --blue-900: #132046;
    --green:    #02A757;
    --mint:     #33d9b2;
    --red:      #e64a4a;
    --yellow:   #f0b429;
    --text:     #132046;
    --muted:    #565656;
    --bg:       #ffffff;
    --surface:  #f5f7fe;
    --border:   #E9EDF8;
    --shadow-sm: 0 1px 2px rgba(19,32,70,0.04);
    --shadow:    0 1px 3px rgba(19,32,70,0.04), 0 8px 24px rgba(19,32,70,0.06);
    --shadow-lg: 0 4px 12px rgba(19,32,70,0.08), 0 20px 60px rgba(19,32,70,0.12);
    --radius:    14px;
    --radius-sm: 8px;
    --radius-pill: 999px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0 }
  html, body { background: var(--bg); color: var(--text); font: 14px/1.55 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; -webkit-font-smoothing: antialiased }
  h1, h2, h3, h4 { font-family: 'Montserrat', sans-serif; font-weight: 700; letter-spacing: -0.01em }
  h1 { font-size: 22px }
  h2 { font-size: 28px; letter-spacing: -0.02em }
  h3 { font-size: 16px }
  a { color: var(--blue-500); text-decoration: none }
  a:hover { color: var(--blue-600) }
  button { font-family: inherit; cursor: pointer }
  input, select, textarea { font-family: inherit }

  /* ─── Layout ─────────────────────────────────────────── */
  .shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh }
  aside {
    background: var(--blue-900); color: white;
    padding: 24px 16px; display: flex; flex-direction: column; gap: 4px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .logo { display: flex; align-items: center; gap: 10px; padding: 8px 12px 28px; }
  .logo-mark {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--blue-400), var(--mint));
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: white; font-family: 'Montserrat'; font-size: 18px;
  }
  .logo-text { font-family: 'Montserrat'; font-weight: 800; font-size: 15px; letter-spacing: -0.02em; line-height: 1.1 }
  .logo-text small { display: block; color: var(--blue-200); font-weight: 500; font-size: 11px; letter-spacing: 0 }

  nav a {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: var(--radius-sm);
    color: rgba(255,255,255,0.7); font-weight: 500; font-size: 13.5px;
    transition: all .15s ease;
  }
  nav a:hover { background: rgba(255,255,255,0.06); color: white }
  nav a.active { background: var(--blue-500); color: white; box-shadow: 0 4px 12px rgba(31,73,182,0.4) }
  nav a svg { width: 18px; height: 18px; opacity: 0.85 }

  .nav-section { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--blue-200); padding: 16px 12px 6px; font-weight: 600 }

  .nav-bottom { margin-top: auto; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 12px; color: var(--blue-200) }
  .nav-bottom .user-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--blue-500); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 13px; font-family: 'Montserrat'; flex-shrink: 0 }
  .avatar-wrap { position: relative; width: 32px; height: 32px; flex-shrink: 0 }
  .avatar-img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; display: block }
  .avatar-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 14px }
  .avatar-wrap:hover .avatar-overlay { display: flex }
  .comment-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; background: var(--blue-500); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 12px; font-family: 'Montserrat'; overflow: hidden }
  .comment-avatar img { width: 100%; height: 100%; object-fit: cover; display: block }
  .mention-avatar { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; background: var(--blue-100); color: var(--blue-700); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 11px; overflow: hidden }
  .mention-avatar img { width: 100%; height: 100%; object-fit: cover; display: block }
  .nav-bottom button { width: 100%; margin-top: 8px; background: transparent; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); padding: 8px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500 }
  .nav-bottom button:hover { background: rgba(255,255,255,0.06); color: white }

  main { padding: 32px 40px; max-width: 1400px; width: 100%ds }

  /* ─── Login ─────────────────────────────────────────── */
  .login-shell { min-height: 100vh; display: grid; place-items: center; background: linear-gradient(135deg, var(--blue-50), white) }
  .login-card {
    background: white; padding: 40px; border-radius: 20px;
    box-shadow: var(--shadow-lg); width: 100%; max-width: 420px;
    text-align: center;
  }
  .login-card .logo { justify-content: center; padding: 0 0 20px }
  .login-card h1 { margin-bottom: 8px }
  .login-card > p { color: var(--muted); margin-bottom: 28px; font-size: 14px }
  .login-card form { display: flex; flex-direction: column; gap: 12px; text-align: left }

  /* ─── Forms ─────────────────────────────────────────── */
  input[type=text],input[type=email],input[type=password],input[type=search],select,textarea {
    background: white; color: var(--text);
    border: 1.5px solid var(--border); padding: 11px 14px;
    border-radius: var(--radius-sm); font-size: 14px;
    transition: all .15s ease; width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--blue-500); box-shadow: 0 0 0 4px rgba(31,73,182,0.08) }
  label { font-size: 12.5px; font-weight: 500; color: var(--muted); margin-bottom: 4px; display: block }

  button.primary {
    background: var(--blue-500); color: white; border: none;
    padding: 11px 22px; border-radius: var(--radius-pill);
    font-weight: 600; font-size: 14px; letter-spacing: -0.01em;
    transition: all .15s ease;
    box-shadow: 0 2px 6px rgba(31,73,182,0.25);
  }
  button.primary:hover { background: var(--blue-600); box-shadow: 0 4px 14px rgba(31,73,182,0.35); transform: translateY(-1px) }
  button.secondary {
    background: white; color: var(--blue-500);
    border: 1.5px solid var(--blue-100);
    padding: 11px 22px; border-radius: var(--radius-pill);
    font-weight: 600; font-size: 14px;
  }
  button.secondary:hover { border-color: var(--blue-500); background: var(--blue-50) }
  button.ghost { background: transparent; color: var(--muted); border: none; padding: 8px 12px; border-radius: var(--radius-sm); font-weight: 500; font-size: 13px }
  button.ghost:hover { color: var(--text); background: var(--surface) }

  /* ─── Stepper ───────────────────────────────────────── */
  .stepper { display: flex; gap: 0; margin: 8px 0 24px; align-items: stretch; flex-wrap: wrap }
  .step { flex: 1; min-width: 130px; display: flex; flex-direction: column; align-items: center; padding: 14px 8px; position: relative; background: white; border: 1px solid var(--border); border-radius: var(--radius); margin-right: -1px }
  .step:first-child { border-radius: var(--radius) 0 0 var(--radius) }
  .step:last-child { border-radius: 0 var(--radius) var(--radius) 0; margin-right: 0 }
  .step .num { width: 30px; height: 30px; border-radius: 50%; background: var(--blue-100); color: var(--blue-700); display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: 'Montserrat'; font-size: 13px; margin-bottom: 6px }
  .step .label { font-size: 12px; font-weight: 600; text-align: center; color: var(--text) }
  .step .who { font-size: 10px; color: var(--muted); margin-top: 3px; text-align: center }
  .step.done { background: var(--blue-50); border-color: var(--blue-200) }
  .step.done .num { background: var(--green); color: white }
  .step.active { background: white; border-color: var(--blue-500); border-width: 2px; box-shadow: 0 4px 14px rgba(31,73,182,0.15) }
  .step.active .num { background: var(--blue-500); color: white; box-shadow: 0 0 0 4px rgba(31,73,182,0.15) }
  .step.rejected { background: rgba(230,74,74,0.05); border-color: var(--red) }
  .step.rejected .num { background: var(--red); color: white }

  /* ─── Cards ─────────────────────────────────────────── */
  .grid { display: grid; gap: 16px; margin-bottom: 24px }
  .grid-4 { grid-template-columns: repeat(auto-fit, minmax(220px,1fr)) }
  .grid-2 { grid-template-columns: repeat(auto-fit, minmax(360px,1fr)) }

  .card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow-sm); transition: box-shadow .2s ease }
  .card.lift:hover { box-shadow: var(--shadow) }
  .stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 600; margin-bottom: 8px }
  .stat-num { font-family: 'Montserrat'; font-size: 32px; font-weight: 700; line-height: 1; letter-spacing: -0.025em; color: var(--blue-800) }
  .stat-num small { font-size: 14px; color: var(--muted); font-weight: 500; margin-left: 6px; letter-spacing: 0 }
  .stat-delta { color: var(--green); font-size: 12px; margin-top: 8px; font-weight: 500 }

  /* ─── Tables ────────────────────────────────────────── */
  .table-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm) }
  table { width: 100%; border-collapse: collapse; font-size: 13px }
  th, td { text-align: left; padding: 14px 18px; border-bottom: 1px solid var(--border) }
  th { background: var(--surface); color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em }
  tr:last-child td { border-bottom: none }
  tr.clickable { cursor: pointer; transition: background .12s ease }
  tr.clickable:hover td { background: var(--blue-50) }
  td.muted { color: var(--muted) }
  td.right { text-align: right; font-variant-numeric: tabular-nums }

  /* ─── Pills ─────────────────────────────────────────── */
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: var(--radius-pill); font-size: 12px; font-weight: 600; line-height: 1.6 }
  .pill.green  { background: rgba(2,167,87,0.1);   color: var(--green) }
  .pill.yellow { background: rgba(240,180,41,0.12); color: #a8780a }
  .pill.red    { background: rgba(230,74,74,0.1);  color: var(--red) }
  .pill.blue   { background: var(--blue-100);       color: var(--blue-700) }
  .pill.gray   { background: #f0f2f6;               color: var(--muted) }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor }

  /* ─── Misc ──────────────────────────────────────────── */
  .toolbar { display: flex; gap: 12px; margin-bottom: 18px; align-items: center; flex-wrap: wrap }
  .toolbar input, .toolbar select { max-width: 320px }
  .breadcrumb { color: var(--muted); font-size: 13px; margin-bottom: 8px }
  .breadcrumb a { color: var(--muted) }
  .breadcrumb a:hover { color: var(--blue-500) }
  .header-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap }

  .timeline { list-style: none; border-left: 2px solid var(--border); padding-left: 24px; margin-left: 4px }
  .timeline li { position: relative; padding: 10px 0; font-size: 13px }
  .timeline li::before { content: ''; position: absolute; left: -31px; top: 16px; width: 12px; height: 12px; border-radius: 50%; background: var(--blue-500); border: 2px solid white; box-shadow: 0 0 0 1px var(--blue-100) }
  .timeline .ts { color: var(--muted); font-size: 11px; margin-top: 2px; display: block }

  dl.props { display: grid; grid-template-columns: minmax(120px, 180px) minmax(0, 1fr); gap: 10px 18px; font-size: 14px; align-items: baseline }
  dl.props dt { color: var(--muted); font-weight: 500; white-space: nowrap }
  dl.props dd { font-weight: 500; color: var(--text); word-break: break-word; overflow-wrap: anywhere; min-width: 0 }

  .err { background: rgba(230,74,74,0.08); border: 1px solid rgba(230,74,74,0.3); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--red); font-size: 13px; margin: 12px 0 }
  .ok  { background: rgba(2,167,87,0.08); border: 1px solid rgba(2,167,87,0.3); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--green); font-size: 13px; margin: 12px 0 }

  #loading { padding: 60px; text-align: center; color: var(--muted) }
  .empty { padding: 60px 20px; text-align: center; color: var(--muted) }
  .empty p { margin-top: 8px; font-size: 13px }

  pre { background: var(--surface); padding: 12px; border-radius: var(--radius-sm); font-size: 11px; overflow: auto; color: var(--text) }

  /* Flow canvas — workflow stages tipo Finnecto/n8n */
  .flow-canvas {
    display: flex; align-items: stretch; gap: 0; overflow-x: auto;
    padding: 24px 12px;
    background:
      linear-gradient(white, white) padding-box,
      radial-gradient(circle, rgba(31,73,182,0.08) 1px, transparent 1px) 0 0 / 18px 18px;
    background-color: #fafbff;
    border: 1px solid var(--border); border-radius: 14px;
    margin-bottom: 24px;
    box-shadow: inset 0 0 60px rgba(31,73,182,0.04);
  }
  .flow-node {
    position: relative;
    flex: 0 0 168px; max-width: 168px;
    background: white; border: 1.5px solid var(--border); border-radius: 12px;
    padding: 12px; text-align: left;
    box-shadow: 0 2px 8px rgba(19,32,70,0.06);
    transition: all .2s ease;
  }
  .flow-node:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(19,32,70,0.12) }
  .flow-node-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px }
  .flow-node-icon { font-size: 20px }
  .flow-node-num { width: 24px; height: 24px; border-radius: 50%; background: var(--border); color: var(--muted); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; font-family: 'Montserrat', sans-serif }
  .flow-node-label { font-weight: 700; font-size: 13px; color: var(--text); margin-bottom: 2px; letter-spacing: -0.01em }
  .flow-node-who { font-size: 11px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600 }
  .flow-node-assignee {
    font-size: 11.5px; color: var(--blue-700); font-weight: 500;
    background: var(--blue-50); padding: 4px 8px; border-radius: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .flow-node-done { border-color: var(--green); background: linear-gradient(180deg, white, rgba(2,167,87,0.04)) }
  .flow-node-done .flow-node-num { background: var(--green); color: white }
  .flow-node-done .flow-node-assignee { background: rgba(2,167,87,0.1); color: var(--green) }

  .flow-node-active { border-color: var(--blue-500); border-width: 2px; box-shadow: 0 6px 24px rgba(31,73,182,0.2) }
  .flow-node-active .flow-node-num { background: var(--blue-500); color: white }
  .flow-node-active .flow-node-label { color: var(--blue-700) }

  .flow-node-pulse {
    position: absolute; inset: -6px; border-radius: 14px;
    border: 2px solid var(--blue-500); opacity: 0;
    animation: flow-pulse 2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes flow-pulse {
    0%   { opacity: 0.7; transform: scale(0.98) }
    100% { opacity: 0;   transform: scale(1.04) }
  }

  .flow-node-rejected { border-color: var(--red); background: linear-gradient(180deg, white, rgba(230,74,74,0.04)) }
  .flow-node-rejected .flow-node-num { background: var(--red); color: white }
  .flow-node-rejected .flow-node-label { color: var(--red) }

  .flow-node-pending { opacity: 0.55 }
  .flow-node-pending:hover { opacity: 1 }

  .flow-edge { display: flex; align-items: center; padding: 0 4px; color: var(--blue-200) }
  .flow-node-done + .flow-edge, .flow-node-active + .flow-edge { color: var(--blue-500) }

  @media (max-width: 1100px) {
    .flow-canvas { padding: 16px 8px }
    .flow-node { flex-basis: 150px; max-width: 150px }
  }

  /* Dashboard funnel (PR3-fix UX) */
  .funnel { display: flex; align-items: stretch; gap: 6px; overflow-x: auto; padding: 4px 0 }
  .funnel-stage {
    flex: 1; min-width: 140px;
    background: linear-gradient(180deg, white, color-mix(in srgb, var(--funnel-color) 8%, white));
    border: 1px solid color-mix(in srgb, var(--funnel-color) 20%, var(--border));
    border-radius: 12px; padding: 14px 12px; text-align: center;
    box-shadow: 0 1px 3px rgba(19,32,70,0.04);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .funnel-stage:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(19,32,70,0.08) }
  .funnel-icon { font-size: 22px; margin-bottom: 4px }
  .funnel-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); font-weight: 600; margin-bottom: 6px }
  .funnel-count { font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 700; color: var(--funnel-color); line-height: 1; letter-spacing: -0.02em }
  .funnel-bar { height: 4px; background: var(--border); border-radius: 99px; margin: 8px 0 6px; overflow: hidden }
  .funnel-bar-fill { height: 100%; background: var(--funnel-color); border-radius: 99px; transition: width .6s ease }
  .funnel-semaforos { font-size: 10.5px; color: var(--muted); display: flex; gap: 6px; justify-content: center; min-height: 14px }
  .funnel-arrow { display: flex; align-items: center; color: var(--muted); font-size: 18px; opacity: 0.5; padding: 0 2px }

  .approval-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px }
  .approval-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px }
  .approval-team { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 600; margin-bottom: 6px }
  .approval-hours { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 700; color: var(--blue-800); line-height: 1 }
  .approval-hours small { font-size: 11px; color: var(--muted); font-weight: 500; margin-left: 4px; letter-spacing: 0 }
  .approval-counts { display: flex; gap: 6px; margin-top: 10px }

  /* Tally-style form (PR4) */
  .tally-shell { display: flex; flex-direction: column; gap: 14px }
  .tally-topbar { display: flex; flex-direction: column; gap: 6px; padding: 4px 2px }
  .tally-progress { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden }
  .tally-progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--blue-500), var(--mint));
    border-radius: 99px; transition: width .35s cubic-bezier(.22,.61,.36,1);
  }
  .tally-step-meta { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: var(--blue-700); letter-spacing: 0.02em }
  .tally-step-meta .muted { font-weight: 500 }

  .tally-step { animation: none }
  .tally-step.tally-enter { animation: tally-slide 0.32s cubic-bezier(.22,.61,.36,1) both }
  @keyframes tally-slide {
    0%   { opacity: 0; transform: translateY(14px) }
    100% { opacity: 1; transform: translateY(0) }
  }

  .tally-nav {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 0 8px;
    position: sticky; bottom: 0;
    background: linear-gradient(transparent, white 30%);
  }
  .tally-nav .ghost { padding: 10px 16px }

  .tally-review {
    background: var(--surface); border-radius: 12px; padding: 4px 0;
    border: 1px solid var(--border);
  }
  .tally-review-row {
    display: grid; grid-template-columns: minmax(140px, 200px) 1fr;
    gap: 12px 18px; padding: 12px 18px;
    border-bottom: 1px solid var(--border); font-size: 13.5px;
  }
  .tally-review-row:last-child { border-bottom: none }
  .tally-review-key { color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; font-size: 11px }
  .tally-review-val { color: var(--text); font-weight: 500; word-break: break-word }

  /* Date field — pill styling consistente (PR3-fix) */
  .date-field { position: relative }
  .date-field input[type=date] {
    appearance: none; -webkit-appearance: none;
    background: white; color: var(--text);
    border: 1.5px solid var(--border); padding: 11px 38px 11px 14px;
    border-radius: var(--radius-sm); font-size: 14px;
    width: 100%; transition: all .15s ease;
    font-family: inherit;
  }
  .date-field input[type=date]:focus { outline: none; border-color: var(--blue-500); box-shadow: 0 0 0 4px rgba(31,73,182,0.08) }
  .date-field input[type=date]:hover { border-color: var(--blue-200) }
  .date-field input[type=date]::-webkit-calendar-picker-indicator {
    opacity: 0; cursor: pointer; position: absolute; right: 0; top: 0; bottom: 0; width: 100%; margin: 0;
  }
  .date-field .date-icon {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);

  /* Dropzones (PR2) */

  .dropzone.drag { border-color: var(--blue-500); background: rgba(31,73,182,0.05) }

  .drop-remove { border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 18px; padding: 0 4px }
  .drop-remove:hover { color: var(--red) }

  /* Doc viewer + comments (PR2) */
  .doc-viewer-wrap { display: grid; grid-template-columns: minmax(0,1fr) 360px; gap: 16px; margin-top: 16px }
  .doc-preview { background: white; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; min-height: 520px; display: flex; flex-direction: column }
  .doc-preview-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; font-size: 13px; background: var(--surface) }
  .doc-preview-body { flex: 1; overflow: auto; padding: 16px; background: #fafbff }
  .doc-preview-body iframe { width: 100%; height: 100%; min-height: 480px; border: none }
  .doc-preview-body .docx-render { background: white; padding: 28px; max-width: 760px; margin: 0 auto; box-shadow: 0 1px 6px rgba(19,32,70,0.08); font-family: 'Inter', sans-serif }
  .doc-preview-body .docx-render p { margin: 8px 0 }
  .doc-preview-body .docx-render h1, .doc-preview-body .docx-render h2 { margin: 12px 0 6px }

  .doc-files-list { display: flex; flex-direction: column; gap: 4px; padding: 10px 14px; border-bottom: 1px solid var(--border); background: white; font-size: 12.5px }
  .doc-files-list .file-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: var(--blue-50); color: var(--blue-700); cursor: pointer; border: 1px solid transparent }
  .doc-files-list .file-pill.active { background: var(--blue-500); color: white }
  .doc-files-list .file-pill:hover:not(.active) { border-color: var(--blue-200) }

  .comments-panel { background: white; border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; max-height: 720px }
  .comments-header { padding: 12px 14px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; display: flex; justify-content: space-between; align-items: center }
  .comments-list { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; gap: 12px }
  .comment { background: var(--surface); border-radius: 10px; padding: 10px 12px; font-size: 13px }

  .comment-meta { display: flex; gap: 8px; align-items: center; font-size: 11.5px; color: var(--muted); margin-bottom: 4px }
  .comment-author { font-weight: 600; color: var(--text) }
  .comment-page { background: var(--blue-100); color: var(--blue-700); padding: 1px 6px; border-radius: 999px; font-weight: 600 }
  .comment-body { white-space: pre-wrap; word-break: break-word }
  .comment-body .mention { background: rgba(31,73,182,0.1); color: var(--blue-700); padding: 1px 6px; border-radius: 999px; font-weight: 500 }
  .comment-composer { border-top: 1px solid var(--border); padding: 12px 14px; position: relative }
  .comment-composer textarea { min-height: 60px; resize: vertical; font-size: 13px }
  .comment-composer .composer-row { display: flex; gap: 8px; align-items: center; margin-top: 8px }
  .comment-composer input[type=number] { width: 80px }
  .mention-popup { position: absolute; bottom: 80px; left: 14px; right: 14px; background: white; border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow); max-height: 220px; overflow-y: auto; z-index: 20 }
  .mention-popup .mention-item { padding: 8px 12px; cursor: pointer; font-size: 13px; display: flex; gap: 8px; align-items: center }
  .mention-popup .mention-item:hover, .mention-popup .mention-item.focus { background: var(--blue-50) }
  .mention-popup .mention-roles { color: var(--muted); font-size: 11px; margin-left: auto }

  /* PR3.2 — PDF text layer + highlights + selection FAB */
  .pdf-page { position: relative; margin: 0 auto 12px; box-shadow: 0 1px 6px rgba(19,32,70,0.1); background: white }
  .pdf-page canvas { display: block }
  .pdf-text-layer { position: absolute; inset: 0; overflow: hidden; line-height: 1; opacity: 1; pointer-events: auto }
  .pdf-text-layer > span, .pdf-text-layer > br { color: transparent; position: absolute; white-space: pre; cursor: text; transform-origin: 0% 0%; user-select: text }
  .pdf-text-layer ::selection { background: rgba(255,214,90,0.35); color: transparent }

  .docx-render ::selection { background: rgba(255,214,90,0.35) }
  .docx-render[contenteditable=true] { outline: 2px dashed var(--blue-400); outline-offset: 6px; padding: 16px; min-height: 400px }
  .docx-render[contenteditable=true]:focus { outline-color: var(--blue-500) }

  .anchor-highlight { background: linear-gradient(transparent 55%, rgba(255,214,90,0.65) 55%); cursor: pointer; padding: 0 1px; border-radius: 2px }
  .anchor-highlight:hover { background: linear-gradient(transparent 35%, rgba(255,214,90,0.85) 35%) }

  .selection-fab { position: fixed; z-index: 250; background: linear-gradient(135deg, #1F49B6, #3F5EDF); color: white; border: none; padding: 8px 14px; border-radius: 999px; font-size: 12.5px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 14px rgba(31,73,182,0.35); display: flex; align-items: center; gap: 6px }
  .selection-fab:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(31,73,182,0.45) }

  .anchor-quote { font-size: 12px; color: var(--muted); font-style: italic; background: rgba(255,214,90,0.12); border-left: 2px solid var(--yellow); padding: 4px 8px; border-radius: 4px; margin: 4px 0; line-height: 1.4 }

  .comment.flash { animation: comment-flash 1.4s ease-out }
  @keyframes comment-flash {
    0%   { background: rgba(255,214,90,0.4); transform: scale(1.02) }
    100% { background: var(--surface); transform: scale(1) }
  }

  /* AI edit modal (PR3) */
  .ai-modal { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px }
  .ai-modal-backdrop { position: absolute; inset: 0; background: rgba(11,31,75,0.55); backdrop-filter: blur(2px) }
  .ai-modal-card { position: relative; background: white; border-radius: 16px; box-shadow: var(--shadow-lg); padding: 28px; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto }
  .ai-modal-card h3 { font-family: 'Montserrat', sans-serif; font-size: 18px }
  .ai-modal-card textarea { width: 100%; min-height: 80px; resize: vertical; font-size: 13.5px; padding: 10px 12px; border-radius: 10px; border: 1.5px solid var(--border) }
  .ai-modal-card .err, .ai-modal-card .ok { font-size: 12.5px }

  /* Profile modal */
  .profile-modal-card { display: flex; flex-direction: column; gap: 18px; max-width: 440px }
  .profile-modal-card h3 { margin: 0; font-family: 'Montserrat', sans-serif; font-size: 18px; color: var(--blue-900) }
  .profile-avatar-big { width: 96px; height: 96px; border-radius: 50%; background: var(--blue-500); color: white; display: flex; align-items: center; justify-content: center; font-size: 38px; font-weight: 600; font-family: 'Montserrat'; margin: 0 auto; overflow: hidden; flex-shrink: 0 }
  .profile-avatar-big img { width: 100%; height: 100%; object-fit: cover }
  .profile-actions-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap }
  .profile-btn { padding: 8px 14px; border-radius: 8px; border: 1.5px solid var(--border); background: white; font-size: 13px; cursor: pointer; font-family: inherit; color: var(--blue-900) }
  .profile-btn:hover { background: var(--blue-50); border-color: var(--blue-500) }
  .profile-btn.danger { color: #c0392b; border-color: #f3c7c2 }
  .profile-btn.danger:hover { background: #fdecea; border-color: #c0392b }
  .profile-btn.primary { background: var(--blue-500); color: white; border-color: var(--blue-500) }
  .profile-btn.primary:hover { background: var(--blue-700); border-color: var(--blue-700) }
  .profile-field { display: flex; flex-direction: column; gap: 4px }
  .profile-field label { font-size: 12px; color: var(--text-muted); font-weight: 500 }
  .profile-field input { padding: 8px 10px; border-radius: 8px; border: 1.5px solid var(--border); font-size: 13.5px; font-family: inherit }
  .profile-field input:focus { outline: none; border-color: var(--blue-500) }
  .profile-field .readonly { padding: 8px 10px; border-radius: 8px; background: var(--blue-50); font-size: 13.5px; color: var(--blue-900) }
  .profile-footer { display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid var(--border); padding-top: 14px }
  .profile-msg { font-size: 12.5px; min-height: 16px }
  .profile-msg.err { color: #c0392b }
  .profile-msg.ok { color: #1e7e34 }

  /* Notif badge */
  .notif-bell { position: relative; cursor: pointer; padding: 6px 10px; border-radius: 999px; background: rgba(255,255,255,0.06); color: white; font-size: 14px }
  .notif-bell .badge { position: absolute; top: -2px; right: -2px; background: var(--red); color: white; border-radius: 999px; font-size: 10px; font-weight: 700; padding: 0 5px; min-width: 16px; text-align: center; line-height: 16px }
  .notif-popup { position: absolute; right: 16px; top: 60px; width: 340px; background: white; border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); z-index: 100; max-height: 480px; display: flex; flex-direction: column }
  .notif-popup-header { padding: 12px 14px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; display: flex; justify-content: space-between; align-items: center }
  .notif-popup-list { flex: 1; overflow-y: auto }
  .notif-item { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13px }
  .notif-item:hover { background: var(--surface) }
  .notif-item.unread { background: var(--blue-50) }
  .notif-item .notif-author { font-weight: 600; color: var(--blue-700) }
  .notif-item .notif-time { color: var(--muted); font-size: 11px }

  @media (max-width: 900px) {
    .doc-viewer-wrap { grid-template-columns: 1fr }
  }

  /* Risk severity */
  .risk { display: flex; gap: 10px; padding: 10px 0; align-items: flex-start; border-bottom: 1px solid var(--border) }
  .risk:last-child { border-bottom: none }
  .risk b { color: var(--text); font-weight: 600 }
  .risk span.desc { color: var(--muted); font-size: 13px; display: block; margin-top: 2px }

  @media (max-width: 900px) {
    .shell { grid-template-columns: 1fr }
    aside { position: relative; height: auto; flex-direction: row; flex-wrap: wrap; gap: 6px; padding: 16px }
    .logo, .nav-section, .nav-bottom { display: none }
    main { padding: 20px }
  }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen" class="login-shell" style="display:none" hidden>
  <div class="login-card">

    </div>

        <label>Email corporativo</label>

          <div class="avatar-overlay">⚙</div>

<script type="module">
const $ = (s) => document.querySelector(s);
const view = $('#view');
const loading = $('#loading');

// Estado auth poblado por checkAuth().
window.__me = null;
window.__role = null;
window.__roles = [];

function hasRole(r) {
  return Array.isArray(window.__roles) && window.__roles.includes(r);
}
window.hasRole = hasRole;

function showAuthBanner(msg) {
  document.body.insertAdjacentHTML('afterbegin',
    `<div style="position:fixed;top:0;left:0;right:0;background:#e64a4a;color:white;padding:14px;text-align:center;z-index:9999;font-family:system-ui">Auth error: ${msg}</div>`);
}

async function checkAuth() {
  // Quita banner de error si la URL trae auth_error.
  const qs = new URLSearchParams(location.search);
  if (qs.get('auth_error')) {
    showAuthBanner(qs.get('auth_error'));
    history.replaceState(null, '', location.pathname);
  }

  let me = null;
  try {
    const r = await fetch('/api/auth/me', { credentials: 'include' });
    if (r.ok) me = await r.json();
  } catch {}

  if (!me?.ok) {
    $('#login-screen').hidden = false; $('#login-screen').style.display = '';
    $('#app-shell').hidden = true;
    return;
  }

  window.__me = me;
  window.__roles = me.roles ?? [];
  window.__role = me.roles?.includes('admin') ? 'admin' : (me.roles?.[0] ?? 'solicitante');

  $('#login-screen').hidden = true; $('#login-screen').style.display = 'none';
  $('#app-shell').hidden = false;

  const email = me.email ?? '';
  $('#user-email').textContent = email + (me.bypass ? ' · DEV' : '');
  const name = me.display_name ?? email.split('@')[0].replace(/\./g, ' ').replace(/\b\w/g, l => l.toUpperCase());
  $('#user-name').textContent = name;
  $('#avatar').textContent = (email[0] ?? '?').toUpperCase();
  const avImg = $('#avatar-img');
  if (me.avatar_url) {
    avImg.src = me.avatar_url + '?t=' + Date.now();
    avImg.hidden = false;
    $('#avatar').style.display = 'none';
  } else {
    avImg.hidden = true;
    $('#avatar').style.display = '';
  }
  $('#nav-users').hidden = !hasRole('admin');
  route();
}

// ===== Profile modal =====
function syncSidebarAvatar() {
  const me = window.__me ?? {};
  const email = me.email ?? '';
  const img = document.querySelector('#avatar-img');
  const ph = document.querySelector('#avatar');
  ph.textContent = (email[0] ?? '?').toUpperCase();
  if (me.avatar_url) {
    img.src = me.avatar_url + '?t=' + Date.now();
    img.hidden = false;
    ph.style.display = 'none';
  } else {
    img.hidden = true;
    img.removeAttribute('src');
    ph.style.display = '';
  }
  const name = me.display_name ?? email.split('@')[0].replace(/\./g, ' ').replace(/\b\w/g, l => l.toUpperCase());
  document.querySelector('#user-name').textContent = name;
}

function renderProfileAvatar(container) {
  const me = window.__me ?? {};
  const email = me.email ?? '';
  if (me.avatar_url) {
    container.innerHTML = `<img src="${me.avatar_url}?t=${Date.now()}" alt="">`;
  } else {
    container.textContent = (email[0] ?? '?').toUpperCase();
  }
}

function setProfileMsg(text, kind) {
  const el = document.querySelector('#profile-msg');
  if (!el) return;
  el.textContent = text ?? '';
  el.className = 'profile-msg' + (kind ? ' ' + kind : '');
}

function closeProfileModal() {
  document.querySelector('#profile-modal')?.remove();
}

function openProfileModal() {
  closeProfileModal();
  const me = window.__me ?? {};
  const email = me.email ?? '';
  const roles = (window.__roles ?? []).join(', ') || '—';
  const m = document.createElement('div');
  m.id = 'profile-modal';
  m.className = 'ai-modal';
  m.innerHTML = `
    <div class="ai-modal-backdrop" data-close="1"></div>
    <div class="ai-modal-card profile-modal-card">
      <h3>Mi perfil</h3>
      <div id="profile-avatar-big" class="profile-avatar-big"></div>
      <div class="profile-actions-row">
        <button type="button" class="profile-btn" id="profile-change-photo">Cambiar foto</button>
        <button type="button" class="profile-btn danger" id="profile-remove-photo" ${me.avatar_url ? '' : 'disabled style="opacity:0.5;cursor:not-allowed"'}>Eliminar foto</button>
      </div>
      <div class="profile-field">
        <label for="profile-display-name">Nombre</label>
        <input id="profile-display-name" type="text" maxlength="80" value="${(me.display_name ?? '').replace(/"/g, '&quot;')}" placeholder="Tu nombre">
      </div>
      <div class="profile-field">
        <label>Email</label>
        <div class="readonly">${email}</div>
      </div>
      <div class="profile-field">
        <label>Roles</label>
        <div class="readonly">${roles}</div>
      </div>
      <div id="profile-msg" class="profile-msg"></div>
      <div class="profile-footer">
        <button type="button" class="profile-btn" data-close="1">Cerrar</button>
        <button type="button" class="profile-btn primary" id="profile-save">Guardar</button>
      </div>
    </div>
  `;
  document.body.appendChild(m);
  renderProfileAvatar(m.querySelector('#profile-avatar-big'));

  m.addEventListener('click', (ev) => {
    if (ev.target.dataset?.close) closeProfileModal();
  });

  m.querySelector('#profile-change-photo').addEventListener('click', () => {
    document.querySelector('#avatar-input').click();
  });

  m.querySelector('#profile-remove-photo').addEventListener('click', async () => {
    if (!window.__me?.avatar_url) return;
    if (!confirm('¿Eliminar foto de perfil?')) return;
    setProfileMsg('Eliminando…');
    try {
      const r = await fetch('/api/profile/avatar', { method: 'DELETE', credentials: 'include' });
      if (!r.ok) throw new Error(await r.text());
      window.__me.avatar_url = null;
      renderProfileAvatar(m.querySelector('#profile-avatar-big'));
      m.querySelector('#profile-remove-photo').disabled = true;
      m.querySelector('#profile-remove-photo').style.opacity = '0.5';
      syncSidebarAvatar();
      setProfileMsg('Foto eliminada', 'ok');
    } catch (err) {

document.addEventListener('change', async (e) => {

  const f = e.target.files[0];
  if (!f) return;
  if (f.size > 2 * 1024 * 1024) {
    setProfileMsg('Archivo > 2MB', 'err');
    e.target.value = '';
    return;
  }
  const fd = new FormData();
  fd.append('file', f);
  setProfileMsg('Subiendo…');
  try {
    const r = await fetch('/api/profile/avatar', { method: 'POST', credentials: 'include', body: fd });
    if (!r.ok) throw new Error(await r.text());
    const { avatar_url } = await r.json();
    window.__me.avatar_url = avatar_url;
    const big = document.querySelector('#profile-avatar-big');
    if (big) renderProfileAvatar(big);
    const removeBtn = document.querySelector('#profile-remove-photo');
    if (removeBtn) { removeBtn.disabled = false; removeBtn.style.opacity = ''; }
    syncSidebarAvatar();
    setProfileMsg('Foto actualizada', 'ok');
  } catch (err) {
    setProfileMsg('Error subir avatar: ' + err.message, 'err');
  } finally {
    e.target.value = '';
  }
});

async function sendMagicLinkViaServer(email) {
  const r = await fetch('/api/auth/magic-link', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ email }),
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) return { error: data.error ?? `HTTP ${r.status}` };
  return { ok: true };
}

async function doLogin(ev) {
  if (ev) ev.preventDefault();
  $('#login-err').hidden = true; $('#login-ok').hidden = true;
  const email = ($('#login-email').value || '').trim();
  const password = $('#login-password').value;
  if (!email) { $('#login-err').textContent = 'Email requerido'; $('#login-err').hidden = false; return; }

  if (!password) {
    const r = await sendMagicLinkViaServer(email);
    if (r.error) { $('#login-err').textContent = r.error; $('#login-err').hidden = false; }
    else { $('#login-ok').textContent = 'Revisá tu email — te mandamos un link de acceso'; $('#login-ok').hidden = false; }
    return;
  }

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password }),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) { $('#login-err').textContent = data.error || 'Login fallido'; $('#login-err').hidden = false; return; }
    checkAuth();
  } catch (e) {
    $('#login-err').textContent = 'Excepción: ' + e.message;
    $('#login-err').hidden = false;
  }
}

$('#login-form').addEventListener('submit', doLogin);

window.addEventListener('hashchange', route);

async function route() {
  const hash = location.hash.slice(1) || 'dashboard';
  const [page, ...params] = hash.split('/');
  document.querySelectorAll('#nav a, aside nav a').forEach((a) => a.classList.toggle('active', a.getAttribute('href').slice(1).split('/')[0] === page));
  loading.hidden = false; view.innerHTML = '';
  try {
    if (page === 'intake') return await intakeForm(params);
    if (page === 'users') return await usersPage();
    await (pages[page] ?? pages.dashboard)(params);
  }
  catch (e) { view.innerHTML = `<div class="err">${e.message}</div>`; }
  finally { loading.hidden = true; }
}

async function q(table, qs = '') {
  // Proxy server-side: la cookie httpOnly viaja sola; el server aplica RLS con el JWT.
  const params = qs ? `&${qs}` : '';
  const r = await fetch(`/api/data?table=${encodeURIComponent(table)}${params}`, {
    credentials: 'include',
  });
  if (!r.ok) throw new Error(`${table}: ${r.status} ${await r.text()}`);
  return r.json();
}

const dotPill = (txt, kind) => txt ? `<span class="pill ${kind ?? 'gray'}"><span class="dot"></span>${txt}</span>` : `<span class="pill gray">—</span>`;
const pill = (txt, kind) => txt ? `<span class="pill ${kind ?? 'gray'}">${txt}</span>` : `<span class="pill gray">—</span>`;
const semKind = (s) => s === 'green' ? 'green' : s === 'yellow' ? 'yellow' : s === 'red' ? 'red' : 'gray';
const phaseKind = (p) => p === 'signed' ? 'green' : p === 'rejected' ? 'red' : p === 'cancelled' ? 'gray' : 'blue';
const PHASE_LABELS = {
  fase1: '1. Solicitud',
  hito1: '2. Aprobación interna',
  fase2: '3. Datos proveedor',
  fase3: '4. Validación docs',
  signed: '5. Firmado',
  rejected: 'Rechazado',
  cancelled: 'Cancelado',
};
const phaseLabel = (p) => PHASE_LABELS[p] ?? (p ?? '—');

const FUNNEL_ORDER = ['fase1', 'hito1', 'fase2', 'fase3', 'signed'];
const FUNNEL_META = {
  fase1:  { label: 'Solicitud',         icon: '📝', color: '#3F5EDF' },
  hito1:  { label: 'Aprobación interna',icon: '✅', color: '#1F49B6' },
  fase2:  { label: 'Datos proveedor',   icon: '🏢', color: '#0b6bc4' },
  fase3:  { label: 'Validación docs',   icon: '🔍', color: '#02A757' },
  signed: { label: 'Firmado',           icon: '✍️', color: '#1c8a4a' },
};
function renderFunnel(phasesData) {
  const byPhase = Object.fromEntries((phasesData ?? []).map((r) => [r.current_phase, r]));
  const rejected = byPhase['rejected']?.total ?? 0;
  const totalIn = FUNNEL_ORDER.reduce((a, p) => a + (byPhase[p]?.total ?? 0), 0);
  return `
    <div class="funnel">
      ${FUNNEL_ORDER.map((p, i) => {
        const row = byPhase[p];
        const total = row?.total ?? 0;
        const greenC = row?.green ?? 0;
        const yellowC = row?.yellow ?? 0;
        const redC = row?.red ?? 0;
        const meta = FUNNEL_META[p];
        const pct = totalIn ? Math.round((total / totalIn) * 100) : 0;
        return `
          <div class="funnel-stage" style="--funnel-color:${meta.color}">
            <div class="funnel-icon">${meta.icon}</div>
            <div class="funnel-label">${i + 1}. ${meta.label}</div>
            <div class="funnel-count">${total}</div>
            <div class="funnel-bar"><div class="funnel-bar-fill" style="width:${pct}%"></div></div>
            <div class="funnel-semaforos">
              ${greenC ? `<span title="Verde">🟢 ${greenC}</span>` : ''}
              ${yellowC ? `<span title="Amarillo">🟡 ${yellowC}</span>` : ''}
              ${redC ? `<span title="Rojo">🔴 ${redC}</span>` : ''}
            </div>
          </div>
          ${i < FUNNEL_ORDER.length - 1 ? '<div class="funnel-arrow">→</div>' : ''}
        `;
      }).join('')}
    </div>
    ${rejected ? `<div style="margin-top:12px;padding:10px 14px;background:rgba(230,74,74,0.08);border-radius:10px;font-size:13px;color:var(--red)">⊘ ${rejected} solicitud${rejected > 1 ? 'es' : ''} rechazada${rejected > 1 ? 's' : ''}</div>` : ''}
  `;
}
const statusKind = (s) => s === 'aceptado' || s === 'signed' || s === 'active' ? 'green' : s === 'rechazado' || s === 'cancelled' || s === 'expired' ? 'red' : s === 'expiring' || s === 'pendiente_revision' ? 'yellow' : s === 'inactivo' ? 'gray' : 'blue';
const dt = (iso) => (iso ?? '').slice(0, 16).replace('T', ' · ');

function renderStepper(r) {
  const phase = r.current_phase;
  const intApproved = r.internal_approval_status === 'approved';
  const intRejected = r.internal_approval_status === 'rejected';
  const stages = [
    { num: 1, label: 'Solicitud',           who: 'Solicitante interno', icon: '📝', assignee: r.solicitante_email },
    { num: 2, label: 'Aprobación interna',  who: 'Aprobador Global66',  icon: '✅', assignee: r.internal_approver_email ?? 'Pendiente asignar' },
    { num: 3, label: 'Datos proveedor',     who: 'Proveedor',           icon: '🏢', assignee: r.email_contacto ?? '—' },
    { num: 4, label: 'Validación docs',     who: 'IA + Compliance',     icon: '🔍', assignee: 'IA Claude + Compliance' },
    { num: 5, label: 'Firma',               who: 'Apoderado + Proveedor', icon: '✍️', assignee: r.sociedad_apoderado_email ?? 'Pendiente apoderado' },
    { num: 6, label: 'Cerrado',             who: 'Sistema',             icon: '🏁', assignee: '—' },
  ];

  let cur = 0;
  if (intRejected || phase === 'rejected') cur = 1;
  else if (!intApproved && phase === 'fase1') cur = 1;
  else if (intApproved && phase === 'fase1') cur = 2;
  else if (phase === 'hito1') cur = 3;
  else if (phase === 'fase2') cur = 3;
  else if (phase === 'fase3') cur = 4;
  else if (phase === 'signed') cur = 5;

  const rejected = intRejected || phase === 'rejected';

  return `<div class="flow-canvas">
    ${stages.map((s, i) => {
      const isDone = i < cur;
      const isActive = i === cur && !rejected;
      const isRejected = rejected && i === cur;
      const cls = isRejected ? 'flow-node-rejected' : isDone ? 'flow-node-done' : isActive ? 'flow-node-active' : 'flow-node-pending';
      return `<div class="flow-node ${cls}">
        <div class="flow-node-header">
          <span class="flow-node-icon">${s.icon}</span>
          <span class="flow-node-num">${isDone ? '✓' : isRejected ? '✗' : s.num}</span>
        </div>
        <div class="flow-node-label">${s.label}</div>
        <div class="flow-node-who">${s.who}</div>
        <div class="flow-node-assignee" title="${s.assignee}">${(s.assignee ?? '—').slice(0, 28)}${(s.assignee ?? '').length > 28 ? '…' : ''}</div>
        ${isActive ? '<div class="flow-node-pulse"></div>' : ''}
      </div>
      ${i < stages.length - 1 ? '<div class="flow-edge"><svg width="48" height="14" viewBox="0 0 48 14"><path d="M0 7 L40 7 M34 1 L40 7 L34 13" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>' : ''}
      `;
    }).join('')}
  </div>`;
}

function shouldShowSignaturePanel(r) {
  // Nodo 5: aprobación interna completada + docs validados o avanzados, sin firma todavía.
  if (!r) return false;
  if (r.current_phase === 'signed' || r.current_phase === 'rejected' || r.current_phase === 'cancelled') return false;
  return r.internal_approval_status === 'approved' && ['fase2', 'fase3'].includes(r.current_phase);
}

window.saveSignatureConfig = async function (runId, sendToSignNow) {
  const sociedad = document.getElementById('sign-sociedad').value;
  const apoderado = document.getElementById('sign-apoderado').value.trim();
  const note = document.getElementById('sign-note').value.trim();
  const errEl = document.getElementById('sign-err');
  const okEl = document.getElementById('sign-ok');
  errEl.hidden = true; okEl.hidden = true;
  if (sendToSignNow && (!sociedad || !apoderado)) {
    errEl.textContent = 'Sociedad y email apoderado son requeridos para enviar a SignNow.';
    errEl.hidden = false; return;
  }
  try {
    const r = await fetch('/api/intake/signature-config', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        run_id: runId,
        sociedad_contratante: sociedad || undefined,
        sociedad_apoderado_email: apoderado || undefined,
        note,
        send_to_signnow: !!sendToSignNow,
      }),
    });
    const result = await r.json();
    if (!r.ok) throw new Error(result.error ?? 'Error');
    okEl.innerHTML = sendToSignNow
      ? `✓ Enviado a SignNow. Document ID: <code>${result.signnow_document_id ?? '(pendiente)'}</code>`
      : `✓ Configuración guardada.`;
    okEl.hidden = false;
    if (sendToSignNow) setTimeout(() => location.reload(), 1500);
  } catch (e) {
    errEl.textContent = e.message;
    errEl.hidden = false;
  }
};

async function authedFetch(path, opts = {}) {
  // Cookie httpOnly viaja sola. No leemos tokens del JS.
  return fetch(path, {
    ...opts,
    credentials: 'include',
    headers: { ...(opts.headers ?? {}) },
  });
}

              </label>
            `).join('')}
          </div>
        </div>
        <button class="primary" id="invite-btn">Invitar →</button>
      </div>
      <div id="invite-result" style="margin-top:12px"></div>

    <div class="table-card">

        <thead><tr><th>Email</th><th>Roles</th><th>Sociedades</th><th>Confirmado</th><th>Último login</th><th>Creado</th><th></th></tr></thead>

          <td>${renderRolesCell(u)}</td>
          <td class="muted">${(u.sociedades ?? []).join(', ') || '—'}</td>

          <td class="muted">${dt(u.last_sign_in_at) || '—'}</td>
          <td class="muted">${dt(u.created_at)}</td>
          <td><button class="ghost del-btn" data-id="${u.id}" data-email="${u.email}" ${u.email === meEmail ? 'disabled' : ''}>Eliminar</button></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>

  $('#invite-btn').addEventListener('click', async () => {
    const email = $('#new-user-email').value.trim();

    });
  });

window.submitApproval = async function (runId, decision) {
  const sociedad = document.getElementById('approve-sociedad').value;
  const comment = document.getElementById('approve-comment').value;
  if (decision === 'approved' && !sociedad) {
    document.getElementById('approve-err').textContent = 'Confirmá la sociedad contratante antes de aprobar';
    document.getElementById('approve-err').hidden = false;
    return;
  }
  try {
    const r = await fetch('/api/intake/approve', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        run_id: runId,
        decision,
        sociedad_contratante: sociedad || undefined,
        comment,
        approver_email: window.__me?.email,
      }),
    });
    const result = await r.json();
    if (!r.ok) throw new Error(result.error ?? 'Error');
    const ok = document.getElementById('approve-ok');
    ok.innerHTML = decision === 'approved'
      ? `✓ Aprobado. ${result.provider_invited ? 'Email enviado al proveedor.' : 'Proveedor sin email.'} <a href="${result.profile_url}" target="_blank">Link perfil</a>`
      : `Decisión registrada: ${decision}`;
    ok.hidden = false;
    setTimeout(() => location.reload(), 1500);
  } catch (e) {
    document.getElementById('approve-err').textContent = e.message;
    document.getElementById('approve-err').hidden = false;
  }
};

      <div class="tally-topbar">
        <div class="tally-progress"><div class="tally-progress-fill" id="tally-fill" style="width:25%"></div></div>
        <div class="tally-step-meta">
          <span id="tally-step-name">Paso 1 de 5</span>
          <span class="muted" id="tally-step-hint">Quién solicita</span>
        </div>
      </div>

    <form id="intake-form">
      <div class="card tally-step" data-step="1" data-step-name="Quién solicita">
        <h3 style="margin-bottom:6px">1. Quién solicita</h3>
        <p style="color:var(--muted);font-size:13px;margin-bottom:18px">Tus datos quedan asociados a la solicitud para seguimiento.</p>
        <div class="grid grid-2">
          <div><label>Tu nombre completo *</label><input type="text" name="solicitante_nombre" required></div>
          <div><label>Tu email *</label><input type="email" name="solicitante_email" required></div>
          <div><label>Tu área o equipo *</label><input type="text" name="solicitante_area" placeholder="Ej: Finanzas, Tech" required></div>
          <div>
            <label>¿Serás el Owner del contrato? *</label>
            <select name="owner_es_solicitante" id="owner-toggle" required>
              <option value="">—</option><option value="true">Sí</option><option value="false">No, otro responsable</option>
            </select>
          </div>
          <div id="owner-name-wrap" hidden><label>Nombre del Owner</label><input type="text" name="owner_nombre"></div>
          <div><label>Email del Owner *</label><input type="email" name="owner_email" required></div>
          <div><label>Email backup responsable *</label><input type="email" name="responsable_backup_email" required></div>
        </div>
      </div>

      <div class="card tally-step" data-step="2" data-step-name="Proveedor" hidden>
        <h3 style="margin-bottom:18px">2. Proveedor</h3>
        <div class="grid grid-2">
          <div><label>Razón social *</label><input type="text" name="razon_social" required></div>
          <div><label>RUT / Tax ID *</label><input type="text" name="rut" required placeholder="76.000.000-K"></div>
          <div>
            <label>País de constitución de la empresa *</label>
            <select name="pais" id="pais-select" required>
              <option value="">—</option>
              ${['Chile','Perú','México','Colombia','Argentina','Panamá','Ecuador','Brasil','Uruguay','Estados Unidos','Otro'].map(p => `<option>${p}</option>`).join('')}
            </select>
          </div>
          <div id="sociedad-wrap" hidden>
            <label>Sociedad contratante *</label>
            <select name="sociedad_contratante" id="sociedad-select">
              <option value="">—</option>
            </select>
          </div>
          <div><label>Representante legal / contacto *</label><input type="text" name="representante_legal" required></div>
          <div><label>Email de contacto del proveedor *</label><input type="email" name="email_contacto" required></div>
          <div><label>Email de facturación *</label><input type="email" name="email_facturacion" required></div>
          <div>
            <label>¿Proveedor nuevo o existente? *</label>
            <select name="proveedor_existente" required>
              <option value="">—</option><option value="false">Nuevo</option><option value="true">Existe — renovación</option>
            </select>
          </div>
          <div>
            <label>Tipo de proveedor *</label>
            <select name="tipo_proveedor" required>
              <option value="">—</option>
              ${['Servicios profesionales','Plataformas SaaS','Marketing y Publicidad','Consultoría/Asesoría','Otro'].map(t => `<option>${t}</option>`).join('')}
            </select>
          </div>
        </div>
      </div>

      <div class="card tally-step" data-step="3" data-step-name="Contrato" hidden>
        <h3 style="margin-bottom:18px">3. Contrato</h3>
        <div class="grid grid-2">
          <div style="grid-column:1/-1"><label>Descripción del servicio *</label><textarea name="servicio_descripcion" rows="3" placeholder="Ej: Desarrollo de software, consultoría legal, hosting..." required></textarea></div>
          <div>
            <label>Periodicidad *</label>
            <select name="periodicidad" required>
              <option value="">—</option><option value="unico">Único</option><option value="mensual">Mensual</option><option value="anual">Anual</option><option value="otro">Otro</option>
            </select>
          </div>
          <div>
            <label>Monto estimado *</label>
            <input type="number" name="monto" required placeholder="12000" step="any">
            <p style="font-size:12px;color:var(--muted);margin-top:4px">Indica el valor según la periodicidad. Si es mensual, monto mensual; si es anual, monto anual.</p>
          </div>
          <div>
            <label>Moneda *</label>
            <select name="moneda" required>
              <option value="">—</option>${['USD','CLP','PEN','MXN','COP','ARS','BRL','EUR','UF','PAB','Otra'].map(m => `<option>${m}</option>`).join('')}
            </select>
          </div>
          <div>
            <label>Duración del contrato *</label>
            <select name="tipo_duracion" id="duracion-toggle" required>
              <option value="">—</option>
              <option value="indefinido">Indefinido</option>
              <option value="plazo_fijo">Plazo fijo</option>
              <option value="por_proyecto">Por proyecto o entregable</option>
            </select>
          </div>
          <div id="fecha-inicio-wrap" hidden>
            <label>Fecha de inicio *</label>
            <div class="date-field">
              <input type="date" name="fecha_inicio" id="fecha-inicio" required>
              <span class="date-icon" aria-hidden="true">📅</span>
            </div>
          </div>
          <div id="fecha-fin-wrap" hidden>
            <label>Fecha de fin *</label>
            <div class="date-field">
              <input type="date" name="fecha_fin" id="fecha-fin">
              <span class="date-icon" aria-hidden="true">📅</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card tally-step" data-step="4" data-step-name="Adjuntos" hidden>
        <h3 style="margin-bottom:6px">4. Adjuntos</h3>
        <p style="color:var(--muted);font-size:13px;margin-bottom:14px">Subí los archivos directo en la plataforma. PDF y Word soportados. Hasta 50 MB por archivo.</p>

        <div class="question">
          <label>Borrador del contrato (PDF o Word) *</label>
          <div id="drop-main" class="dropzone" data-kind="main" data-required="1">
            <input type="file" accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" hidden>
            <div class="drop-hint">📄 Arrastrá el archivo o <a href="#" class="drop-pick">elegí desde tu equipo</a></div>
            <div class="drop-list"></div>
          </div>
          <p style="font-size:12px;color:var(--muted);margin-top:6px">Requerido. Será el documento principal del flujo.</p>
        </div>

        <div class="question">
          <label>Anexos opcionales (NDA, propuesta, cédulas, etc.)</label>
          <div id="drop-anexos" class="dropzone" data-kind="anexo">
            <input type="file" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,image/png,image/jpeg" hidden multiple>
            <div class="drop-hint">📎 Arrastrá uno o más archivos o <a href="#" class="drop-pick">elegí desde tu equipo</a></div>
            <div class="drop-list"></div>
          </div>
        </div>

        <div class="question">
          <label>Notas adicionales</label>
          <textarea name="notas" rows="2" placeholder="Cualquier contexto adicional"></textarea>
        </div>
      </div>

      <div class="card tally-step" data-step="5" data-step-name="Revisar y enviar" hidden>
        <h3 style="margin-bottom:8px">5. Revisar y enviar</h3>
        <p style="color:var(--muted);font-size:13px;margin-bottom:18px">Confirmá los datos antes de crear la solicitud.</p>
        <div id="tally-review" class="tally-review"></div>
      </div>

      <div id="intake-err" class="err" hidden></div>
      <div id="intake-ok" class="ok" hidden></div>

      <div class="tally-nav">
        <button type="button" class="ghost" id="tally-prev" hidden>← Atrás</button>
        <button type="button" class="ghost" onclick="location.hash='workflows'" style="margin-left:auto">Cancelar</button>
        <button type="button" class="primary" id="tally-next">Continuar →</button>
        <button type="submit" class="primary" id="submit-intake" hidden>Crear solicitud →</button>
      </div>
    </form>
    </div>
  `;

  // Conditional: Owner name aparece solo si "No"
  document.querySelector('#owner-toggle').addEventListener('change', (e) => {
    const wrap = document.querySelector('#owner-name-wrap');
    wrap.hidden = e.target.value !== 'false';
  });

  // Fechas: AMBAS solo si plazo_fijo. Indefinido y por_proyecto NO piden fechas.
  const durToggle = document.querySelector('#duracion-toggle');
  function syncFechas() {
    const show = durToggle.value === 'plazo_fijo';
    const wi = document.querySelector('#fecha-inicio-wrap');
    const wf = document.querySelector('#fecha-fin-wrap');
    const fi = document.querySelector('#fecha-inicio');
    const ff = document.querySelector('#fecha-fin');
    wi.hidden = !show; wf.hidden = !show;
    fi.required = show; ff.required = show;
    if (!show) { fi.value = ''; ff.value = ''; }
  }
  durToggle.addEventListener('change', syncFechas);
  syncFechas();

  // Sociedad contratante dinámica según país.
  const SOCIEDADES_BY_COUNTRY = {
    'Chile':    ['Global 81 SpA (Chile)', 'Global Card S.A. (Chile)'],
    'Panamá':   ['100X (Panamá)'],
    'Panama':   ['100X (Panamá)'],
    'Colombia': ['Global Colombia 81 (Colombia)'],
  };
  const ALL_SOCIEDADES = ['Global 81 SpA (Chile)', 'Global Card S.A. (Chile)', '100X (Panamá)', 'Global Colombia 81 (Colombia)'];
  const paisSelect = document.querySelector('#pais-select');
  const sociedadWrap = document.querySelector('#sociedad-wrap');
  const sociedadSelect = document.querySelector('#sociedad-select');
  function syncSociedad() {
    const country = paisSelect.value;
    if (!country) { sociedadWrap.hidden = true; sociedadSelect.required = false; sociedadSelect.innerHTML = '<option value="">—</option>'; return; }
    const options = SOCIEDADES_BY_COUNTRY[country] ?? ALL_SOCIEDADES;
    sociedadWrap.hidden = false;
    sociedadSelect.required = true;
    sociedadSelect.innerHTML = '<option value="">—</option>' + options.map((s) => `<option value="${s}">${s}</option>`).join('');
    // Auto-seleccionar si solo hay una opción.
    if (options.length === 1) sociedadSelect.value = options[0];
  }
  paisSelect.addEventListener('change', syncSociedad);

  // Autocomplete provider por RUT/Tax ID (lookup en /api/providers/lookup).
  const rutInput = document.querySelector('[name=rut]');
  let lookupBanner = null;
  function setLookupBanner(html, kind) {
    if (!lookupBanner) {
      lookupBanner = document.createElement('div');
      lookupBanner.style.cssText = 'margin-top:8px;padding:8px 12px;border-radius:8px;font-size:12.5px';
      rutInput.parentNode.appendChild(lookupBanner);
    }
    lookupBanner.innerHTML = html;
    lookupBanner.style.background = kind === 'ok' ? 'rgba(2,167,87,0.08)' : kind === 'info' ? 'rgba(31,73,182,0.08)' : 'rgba(240,180,41,0.08)';
    lookupBanner.style.color = kind === 'ok' ? '#02A757' : kind === 'info' ? '#1F49B6' : '#a8780a';
  }
  async function lookupProvider() {
    const v = rutInput.value.trim();
    if (!v) { lookupBanner?.remove(); lookupBanner = null; return; }
    setLookupBanner('Buscando…', 'info');
    try {
      const r = await fetch(`/api/providers/lookup?tax_id=${encodeURIComponent(v)}`, { credentials: 'include' });
      if (r.status === 404) { setLookupBanner('🆕 Proveedor nuevo. Completá los datos abajo.', 'info'); return; }
      if (!r.ok) { setLookupBanner('Error consulta: ' + r.status, 'warn'); return; }
      const p = await r.json();
      const pd = p.profile_data ?? {};

      const map = {
        razon_social: p.razon_social,
        pais: p.pais,
        tipo_proveedor: p.tipo_proveedor,
        representante_legal: p.representante_legal ?? pd.representante_legal,
        email_contacto: p.email_contacto ?? pd.contacto_comercial_email,
        email_facturacion: p.email_facturacion ?? pd.email_facturacion,
        proveedor_existente: 'true',
      };
      for (const [field, value] of Object.entries(map)) {
        if (value == null || value === '') continue;
        const el = document.querySelector(`[name=${field}]`);
        if (!el) continue;
        if (el.tagName === 'SELECT') {
          const opt = Array.from(el.options).find((o) => o.value === value || o.text === value);
          if (opt) el.value = opt.value;
        } else {
          el.value = value;
        }
        // Trigger change para que se actualicen los conditionals (sociedad por país, etc.).
        el.dispatchEvent(new Event('change', { bubbles: true }));
      }
      const runCount = p.run_count ?? 0;
      const profileDone = p.profile_completed_at ? 'perfil completo ✓' : 'perfil pendiente';
      setLookupBanner(
        `✓ <b>${p.razon_social}</b> ya registrado · ${runCount > 0 ? `${runCount} solicitud${runCount > 1 ? 'es' : ''} previa${runCount > 1 ? 's' : ''}` : 'sin solicitudes previas'} · ${profileDone}.<br><span style="font-size:11.5px">Campos autocompletados. Podés editar lo que necesites — los cambios actualizan el registro del proveedor.</span>`,
        'ok'
      );
    } catch (e) {
      setLookupBanner('Error: ' + e.message, 'warn');
    }
  }
  rutInput.addEventListener('blur', lookupProvider);
  rutInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); lookupProvider(); } });

  // Auto: si soy Owner, prefill email
  document.querySelector('#owner-toggle').addEventListener('change', (e) => {
    if (e.target.value === 'true') {
      const oe = document.querySelector('[name=owner_email]');
      const se = document.querySelector('[name=solicitante_email]').value;
      if (!oe.value && se) oe.value = se;
    }
  });

  // Dropzones: registrar y mantener archivos pendientes en memoria.
  const pendingFiles = { main: null, anexo: [] };
  function wireDropzone(el) {
    const kind = el.dataset.kind;
    const input = el.querySelector('input[type=file]');
    const list = el.querySelector('.drop-list');
    el.querySelector('.drop-pick').addEventListener('click', (e) => { e.preventDefault(); input.click(); });
    ['dragenter', 'dragover'].forEach((ev) => el.addEventListener(ev, (e) => { e.preventDefault(); el.classList.add('drag'); }));
    ['dragleave', 'drop'].forEach((ev) => el.addEventListener(ev, (e) => { e.preventDefault(); el.classList.remove('drag'); }));
    el.addEventListener('drop', (e) => { input.files = e.dataTransfer.files; addFiles(input.files); });
    input.addEventListener('change', () => addFiles(input.files));

    function addFiles(fileList) {
      const arr = Array.from(fileList ?? []);
      if (!arr.length) return;
      if (kind === 'main') pendingFiles.main = arr[0];
      else pendingFiles.anexo.push(...arr);
      render();
    }
    function render() {
      const items = kind === 'main' ? (pendingFiles.main ? [pendingFiles.main] : []) : pendingFiles.anexo;
      list.innerHTML = items.map((f, i) => `
        <div class="drop-item" data-idx="${i}">
          <span class="drop-icon">${f.type.includes('pdf') ? '📕' : f.type.includes('word') || f.name.match(/\\.docx?$/) ? '📘' : '📎'}</span>
          <span class="drop-name">${f.name}</span>
          <span class="drop-size">${(f.size / 1024 / 1024).toFixed(2)} MB</span>
          <span class="drop-status" data-status="ready">listo</span>
          <button type="button" class="drop-remove" aria-label="Quitar">×</button>
        </div>
      `).join('');
      list.querySelectorAll('.drop-remove').forEach((b) => b.addEventListener('click', (e) => {
        const idx = Number(e.target.closest('.drop-item').dataset.idx);
        if (kind === 'main') pendingFiles.main = null;
        else pendingFiles.anexo.splice(idx, 1);
        render();
      }));
    }
  }
  document.querySelectorAll('#drop-main, #drop-anexos').forEach(wireDropzone);

  async function uploadOne(runId, providerId, kind, file, statusEl) {
    if (statusEl) { statusEl.dataset.status = 'uploading'; statusEl.textContent = 'subiendo…'; }
    const fd = new FormData();
    fd.append('workflow_run_id', runId);
    if (providerId) fd.append('provider_id', providerId);
    fd.append('kind', kind);
    fd.append('file', file);
    const r = await fetch('/api/files/upload', { method: 'POST', credentials: 'include', body: fd });
    if (!r.ok) {
      const err = await r.text();
      if (statusEl) { statusEl.dataset.status = 'error'; statusEl.textContent = 'error'; }
      throw new Error(err);
    }
    if (statusEl) { statusEl.dataset.status = 'done'; statusEl.textContent = '✓ subido'; }
    return r.json();
  }

  // Tally-style controller: navegación entre steps + validación + review.
  const tallySteps = Array.from(document.querySelectorAll('.tally-step'));
  const tallyTotal = tallySteps.length;
  let tallyIdx = 0;
  const tallyPrev = document.querySelector('#tally-prev');
  const tallyNext = document.querySelector('#tally-next');
  const tallySubmitBtn = document.querySelector('#submit-intake');
  const tallyFill = document.querySelector('#tally-fill');
  const tallyName = document.querySelector('#tally-step-name');
  const tallyHint = document.querySelector('#tally-step-hint');

  function tallyShow(i) {
    tallyIdx = Math.max(0, Math.min(tallyTotal - 1, i));
    tallySteps.forEach((s, k) => {
      s.hidden = k !== tallyIdx;
      if (k === tallyIdx) s.classList.add('tally-enter');
      else s.classList.remove('tally-enter');
    });
    tallyFill.style.width = `${Math.round(((tallyIdx + 1) / tallyTotal) * 100)}%`;
    tallyName.textContent = `Paso ${tallyIdx + 1} de ${tallyTotal}`;
    tallyHint.textContent = tallySteps[tallyIdx].dataset.stepName ?? '';
    tallyPrev.hidden = tallyIdx === 0;
    const isLast = tallyIdx === tallyTotal - 1;
    tallyNext.hidden = isLast;
    tallySubmitBtn.hidden = !isLast;
    if (isLast) renderTallyReview();
    setTimeout(() => {
      const firstInput = tallySteps[tallyIdx].querySelector('input:not([type=hidden]), select, textarea');
      firstInput?.focus({ preventScroll: true });
    }, 80);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function tallyValidateCurrent() {
    const step = tallySteps[tallyIdx];
    const fields = step.querySelectorAll('input, select, textarea');
    for (const f of fields) {
      if (f.closest('[hidden]')) continue;
      if (!f.checkValidity()) {
        f.reportValidity();
        f.focus();
        return false;
      }
    }
    // Paso adjuntos (4): chequear archivo principal pendiente.
    if (step.dataset.step === '4' && !pendingFiles.main) {
      document.querySelector('#intake-err').textContent = 'El borrador del contrato (archivo principal) es obligatorio.';
      document.querySelector('#intake-err').hidden = false;
      return false;
    }
    document.querySelector('#intake-err').hidden = true;
    return true;
  }

  function renderTallyReview() {
    const fd = new FormData(document.querySelector('#intake-form'));
    const data = Object.fromEntries(fd);
    const fmt = (v) => v == null || v === '' ? '<span class="muted">—</span>' : String(v).replace(/[<>&]/g, (c) => ({ '<':'&lt;', '>':'&gt;', '&':'&amp;' }[c]));
    const rows = [
      ['Solicitante', `${fmt(data.solicitante_nombre)} · ${fmt(data.solicitante_email)} · ${fmt(data.solicitante_area)}`],
      ['Owner', `${data.owner_es_solicitante === 'true' ? 'Mismo solicitante' : fmt(data.owner_nombre)} · ${fmt(data.owner_email)}`],
      ['Backup', fmt(data.responsable_backup_email)],
      ['Proveedor', `<b>${fmt(data.razon_social)}</b> · ${fmt(data.rut)} · ${fmt(data.pais)}`],
      ['Sociedad contratante', fmt(data.sociedad_contratante)],
      ['Tipo de proveedor', fmt(data.tipo_proveedor)],
      ['Representante', `${fmt(data.representante_legal)} · contacto ${fmt(data.email_contacto)}`],
      ['Servicio', fmt(data.servicio_descripcion)],
      ['Periodicidad / Monto', `${fmt(data.periodicidad)} · ${fmt(data.monto)} ${fmt(data.moneda)}`],
      ['Duración', `${fmt(data.tipo_duracion)}${data.fecha_inicio ? ` · desde ${fmt(data.fecha_inicio)}` : ''}${data.fecha_fin ? ` hasta ${fmt(data.fecha_fin)}` : ''}`],
      ['Archivos', `📄 ${pendingFiles.main?.name ?? '—'}${pendingFiles.anexo.length ? ` + ${pendingFiles.anexo.length} anexo${pendingFiles.anexo.length > 1 ? 's' : ''}` : ''}`],
    ];
    document.querySelector('#tally-review').innerHTML = rows.map(([k, v]) => `
      <div class="tally-review-row"><div class="tally-review-key">${k}</div><div class="tally-review-val">${v}</div></div>
    `).join('');
  }

  tallyPrev.addEventListener('click', () => tallyShow(tallyIdx - 1));
  tallyNext.addEventListener('click', () => {
    if (tallyValidateCurrent()) tallyShow(tallyIdx + 1);
  });

  // Enter avanza step (no en textarea).
  document.querySelector('#intake-form').addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' || e.target.tagName === 'TEXTAREA') return;
    if (tallyIdx < tallyTotal - 1) {
      e.preventDefault();
      if (tallyValidateCurrent()) tallyShow(tallyIdx + 1);
    }
  });

  tallyShow(0);

  document.querySelector('#intake-form').addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const data = Object.fromEntries(new FormData(ev.target));
    data.monto = data.monto ? Number(data.monto) : null;
    data.owner_es_solicitante = data.owner_es_solicitante === 'true';
    data.proveedor_existente = data.proveedor_existente === 'true';
    data.id = `intake-${Date.now()}`;

    if (!pendingFiles.main) {
      document.querySelector('#intake-err').textContent = 'El borrador del contrato (archivo principal) es obligatorio.';
      document.querySelector('#intake-err').hidden = false;
      return;
    }

    const btn = document.querySelector('#submit-intake');
    btn.disabled = true; btn.textContent = 'Creando solicitud…';
    document.querySelector('#intake-err').hidden = true;

    try {
      const r = await fetch('/api/intake', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const result = await r.json();
      if (!r.ok) throw new Error(result.error ?? 'Error');

      btn.textContent = 'Subiendo archivos…';

      const runId = result.run_id;
      const provId = result.provider_id;
      const statusEls = Array.from(document.querySelectorAll('.drop-status'));
      const uploads = [];
      uploads.push(uploadOne(runId, provId, 'main', pendingFiles.main, statusEls[0]));
      pendingFiles.anexo.forEach((f, i) => uploads.push(uploadOne(runId, provId, 'anexo', f, statusEls[i + 1])));
      const results = await Promise.allSettled(uploads);
      const okCount = results.filter((r) => r.status === 'fulfilled').length;
      const failed = results.filter((r) => r.status === 'rejected');

      const ok = document.querySelector('#intake-ok');
      ok.innerHTML = `
        ✓ Solicitud creada · <code>${runId.slice(0, 8)}</code><br>
        ${result.provider_new ? `📨 Email al proveedor enviado` : `📂 Proveedor reusado`}<br>
        📎 ${okCount} de ${uploads.length} archivos subidos correctamente${failed.length ? ` (${failed.length} con error)` : ''}
        <div style="margin-top:12px;display:flex;gap:8px">
          <a href="#workflows/${runId}" class="primary" style="background:var(--blue-500);color:white;padding:8px 14px;border-radius:999px;text-decoration:none;font-weight:600;font-size:13px">Ver detalle →</a>
          <button type="button" class="secondary" id="crear-otra-btn" style="padding:8px 14px;font-size:13px">Crear otra solicitud</button>
        </div>
      `;
      ok.hidden = false;
      if (failed.length) {
        document.querySelector('#intake-err').textContent = 'Errores en uploads: ' + failed.map((f) => f.reason?.message ?? 'unknown').join('; ');
        document.querySelector('#intake-err').hidden = false;
      }
      // Reset state + ocultar submit button del nav (ya no hay form activo).
      btn.disabled = false; btn.textContent = 'Crear solicitud →'; btn.hidden = true;
      tallyPrev.hidden = true; tallyNext.hidden = true;

      document.querySelector('#crear-otra-btn').addEventListener('click', () => {
        // Limpiar todo + volver al step 1.
        ev.target.reset();
        pendingFiles.main = null; pendingFiles.anexo = [];
        document.querySelectorAll('.drop-list').forEach((el) => el.innerHTML = '');
        document.querySelector('#intake-ok').hidden = true;
        document.querySelector('#intake-err').hidden = true;
        // Re-sincronizar conditionals (sociedad, fechas, owner).
        syncFechas();
        if (window.syncSociedadGlobal) window.syncSociedadGlobal();
        tallyShow(0);
      });

      window.scrollTo({ top: 0, behavior: 'smooth' });

      document.querySelector('#intake-err').textContent = e.message;
      document.querySelector('#intake-err').hidden = false;
      btn.disabled = false; btn.textContent = 'Crear solicitud →';
    }
  });
}
