<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Global66 — Plataforma Contratos</title>
<style>
  :root {
    --bg: #0b1020; --bg2:#0f1530; --card:#151b30; --border:#2a3050;
    --text:#e7eaf6; --muted:#8a94b8; --accent:#5b8def;
    --green:#3ddc84; --yellow:#f0b429; --red:#e64a4a; --blue:#5b8def;
  }
  * { box-sizing: border-box; margin: 0; padding: 0 }
  body { background:var(--bg); color:var(--text); font:14px/1.5 system-ui,-apple-system,Segoe UI,Arial }
  header { background:var(--bg2); padding:14px 24px; display:flex; align-items:center; gap:16px; border-bottom:1px solid var(--border) }
  header h1 { font-size:16px; font-weight:600 }
  nav { display:flex; gap:4px; flex:1 }
  nav a { color:var(--muted); text-decoration:none; padding:8px 14px; border-radius:6px; font-size:13px }
  nav a:hover { background:var(--card); color:var(--text) }
  nav a.active { background:var(--accent); color:white }
  .user { color:var(--muted); font-size:12px; display:flex; align-items:center; gap:8px }
  .user button { background:transparent; color:var(--muted); border:1px solid var(--border); padding:4px 10px; border-radius:4px; cursor:pointer; font-size:12px }
  .user button:hover { color:var(--text); border-color:var(--text) }
  main { padding:24px; max-width:1400px; margin:0 auto }
  h2 { font-size:22px; margin-bottom:16px; font-weight:600 }
  .row { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-bottom:20px }
  .card { background:var(--card); border-radius:10px; padding:16px; border:1px solid var(--border) }
  .card h3 { font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); margin-bottom:8px }
  .card .num { font-size:26px; font-weight:600 }
  .card .num small { font-size:13px; color:var(--muted); font-weight:400; margin-left:6px }
  table { width:100%; border-collapse:collapse; font-size:13px; background:var(--card); border-radius:10px; overflow:hidden }
  th,td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--border) }
  th { background:var(--bg2); color:var(--muted); font-weight:500; text-transform:uppercase; font-size:11px; letter-spacing:0.05em }
  tr:last-child td { border-bottom:none }
  tr.clickable { cursor:pointer }
  tr.clickable:hover td { background:#1a2240 }
  .pill { display:inline-block; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:500 }
  .pill.green { background:rgba(61,220,132,0.15); color:var(--green) }
  .pill.yellow { background:rgba(240,180,41,0.15); color:var(--yellow) }
  .pill.red { background:rgba(230,74,74,0.15); color:var(--red) }
  .pill.blue { background:rgba(91,141,239,0.15); color:var(--blue) }
  .pill.gray { background:rgba(138,148,184,0.15); color:var(--muted) }
  .muted { color:var(--muted) }
  .toolbar { display:flex; gap:10px; margin-bottom:14px; align-items:center; flex-wrap:wrap }
  input,select { background:var(--bg2); color:var(--text); border:1px solid var(--border); padding:8px 12px; border-radius:6px; font-size:13px; font-family:inherit }
  input:focus,select:focus { outline:none; border-color:var(--accent) }
  button.primary { background:var(--accent); color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500 }
  button.primary:hover { opacity:0.9 }
  button.secondary { background:transparent; color:var(--text); border:1px solid var(--border); padding:8px 16px; border-radius:6px; cursor:pointer; font-size:13px }
  button.secondary:hover { border-color:var(--accent) }
  .err { background:rgba(230,74,74,0.1); border:1px solid var(--red); border-radius:6px; padding:10px; color:var(--red); margin:10px 0 }
  .ok { background:rgba(61,220,132,0.1); border:1px solid var(--green); border-radius:6px; padding:10px; color:var(--green); margin:10px 0 }
  .login { max-width:400px; margin:80px auto; text-align:center }
  .login form { background:var(--card); padding:24px; border-radius:10px; border:1px solid var(--border); display:flex; flex-direction:column; gap:12px; margin-top:20px }
  .login input { font-size:14px }
  #panel-detail { background:var(--card); padding:20px; border-radius:10px; margin-top:12px; border:1px solid var(--border) }
  #panel-detail dl { display:grid; grid-template-columns:200px 1fr; gap:8px 16px; font-size:13px }
  #panel-detail dt { color:var(--muted) }
  .timeline { list-style:none; border-left:2px solid var(--border); margin-left:8px; padding-left:20px }
  .timeline li { position:relative; padding:8px 0; font-size:13px }
  .timeline li::before { content:''; position:absolute; left:-26px; top:14px; width:10px; height:10px; border-radius:50%; background:var(--accent) }
  .timeline .ts { color:var(--muted); font-size:11px }
  .actions { display:flex; gap:8px; margin:14px 0 }
  #loading { padding:40px; text-align:center; color:var(--muted) }
</style>
</head>
<body>

<div id="login-screen" class="login" hidden>
  <h1>Global66 — Plataforma Contratos</h1>
  <p class="muted">Login con tu cuenta Global66</p>
  <form id="login-form">
    <input type="email" id="login-email" placeholder="email@global66.com" required>
    <input type="password" id="login-password" placeholder="Password" required>
    <button class="primary" type="submit">Entrar</button>
    <button class="secondary" type="button" id="magic-link">Magic link (sin password)</button>
    <div id="login-err" class="err" hidden></div>
    <div id="login-ok" class="ok" hidden></div>
  </form>
</div>

<header id="app-header" hidden>
  <h1>📋 Contratos Global66</h1>
  <nav id="nav">
    <a href="#dashboard">Dashboard</a>
    <a href="#workflows">Workflows</a>
    <a href="#providers">Proveedores</a>
    <a href="#contracts">Contratos</a>
  </nav>
  <div class="user">
    <span id="user-email"></span>
    <button id="logout">Salir</button>
  </div>
</header>

<main id="app" hidden>
  <div id="loading">Cargando…</div>
  <div id="view"></div>
</main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SB_URL = 'https://kdhpbrpeneokvhwyxmwn.supabase.co';
const SB_KEY = 'sb_publishable_gMuIUc-TW3cBMQMXT3Tcfw_OnFQHbs-';
const supabase = createClient(SB_URL, SB_KEY, { auth: { persistSession: true } });

const $ = (s) => document.querySelector(s);
const view = $('#view');
const loading = $('#loading');

// ── Auth ───────────────────────────────────────────────────────────────────

async function checkAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    $('#login-screen').hidden = true;
    $('#app-header').hidden = false;
    $('#app').hidden = false;
    $('#user-email').textContent = session.user.email;
    route();
  } else {
    $('#login-screen').hidden = false;
    $('#app-header').hidden = true;
    $('#app').hidden = true;
  }
}

$('#login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = $('#login-email').value;
  const password = $('#login-password').value;
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) {
    $('#login-err').textContent = error.message;
    $('#login-err').hidden = false;
  } else checkAuth();
});

$('#magic-link').addEventListener('click', async () => {
  const email = $('#login-email').value;
  if (!email) { $('#login-err').textContent = 'Ingresá tu email primero'; $('#login-err').hidden = false; return; }
  const { error } = await supabase.auth.signInWithOtp({ email });
  if (error) {
    $('#login-err').textContent = error.message;
    $('#login-err').hidden = false;
  } else {
    $('#login-ok').textContent = 'Revisá tu email — te mandamos un link';
    $('#login-ok').hidden = false;
  }
});

$('#logout').addEventListener('click', async () => {
  await supabase.auth.signOut();
  checkAuth();
});

supabase.auth.onAuthStateChange(() => checkAuth());

// ── Router ─────────────────────────────────────────────────────────────────

window.addEventListener('hashchange', route);

async function route() {
  const hash = location.hash.slice(1) || 'dashboard';
  const [page, ...params] = hash.split('/');
  document.querySelectorAll('#nav a').forEach((a) => a.classList.toggle('active', a.getAttribute('href') === '#' + page));
  loading.hidden = false;
  view.innerHTML = '';
  try {
    const fn = pages[page] ?? pages.dashboard;
    await fn(params);
  } catch (e) {
    view.innerHTML = `<div class="err">${e.message}</div>`;
  } finally {
    loading.hidden = true;
  }
}

async function q(table, qs = '') {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${qs}`, {
    headers: { apikey: SB_KEY, Authorization: `Bearer ${(await supabase.auth.getSession()).data.session?.access_token ?? SB_KEY}` },
  });
  if (!r.ok) throw new Error(`${table}: ${r.status} ${await r.text()}`);
  return r.json();
}

const pill = (txt, kind) => `<span class="pill ${kind ?? 'gray'}">${txt ?? '—'}</span>`;
const semKind = (s) => s === 'green' ? 'green' : s === 'yellow' ? 'yellow' : s === 'red' ? 'red' : 'gray';
const phaseKind = (p) => p === 'signed' ? 'green' : p === 'rejected' ? 'red' : p === 'cancelled' ? 'gray' : 'blue';
const dt = (iso) => (iso ?? '').slice(0, 16).replace('T', ' ');

// ── Pages ──────────────────────────────────────────────────────────────────

const pages = {
  async dashboard() {
    const [phases, approvals, costs, sanctions, runs, providers, contracts] = await Promise.all([
      q('v_runs_by_phase'),
      q('v_avg_approval_time'),
      q('v_extraction_costs', 'limit=7'),
      q('v_sanctions_hits', 'limit=4'),
      q('workflow_runs', 'order=created_at.desc&limit=10'),
      q('v_providers_by_country').catch(() => []),
      q('v_contracts_by_status').catch(() => []),
    ]);

    const totalRuns = phases.reduce((a, p) => a + (p.total ?? 0), 0);
    const totalProv = providers.reduce((a, p) => a + (p.total ?? 0), 0);
    const totalContracts = contracts.reduce((a, c) => a + (c.total ?? 0), 0);
    const totalCost = costs.reduce((a, c) => a + Number(c.cost_usd_total ?? 0), 0).toFixed(2);

    view.innerHTML = `
      <h2>Dashboard</h2>
      <div class="row">
        <div class="card"><h3>Workflow runs</h3><div class="num">${totalRuns}</div></div>
        <div class="card"><h3>Proveedores</h3><div class="num">${totalProv}</div></div>
        <div class="card"><h3>Contratos</h3><div class="num">${totalContracts}</div></div>
        <div class="card"><h3>Gasto Gemini 7d</h3><div class="num">$${totalCost}<small>USD</small></div></div>
      </div>

      <h2 style="font-size:16px">Workflows por fase</h2>
      <table style="margin-bottom:20px">
        <thead><tr><th>Fase</th><th>Total</th><th>🟢</th><th>🟡</th><th>🔴</th></tr></thead>
        <tbody>${phases.map(p => `<tr><td>${pill(p.current_phase, phaseKind(p.current_phase))}</td><td>${p.total}</td><td>${p.green}</td><td>${p.yellow}</td><td>${p.red}</td></tr>`).join('')}</tbody>
      </table>

      <h2 style="font-size:16px">Últimos 10 runs</h2>
      <table>
        <thead><tr><th>Proveedor</th><th>Tax ID</th><th>País</th><th>Fase</th><th>Semáforo</th><th>Fecha</th></tr></thead>
        <tbody>${runs.map(r => `
          <tr class="clickable" onclick="location.hash='workflows/${r.id}'">
            <td>${r.razon_social}</td><td class="muted">${r.tax_id}</td><td>${r.pais}</td>
            <td>${pill(r.current_phase, phaseKind(r.current_phase))}</td>
            <td>${pill(r.semaforo, semKind(r.semaforo))}</td>
            <td class="muted">${dt(r.created_at)}</td>
          </tr>`).join('')}</tbody>
      </table>
    `;
  },

  async workflows(params) {
    if (params[0]) return pages.workflowDetail(params[0]);
    const runs = await q('workflow_runs', 'order=created_at.desc&limit=100');
    view.innerHTML = `
      <h2>Workflow Runs</h2>
      <div class="toolbar">
        <input type="search" id="filter" placeholder="Filtrar por razón social / RUT...">
      </div>
      <table>
        <thead><tr><th>Proveedor</th><th>Tax ID</th><th>País</th><th>Monto</th><th>Fase</th><th>Semáforo</th><th>Owner</th><th>Fecha</th></tr></thead>
        <tbody id="rows">${runs.map(r => `
          <tr class="clickable" data-search="${(r.razon_social + ' ' + r.tax_id).toLowerCase()}" onclick="location.hash='workflows/${r.id}'">
            <td>${r.razon_social}</td><td class="muted">${r.tax_id}</td><td>${r.pais}</td>
            <td>${r.monto ?? '-'} ${r.moneda ?? ''}</td>
            <td>${pill(r.current_phase, phaseKind(r.current_phase))}</td>
            <td>${pill(r.semaforo, semKind(r.semaforo))}</td>
            <td class="muted">${r.owner_email ?? '-'}</td>
            <td class="muted">${dt(r.created_at)}</td>
          </tr>`).join('')}</tbody>
      </table>
    `;
    $('#filter').addEventListener('input', (e) => {
      const v = e.target.value.toLowerCase();
      document.querySelectorAll('#rows tr').forEach((tr) => {
        tr.style.display = tr.dataset.search.includes(v) ? '' : 'none';
      });
    });
  },

  async workflowDetail(runId) {
    const [runs, apps, audits, extraction, sanctions] = await Promise.all([
      q('workflow_runs', `id=eq.${runId}`),
      q('approvals', `workflow_run_id=eq.${runId}&order=decided_at.asc`),
      q('audit_log', `workflow_run_id=eq.${runId}&order=created_at.asc`),
      q('extractions', `workflow_run_id=eq.${runId}&order=created_at.desc&limit=1`),
      q('sanctions_checks', `workflow_run_id=eq.${runId}&order=created_at.desc&limit=1`),
    ]);
    const r = runs[0];
    if (!r) { view.innerHTML = '<div class="err">Run no encontrado</div>'; return; }

    const ext = extraction[0]?.extracted_json;
    const risks = ext?.riesgos_detectados ?? [];
    const sanct = sanctions[0];

    view.innerHTML = `
      <a href="#workflows" class="muted">← Volver</a>
      <h2 style="margin-top:10px">${r.razon_social} <span class="muted" style="font-size:14px">${r.tax_id}</span></h2>

      <div class="row">
        <div class="card"><h3>Fase</h3><div>${pill(r.current_phase, phaseKind(r.current_phase))}</div></div>
        <div class="card"><h3>Semáforo</h3><div>${pill(r.semaforo, semKind(r.semaforo))}</div></div>
        <div class="card"><h3>País</h3><div class="num" style="font-size:18px">${r.pais}</div></div>
        <div class="card"><h3>Monto</h3><div class="num" style="font-size:18px">${r.monto} ${r.moneda}</div></div>
      </div>

      <div id="panel-detail">
        <h2 style="font-size:14px;margin-bottom:10px">Datos del proveedor</h2>
        <dl>
          <dt>Owner</dt><dd>${r.owner_email}</dd>
          <dt>Tipo contrato</dt><dd>${r.tipo_contrato ?? '-'}</dd>
          <dt>Vigencia</dt><dd>${r.vigencia_meses ?? '-'} meses</dd>
          <dt>Criticidad</dt><dd>${r.criticidad ?? '-'}</dd>
          <dt>Nivel acceso</dt><dd>${r.nivel_acceso ?? '-'}</dd>
          <dt>Borrador</dt><dd>${r.draft_url ? `<a href="${r.draft_url}" target="_blank">${r.draft_url}</a>` : '-'}</dd>
        </dl>
      </div>

      <div id="panel-detail">
        <h2 style="font-size:14px;margin-bottom:10px">Aprobaciones</h2>
        ${['compliance','legal','admin'].map(team => {
          const a = apps.find(x => x.team === team);
          const status = a?.decision ?? 'pendiente';
          const kind = status === 'approved' ? 'green' : status === 'rejected' ? 'red' : status === 'requested_changes' ? 'yellow' : 'gray';
          return `<div style="margin:6px 0"><b>${team}:</b> ${pill(status, kind)} ${a?.comment ? `<span class="muted">— ${a.comment}</span>` : ''} <span class="muted" style="font-size:11px">${a ? dt(a.decided_at) : ''}</span></div>`;
        }).join('')}
      </div>

      ${ext ? `<div id="panel-detail">
        <h2 style="font-size:14px;margin-bottom:10px">Extracción Gemini</h2>
        <dl>
          <dt>Tipo contrato</dt><dd>${ext.tipo_contrato ?? '-'}</dd>
          <dt>Vigencia</dt><dd>${ext.vigencia?.duracion_meses ?? '-'} meses</dd>
          <dt>Renovación automática</dt><dd>${ext.vigencia?.renovacion_automatica ?? '-'}</dd>
          <dt>Anti-corrupción</dt><dd>${ext.anti_corrupcion ? '✓' : '✗'}</dd>
          <dt>Protección datos</dt><dd>${ext.proteccion_datos ? '✓' : '✗'}</dd>
        </dl>
        ${risks.length ? `<h3 style="font-size:12px;color:var(--muted);margin-top:14px;margin-bottom:6px">Riesgos detectados</h3>
          <ul style="list-style:none">${risks.map(r => `<li style="margin:4px 0">${pill(r.severidad, r.severidad === 'alta' ? 'red' : r.severidad === 'media' ? 'yellow' : 'gray')} <b>${r.tipo}:</b> ${r.descripcion}</li>`).join('')}</ul>` : ''}
      </div>` : ''}

      ${sanct ? `<div id="panel-detail">
        <h2 style="font-size:14px;margin-bottom:10px">Sanciones</h2>
        <div>${sanct.hit ? pill('hit', 'red') + ' Match detectado' : pill('clean', 'green') + ' Sin match'}</div>
        ${sanct.matches?.length ? `<pre class="muted" style="font-size:11px;margin-top:8px;overflow:auto">${JSON.stringify(sanct.matches, null, 2)}</pre>` : ''}
      </div>` : ''}

      <div id="panel-detail">
        <h2 style="font-size:14px;margin-bottom:10px">Timeline (audit log)</h2>
        <ul class="timeline">${audits.map(a => `<li>
          <b>${a.action}</b> <span class="muted">por ${a.actor}</span>
          ${a.payload && Object.keys(a.payload).length ? `<span class="muted"> — ${JSON.stringify(a.payload).slice(0, 100)}</span>` : ''}
          <br><span class="ts">${dt(a.created_at)}</span>
        </li>`).join('')}</ul>
      </div>
    `;
  },

  async providers() {
    const list = await q('providers', 'order=created_at.desc&limit=200');
    view.innerHTML = `
      <h2>Proveedores</h2>
      <div class="toolbar">
        <input type="search" id="filter" placeholder="Filtrar...">
        <select id="status-filter">
          <option value="">Todos los estados</option>
          <option value="pendiente_revision">Pendiente revisión</option>
          <option value="aceptado">Aceptado</option>
          <option value="rechazado">Rechazado</option>
          <option value="inactivo">Inactivo</option>
        </select>
      </div>
      <table>
        <thead><tr><th>Razón social</th><th>Tax ID</th><th>País</th><th>Tipo</th><th>Status</th><th>Criticidad</th><th>Creado</th></tr></thead>
        <tbody id="rows">${list.map(p => `
          <tr class="clickable" data-search="${(p.razon_social + ' ' + p.tax_id + ' ' + p.pais).toLowerCase()}" data-status="${p.status}">
            <td>${p.razon_social}</td><td class="muted">${p.tax_id}</td><td>${p.pais}</td>
            <td>${p.tipo_proveedor ?? '-'}</td>
            <td>${pill(p.status, p.status === 'aceptado' ? 'green' : p.status === 'rechazado' ? 'red' : p.status === 'inactivo' ? 'gray' : 'yellow')}</td>
            <td>${p.criticidad ?? '-'}</td>
            <td class="muted">${dt(p.created_at)}</td>
          </tr>`).join('')}</tbody>
      </table>
    `;
    const apply = () => {
      const v = $('#filter').value.toLowerCase();
      const s = $('#status-filter').value;
      document.querySelectorAll('#rows tr').forEach((tr) => {
        const okText = tr.dataset.search.includes(v);
        const okStatus = !s || tr.dataset.status === s;
        tr.style.display = (okText && okStatus) ? '' : 'none';
      });
    };
    $('#filter').addEventListener('input', apply);
    $('#status-filter').addEventListener('change', apply);
  },

  async contracts() {
    const list = await q('contracts', 'order=created_at.desc&limit=200');
    const providersMap = {};
    if (list.length) {
      const ids = [...new Set(list.map(c => c.provider_id))].slice(0, 100);
      const provs = await q('providers', `id=in.(${ids.join(',')})`);
      provs.forEach(p => providersMap[p.id] = p);
    }
    view.innerHTML = `
      <h2>Contratos</h2>
      <table>
        <thead><tr><th>Proveedor</th><th>Tipo</th><th>Monto</th><th>Vigencia</th><th>Status</th><th>Vence</th><th>Firmado</th></tr></thead>
        <tbody>${list.map(c => {
          const p = providersMap[c.provider_id];
          return `<tr>
            <td>${p?.razon_social ?? c.provider_id.slice(0, 8)}</td>
            <td>${c.tipo_contrato ?? '-'}</td>
            <td>${c.monto ?? '-'} ${c.moneda ?? ''}</td>
            <td>${c.vigencia_meses ?? '-'} m</td>
            <td>${pill(c.status, c.status === 'signed' || c.status === 'active' ? 'green' : c.status === 'cancelled' || c.status === 'expired' ? 'red' : c.status === 'expiring' ? 'yellow' : 'blue')}</td>
            <td class="muted">${c.end_date ?? '-'}</td>
            <td class="muted">${dt(c.signed_at)}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    `;
  },
};

checkAuth();
</script>
</body>
</html>
