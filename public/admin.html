<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Global66 — Plataforma Contratos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-50:  #f5f7fe;
    --blue-100: #E9EDF8;
    --blue-200: #9ba9d0;
    --blue-400: #3F5EDF;
    --blue-500: #1F49B6;
    --blue-600: #003eea;
    --blue-700: #102a97;
    --blue-800: #0b1f4b;
    --blue-900: #132046;
    --green:    #02A757;
    --mint:     #33d9b2;
    --red:      #e64a4a;
    --yellow:   #f0b429;
    --text:     #132046;
    --muted:    #565656;
    --bg:       #ffffff;
    --surface:  #f5f7fe;
    --border:   #E9EDF8;
    --shadow-sm: 0 1px 2px rgba(19,32,70,0.04);
    --shadow:    0 1px 3px rgba(19,32,70,0.04), 0 8px 24px rgba(19,32,70,0.06);
    --shadow-lg: 0 4px 12px rgba(19,32,70,0.08), 0 20px 60px rgba(19,32,70,0.12);
    --radius:    14px;
    --radius-sm: 8px;
    --radius-pill: 999px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0 }
  html, body { background: var(--bg); color: var(--text); font: 14px/1.55 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; -webkit-font-smoothing: antialiased }
  h1, h2, h3, h4 { font-family: 'Montserrat', sans-serif; font-weight: 700; letter-spacing: -0.01em }
  h1 { font-size: 22px }
  h2 { font-size: 28px; letter-spacing: -0.02em }
  h3 { font-size: 16px }
  a { color: var(--blue-500); text-decoration: none }
  a:hover { color: var(--blue-600) }
  button { font-family: inherit; cursor: pointer }
  input, select, textarea { font-family: inherit }

  /* ─── Layout ─────────────────────────────────────────── */
  .shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh }
  aside {
    background: var(--blue-900); color: white;
    padding: 24px 16px; display: flex; flex-direction: column; gap: 4px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .logo { display: flex; align-items: center; gap: 10px; padding: 8px 12px 28px; }
  .logo-mark {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--blue-400), var(--mint));
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: white; font-family: 'Montserrat'; font-size: 18px;
  }
  .logo-text { font-family: 'Montserrat'; font-weight: 800; font-size: 15px; letter-spacing: -0.02em; line-height: 1.1 }
  .logo-text small { display: block; color: var(--blue-200); font-weight: 500; font-size: 11px; letter-spacing: 0 }

  nav a {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: var(--radius-sm);
    color: rgba(255,255,255,0.7); font-weight: 500; font-size: 13.5px;
    transition: all .15s ease;
  }
  nav a:hover { background: rgba(255,255,255,0.06); color: white }
  nav a.active { background: var(--blue-500); color: white; box-shadow: 0 4px 12px rgba(31,73,182,0.4) }
  nav a svg { width: 18px; height: 18px; opacity: 0.85 }

  .nav-section { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--blue-200); padding: 16px 12px 6px; font-weight: 600 }

  .nav-bottom { margin-top: auto; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 12px; color: var(--blue-200) }
  .nav-bottom .user-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--blue-500); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 13px; font-family: 'Montserrat' }
  .nav-bottom button { width: 100%; margin-top: 8px; background: transparent; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); padding: 8px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500 }
  .nav-bottom button:hover { background: rgba(255,255,255,0.06); color: white }

  main { padding: 32px 40px; max-width: 1400px; width: 100%ds }

  /* ─── Login ─────────────────────────────────────────── */
  .login-shell { min-height: 100vh; display: grid; place-items: center; background: linear-gradient(135deg, var(--blue-50), white) }
  .login-card {
    background: white; padding: 40px; border-radius: 20px;
    box-shadow: var(--shadow-lg); width: 100%; max-width: 420px;
    text-align: center;
  }
  .login-card .logo { justify-content: center; padding: 0 0 20px }
  .login-card h1 { margin-bottom: 8px }
  .login-card > p { color: var(--muted); margin-bottom: 28px; font-size: 14px }
  .login-card form { display: flex; flex-direction: column; gap: 12px; text-align: left }

  /* ─── Forms ─────────────────────────────────────────── */
  input[type=text],input[type=email],input[type=password],input[type=search],select,textarea {
    background: white; color: var(--text);
    border: 1.5px solid var(--border); padding: 11px 14px;
    border-radius: var(--radius-sm); font-size: 14px;
    transition: all .15s ease; width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--blue-500); box-shadow: 0 0 0 4px rgba(31,73,182,0.08) }
  label { font-size: 12.5px; font-weight: 500; color: var(--muted); margin-bottom: 4px; display: block }

  button.primary {
    background: var(--blue-500); color: white; border: none;
    padding: 11px 22px; border-radius: var(--radius-pill);
    font-weight: 600; font-size: 14px; letter-spacing: -0.01em;
    transition: all .15s ease;
    box-shadow: 0 2px 6px rgba(31,73,182,0.25);
  }
  button.primary:hover { background: var(--blue-600); box-shadow: 0 4px 14px rgba(31,73,182,0.35); transform: translateY(-1px) }
  button.secondary {
    background: white; color: var(--blue-500);
    border: 1.5px solid var(--blue-100);
    padding: 11px 22px; border-radius: var(--radius-pill);
    font-weight: 600; font-size: 14px;
  }
  button.secondary:hover { border-color: var(--blue-500); background: var(--blue-50) }
  button.ghost { background: transparent; color: var(--muted); border: none; padding: 8px 12px; border-radius: var(--radius-sm); font-weight: 500; font-size: 13px }
  button.ghost:hover { color: var(--text); background: var(--surface) }

  /* ─── Stepper ───────────────────────────────────────── */
  .stepper { display: flex; gap: 0; margin: 8px 0 24px; align-items: stretch; flex-wrap: wrap }
  .step { flex: 1; min-width: 130px; display: flex; flex-direction: column; align-items: center; padding: 14px 8px; position: relative; background: white; border: 1px solid var(--border); border-radius: var(--radius); margin-right: -1px }
  .step:first-child { border-radius: var(--radius) 0 0 var(--radius) }
  .step:last-child { border-radius: 0 var(--radius) var(--radius) 0; margin-right: 0 }
  .step .num { width: 30px; height: 30px; border-radius: 50%; background: var(--blue-100); color: var(--blue-700); display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: 'Montserrat'; font-size: 13px; margin-bottom: 6px }
  .step .label { font-size: 12px; font-weight: 600; text-align: center; color: var(--text) }
  .step .who { font-size: 10px; color: var(--muted); margin-top: 3px; text-align: center }
  .step.done { background: var(--blue-50); border-color: var(--blue-200) }
  .step.done .num { background: var(--green); color: white }
  .step.active { background: white; border-color: var(--blue-500); border-width: 2px; box-shadow: 0 4px 14px rgba(31,73,182,0.15) }
  .step.active .num { background: var(--blue-500); color: white; box-shadow: 0 0 0 4px rgba(31,73,182,0.15) }
  .step.rejected { background: rgba(230,74,74,0.05); border-color: var(--red) }
  .step.rejected .num { background: var(--red); color: white }

  /* ─── Cards ─────────────────────────────────────────── */
  .grid { display: grid; gap: 16px; margin-bottom: 24px }
  .grid-4 { grid-template-columns: repeat(auto-fit, minmax(220px,1fr)) }
  .grid-2 { grid-template-columns: repeat(auto-fit, minmax(360px,1fr)) }

  .card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow-sm); transition: box-shadow .2s ease }
  .card.lift:hover { box-shadow: var(--shadow) }
  .stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 600; margin-bottom: 8px }
  .stat-num { font-family: 'Montserrat'; font-size: 32px; font-weight: 700; line-height: 1; letter-spacing: -0.025em; color: var(--blue-800) }
  .stat-num small { font-size: 14px; color: var(--muted); font-weight: 500; margin-left: 6px; letter-spacing: 0 }
  .stat-delta { color: var(--green); font-size: 12px; margin-top: 8px; font-weight: 500 }

  /* ─── Tables ────────────────────────────────────────── */
  .table-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm) }
  table { width: 100%; border-collapse: collapse; font-size: 13px }
  th, td { text-align: left; padding: 14px 18px; border-bottom: 1px solid var(--border) }
  th { background: var(--surface); color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em }
  tr:last-child td { border-bottom: none }
  tr.clickable { cursor: pointer; transition: background .12s ease }
  tr.clickable:hover td { background: var(--blue-50) }
  td.muted { color: var(--muted) }
  td.right { text-align: right; font-variant-numeric: tabular-nums }

  /* ─── Pills ─────────────────────────────────────────── */
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: var(--radius-pill); font-size: 12px; font-weight: 600; line-height: 1.6 }
  .pill.green  { background: rgba(2,167,87,0.1);   color: var(--green) }
  .pill.yellow { background: rgba(240,180,41,0.12); color: #a8780a }
  .pill.red    { background: rgba(230,74,74,0.1);  color: var(--red) }
  .pill.blue   { background: var(--blue-100);       color: var(--blue-700) }
  .pill.gray   { background: #f0f2f6;               color: var(--muted) }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor }

  /* ─── Misc ──────────────────────────────────────────── */
  .toolbar { display: flex; gap: 12px; margin-bottom: 18px; align-items: center; flex-wrap: wrap }
  .toolbar input, .toolbar select { max-width: 320px }
  .breadcrumb { color: var(--muted); font-size: 13px; margin-bottom: 8px }
  .breadcrumb a { color: var(--muted) }
  .breadcrumb a:hover { color: var(--blue-500) }
  .header-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap }

  .timeline { list-style: none; border-left: 2px solid var(--border); padding-left: 24px; margin-left: 4px }
  .timeline li { position: relative; padding: 10px 0; font-size: 13px }
  .timeline li::before { content: ''; position: absolute; left: -31px; top: 16px; width: 12px; height: 12px; border-radius: 50%; background: var(--blue-500); border: 2px solid white; box-shadow: 0 0 0 1px var(--blue-100) }
  .timeline .ts { color: var(--muted); font-size: 11px; margin-top: 2px; display: block }

  dl.props { display: grid; grid-template-columns: 220px 1fr; gap: 12px 24px; font-size: 14px }
  dl.props dt { color: var(--muted); font-weight: 500 }
  dl.props dd { font-weight: 500; color: var(--text) }

  .err { background: rgba(230,74,74,0.08); border: 1px solid rgba(230,74,74,0.3); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--red); font-size: 13px; margin: 12px 0 }
  .ok  { background: rgba(2,167,87,0.08); border: 1px solid rgba(2,167,87,0.3); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--green); font-size: 13px; margin: 12px 0 }

  #loading { padding: 60px; text-align: center; color: var(--muted) }
  .empty { padding: 60px 20px; text-align: center; color: var(--muted) }
  .empty p { margin-top: 8px; font-size: 13px }

  pre { background: var(--surface); padding: 12px; border-radius: var(--radius-sm); font-size: 11px; overflow: auto; color: var(--text) }

  /* Dropzones (PR2) */
  .dropzone { border: 1.5px dashed var(--blue-100); border-radius: var(--radius); padding: 18px; background: var(--blue-50); transition: all .15s ease }
  .dropzone.drag { border-color: var(--blue-500); background: rgba(31,73,182,0.05) }
  .drop-hint { font-size: 13.5px; color: var(--muted); text-align: center }
  .drop-hint a { font-weight: 600 }
  .drop-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px }
  .drop-list:empty { margin: 0 }
  .drop-item { display: flex; gap: 10px; align-items: center; background: white; border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; font-size: 13px }
  .drop-icon { font-size: 18px }
  .drop-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500 }
  .drop-size { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums }
  .drop-status { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600 }
  .drop-status[data-status="ready"] { background: var(--blue-100); color: var(--blue-700) }
  .drop-status[data-status="uploading"] { background: rgba(240,180,41,0.15); color: #a8780a }
  .drop-status[data-status="done"] { background: rgba(2,167,87,0.12); color: var(--green) }
  .drop-status[data-status="error"] { background: rgba(230,74,74,0.12); color: var(--red) }
  .drop-remove { border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 18px; padding: 0 4px }
  .drop-remove:hover { color: var(--red) }

  /* Doc viewer + comments (PR2) */
  .doc-viewer-wrap { display: grid; grid-template-columns: minmax(0,1fr) 360px; gap: 16px; margin-top: 16px }
  .doc-preview { background: white; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; min-height: 520px; display: flex; flex-direction: column }
  .doc-preview-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; font-size: 13px; background: var(--surface) }
  .doc-preview-body { flex: 1; overflow: auto; padding: 16px; background: #fafbff }
  .doc-preview-body iframe { width: 100%; height: 100%; min-height: 480px; border: none }
  .doc-preview-body .docx-render { background: white; padding: 28px; max-width: 760px; margin: 0 auto; box-shadow: 0 1px 6px rgba(19,32,70,0.08); font-family: 'Inter', sans-serif }
  .doc-preview-body .docx-render p { margin: 8px 0 }
  .doc-preview-body .docx-render h1, .doc-preview-body .docx-render h2 { margin: 12px 0 6px }

  .doc-files-list { display: flex; flex-direction: column; gap: 4px; padding: 10px 14px; border-bottom: 1px solid var(--border); background: white; font-size: 12.5px }
  .doc-files-list .file-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: var(--blue-50); color: var(--blue-700); cursor: pointer; border: 1px solid transparent }
  .doc-files-list .file-pill.active { background: var(--blue-500); color: white }
  .doc-files-list .file-pill:hover:not(.active) { border-color: var(--blue-200) }

  .comments-panel { background: white; border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; max-height: 720px }
  .comments-header { padding: 12px 14px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; display: flex; justify-content: space-between; align-items: center }
  .comments-list { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; gap: 12px }
  .comment { background: var(--surface); border-radius: 10px; padding: 10px 12px; font-size: 13px }
  .comment.is-mine { background: var(--blue-50) }
  .comment-meta { display: flex; gap: 8px; align-items: center; font-size: 11.5px; color: var(--muted); margin-bottom: 4px }
  .comment-author { font-weight: 600; color: var(--text) }
  .comment-page { background: var(--blue-100); color: var(--blue-700); padding: 1px 6px; border-radius: 999px; font-weight: 600 }
  .comment-body { white-space: pre-wrap; word-break: break-word }
  .comment-body .mention { background: rgba(31,73,182,0.1); color: var(--blue-700); padding: 1px 6px; border-radius: 999px; font-weight: 500 }
  .comment-composer { border-top: 1px solid var(--border); padding: 12px 14px; position: relative }
  .comment-composer textarea { min-height: 60px; resize: vertical; font-size: 13px }
  .comment-composer .composer-row { display: flex; gap: 8px; align-items: center; margin-top: 8px }
  .comment-composer input[type=number] { width: 80px }
  .mention-popup { position: absolute; bottom: 80px; left: 14px; right: 14px; background: white; border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow); max-height: 220px; overflow-y: auto; z-index: 20 }
  .mention-popup .mention-item { padding: 8px 12px; cursor: pointer; font-size: 13px; display: flex; gap: 8px; align-items: center }
  .mention-popup .mention-item:hover, .mention-popup .mention-item.focus { background: var(--blue-50) }
  .mention-popup .mention-roles { color: var(--muted); font-size: 11px; margin-left: auto }

  /* Notif badge */
  .notif-bell { position: relative; cursor: pointer; padding: 6px 10px; border-radius: 999px; background: rgba(255,255,255,0.06); color: white; font-size: 14px }
  .notif-bell .badge { position: absolute; top: -2px; right: -2px; background: var(--red); color: white; border-radius: 999px; font-size: 10px; font-weight: 700; padding: 0 5px; min-width: 16px; text-align: center; line-height: 16px }
  .notif-popup { position: absolute; right: 16px; top: 60px; width: 340px; background: white; border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); z-index: 100; max-height: 480px; display: flex; flex-direction: column }
  .notif-popup-header { padding: 12px 14px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; display: flex; justify-content: space-between; align-items: center }
  .notif-popup-list { flex: 1; overflow-y: auto }
  .notif-item { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13px }
  .notif-item:hover { background: var(--surface) }
  .notif-item.unread { background: var(--blue-50) }
  .notif-item .notif-author { font-weight: 600; color: var(--blue-700) }
  .notif-item .notif-time { color: var(--muted); font-size: 11px }

  @media (max-width: 900px) {
    .doc-viewer-wrap { grid-template-columns: 1fr }
  }

  /* Risk severity */
  .risk { display: flex; gap: 10px; padding: 10px 0; align-items: flex-start; border-bottom: 1px solid var(--border) }
  .risk:last-child { border-bottom: none }
  .risk b { color: var(--text); font-weight: 600 }
  .risk span.desc { color: var(--muted); font-size: 13px; display: block; margin-top: 2px }

  @media (max-width: 900px) {
    .shell { grid-template-columns: 1fr }
    aside { position: relative; height: auto; flex-direction: row; flex-wrap: wrap; gap: 6px; padding: 16px }
    .logo, .nav-section, .nav-bottom { display: none }
    main { padding: 20px }
  }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen" class="login-shell" style="display:none" hidden>
  <div class="login-card">
    <div class="logo">
      <div class="logo-mark">G</div>
      <div class="logo-text">global66<small>contratos</small></div>
    </div>
    <h1>Iniciar sesión</h1>
    <p>Plataforma interna de gestión de contratos con proveedores</p>
    <form id="login-form">
      <div>
        <label>Email corporativo</label>
        <input type="email" id="login-email" placeholder="tu.nombre@global66.com" required autocomplete="email">
      </div>
      <div>
        <label>Contraseña</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="primary" type="submit">Entrar</button>
      <button class="secondary" type="button" id="magic-link">Enviar magic link al email</button>
      <div id="login-err" class="err" hidden></div>
      <div id="login-ok" class="ok" hidden></div>
    </form>
  </div>
</div>

<!-- App -->
<div id="app-shell" class="shell">
  <aside>
    <div class="logo">
      <div class="logo-mark">G</div>
      <div class="logo-text">global66<small>contratos</small></div>
    </div>

    <div class="nav-section">Resumen</div>
    <nav id="nav">
      <a href="#dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Dashboard
      </a>
    </nav>

    <div class="nav-section">Gestión</div>
    <nav>
      <a href="#intake/new" style="background:rgba(255,255,255,0.06);color:white">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nueva solicitud
      </a>
      <a href="#workflows">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        Solicitudes
      </a>
      <a href="#providers">

<script type="module">
const $ = (s) => document.querySelector(s);
const view = $('#view');
const loading = $('#loading');

// Estado auth poblado por checkAuth().
window.__me = null;
window.__role = null;
window.__roles = [];

function hasRole(r) {
  return Array.isArray(window.__roles) && window.__roles.includes(r);
}
window.hasRole = hasRole;

function showAuthBanner(msg) {
  document.body.insertAdjacentHTML('afterbegin',
    `<div style="position:fixed;top:0;left:0;right:0;background:#e64a4a;color:white;padding:14px;text-align:center;z-index:9999;font-family:system-ui">Auth error: ${msg}</div>`);
}

async function checkAuth() {
  // Quita banner de error si la URL trae auth_error.
  const qs = new URLSearchParams(location.search);
  if (qs.get('auth_error')) {
    showAuthBanner(qs.get('auth_error'));
    history.replaceState(null, '', location.pathname);
  }

  let me = null;
  try {
    const r = await fetch('/api/auth/me', { credentials: 'include' });
    if (r.ok) me = await r.json();
  } catch {}

  if (!me?.ok) {
    $('#login-screen').hidden = false; $('#login-screen').style.display = '';
    $('#app-shell').hidden = true;
    return;
  }

  window.__me = me;
  window.__roles = me.roles ?? [];
  window.__role = me.roles?.includes('admin') ? 'admin' : (me.roles?.[0] ?? 'solicitante');

  $('#login-screen').hidden = true; $('#login-screen').style.display = 'none';
  $('#app-shell').hidden = false;

  const email = me.email ?? '';
  $('#user-email').textContent = email + (me.bypass ? ' · DEV' : '');
  const name = me.display_name ?? email.split('@')[0].replace(/\./g, ' ').replace(/\b\w/g, l => l.toUpperCase());
  $('#user-name').textContent = name;
  $('#avatar').textContent = (email[0] ?? '?').toUpperCase();
  $('#nav-users').hidden = !hasRole('admin');
  route();
}

async function sendMagicLinkViaServer(email) {
  const r = await fetch('/api/auth/magic-link', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ email }),
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) return { error: data.error ?? `HTTP ${r.status}` };
  return { ok: true };
}

async function doLogin(ev) {
  if (ev) ev.preventDefault();
  $('#login-err').hidden = true; $('#login-ok').hidden = true;
  const email = ($('#login-email').value || '').trim();
  const password = $('#login-password').value;
  if (!email) { $('#login-err').textContent = 'Email requerido'; $('#login-err').hidden = false; return; }

  if (!password) {
    const r = await sendMagicLinkViaServer(email);
    if (r.error) { $('#login-err').textContent = r.error; $('#login-err').hidden = false; }
    else { $('#login-ok').textContent = 'Revisá tu email — te mandamos un link de acceso'; $('#login-ok').hidden = false; }
    return;
  }

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password }),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) { $('#login-err').textContent = data.error || 'Login fallido'; $('#login-err').hidden = false; return; }
    checkAuth();
  } catch (e) {
    $('#login-err').textContent = 'Excepción: ' + e.message;
    $('#login-err').hidden = false;
  }
}

$('#login-form').addEventListener('submit', doLogin);
document.querySelector('#login-form button[type=submit]')?.addEventListener('click', (ev) => {
  if (!ev.defaultPrevented) doLogin(ev);
});

$('#magic-link').addEventListener('click', async () => {
  const email = $('#login-email').value;
  if (!email) { $('#login-err').textContent = 'Ingresá tu email primero'; $('#login-err').hidden = false; return; }
  const r = await sendMagicLinkViaServer(email);
  if (r.error) { $('#login-err').textContent = r.error; $('#login-err').hidden = false; }
  else { $('#login-ok').textContent = 'Revisá tu email — te mandamos un link'; $('#login-ok').hidden = false; }
});

$('#logout').addEventListener('click', async () => {
  try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }); } catch {}
  window.__me = null; window.__roles = []; window.__role = null;
  checkAuth();
});

window.addEventListener('hashchange', route);

async function route() {
  const hash = location.hash.slice(1) || 'dashboard';
  const [page, ...params] = hash.split('/');
  document.querySelectorAll('#nav a, aside nav a').forEach((a) => a.classList.toggle('active', a.getAttribute('href').slice(1).split('/')[0] === page));
  loading.hidden = false; view.innerHTML = '';
  try {
    if (page === 'intake') return await intakeForm(params);
    if (page === 'users') return await usersPage();
    await (pages[page] ?? pages.dashboard)(params);
  }
  catch (e) { view.innerHTML = `<div class="err">${e.message}</div>`; }
  finally { loading.hidden = true; }
}

async function q(table, qs = '') {
  // Proxy server-side: la cookie httpOnly viaja sola; el server aplica RLS con el JWT.
  const params = qs ? `&${qs}` : '';
  const r = await fetch(`/api/data?table=${encodeURIComponent(table)}${params}`, {
    credentials: 'include',
  });
  if (!r.ok) throw new Error(`${table}: ${r.status} ${await r.text()}`);
  return r.json();
}

const dotPill = (txt, kind) => txt ? `<span class="pill ${kind ?? 'gray'}"><span class="dot"></span>${txt}</span>` : `<span class="pill gray">—</span>`;
const pill = (txt, kind) => txt ? `<span class="pill ${kind ?? 'gray'}">${txt}</span>` : `<span class="pill gray">—</span>`;
const semKind = (s) => s === 'green' ? 'green' : s === 'yellow' ? 'yellow' : s === 'red' ? 'red' : 'gray';
const phaseKind = (p) => p === 'signed' ? 'green' : p === 'rejected' ? 'red' : p === 'cancelled' ? 'gray' : 'blue';
const statusKind = (s) => s === 'aceptado' || s === 'signed' || s === 'active' ? 'green' : s === 'rechazado' || s === 'cancelled' || s === 'expired' ? 'red' : s === 'expiring' || s === 'pendiente_revision' ? 'yellow' : s === 'inactivo' ? 'gray' : 'blue';
const dt = (iso) => (iso ?? '').slice(0, 16).replace('T', ' · ');
const money = (n, c) => n != null ? new Intl.NumberFormat('es-CL').format(n) + (c ? ' ' + c : '') : '—';

const pages = {
  async dashboard() {
    const [phases, approvals, costs, sanctions, runs, providers, contracts] = await Promise.all([
      q('v_runs_by_phase').catch(() => []),
      q('v_avg_approval_time').catch(() => []),
      q('v_extraction_costs', 'limit=7').catch(() => []),
      q('v_sanctions_hits', 'limit=4').catch(() => []),
      q('workflow_runs', 'order=created_at.desc&limit=10'),
      q('v_providers_by_country').catch(() => []),
      q('v_contracts_by_status').catch(() => []),
    ]);

    const totalRuns = phases.reduce((a, p) => a + (p.total ?? 0), 0);
    const totalProv = providers.reduce((a, p) => a + (p.total ?? 0), 0);
    const totalContracts = contracts.reduce((a, c) => a + (c.total ?? 0), 0);
    const totalCost = costs.reduce((a, c) => a + Number(c.cost_usd_total ?? 0), 0).toFixed(2);

    view.innerHTML = `
      <div class="header-row">
        <div>
          <h2>Buen día 👋</h2>
          <p style="color:var(--muted);margin-top:4px">Resumen del estado de contratos y proveedores</p>
        </div>
      </div>

      <div class="grid grid-4">
        <div class="card lift">
          <div class="stat-label">Solicitudes</div>
          <div class="stat-num">${totalRuns}</div>
          <div class="stat-delta">workflow_runs totales</div>
        </div>
        <div class="card lift">
          <div class="stat-label">Proveedores</div>
          <div class="stat-num">${totalProv}</div>
        </div>
        <div class="card lift">
          <div class="stat-label">Contratos</div>
          <div class="stat-num">${totalContracts}</div>
        </div>
        <div class="card lift">
          <div class="stat-label">Costo Gemini (7d)</div>
          <div class="stat-num">$${totalCost}<small>USD</small></div>
        </div>
      </div>

      <div class="grid grid-2">
        <div class="table-card">
          <div style="padding:16px 18px;border-bottom:1px solid var(--border)"><h3>Solicitudes por fase</h3></div>
          <table>
            <thead><tr><th>Fase</th><th>Total</th><th>🟢</th><th>🟡</th><th>🔴</th></tr></thead>
            <tbody>${phases.length ? phases.map(p => `<tr><td>${dotPill(p.current_phase, phaseKind(p.current_phase))}</td><td>${p.total}</td><td>${p.green}</td><td>${p.yellow}</td><td>${p.red}</td></tr>`).join('') : '<tr><td colspan=5 class=muted style="text-align:center;padding:24px">Sin datos</td></tr>'}</tbody>
          </table>

      <div class="table-card" style="margin-top:8px">

          <h3>Últimas solicitudes</h3>

        </div>
        <table>
          <thead><tr><th>Proveedor</th><th>Tax ID</th><th>País</th><th>Sociedad</th><th>Fase</th><th>Semáforo</th><th>Fecha</th></tr></thead>

              <td class="muted">${dt(r.created_at)}</td>

        </table>
      </div>
    `;
  },

  async workflows(params) {
    if (params[0]) return pages.workflowDetail(params[0]);
    const runs = await q('workflow_runs', 'order=created_at.desc&limit=100');
    view.innerHTML = `
      <div class="header-row">
        <h2>Solicitudes</h2>
        <span class="muted" style="font-size:13px">${runs.length} workflow runs</span>
      </div>

        <input type="search" id="filter" placeholder="🔍 Buscar por proveedor o RUT…">
      </div>
      <div class="table-card">
        <table>
          <thead><tr><th>Proveedor</th><th>Tax ID</th><th>País</th><th>Sociedad</th><th>Monto</th><th>Fase</th><th>Semáforo</th><th>Owner</th><th>Fecha</th></tr></thead>
          <tbody id="rows">${runs.length ? runs.map(r => `

              <td><b>${r.razon_social}</b></td>
              <td class="muted">${r.tax_id}</td>
              <td>${r.pais}</td>
              <td class="muted">${r.sociedad_contratante ?? '—'}</td>
              <td class="right">${money(r.monto, r.moneda)}</td>
              <td>${dotPill(r.current_phase, phaseKind(r.current_phase))}</td>
              <td>${dotPill(r.semaforo, semKind(r.semaforo))}</td>
              <td class="muted">${r.owner_email ?? '—'}</td>
              <td class="muted">${dt(r.created_at)}</td>
            </tr>`).join('') : '<tr><td colspan=9 class="empty">Sin solicitudes todavía<p>Las nuevas solicitudes aparecerán aquí cuando alguien complete el form.</p></td></tr>'}</tbody>
        </table>
      </div>
    `;
    $('#filter')?.addEventListener('input', (e) => {
      const v = e.target.value.toLowerCase();
      document.querySelectorAll('#rows tr').forEach((tr) => {
        if (tr.dataset.search) tr.style.display = tr.dataset.search.includes(v) ? '' : 'none';
      });
    });
  },

  async workflowDetail(runId) {
    const [runs, apps, audits, extraction, sanctions, uploads] = await Promise.all([
      q('workflow_runs', `id=eq.${runId}`),
      q('approvals', `workflow_run_id=eq.${runId}&order=decided_at.asc`),
      q('audit_log', `workflow_run_id=eq.${runId}&order=created_at.asc`),
      q('extractions', `workflow_run_id=eq.${runId}&order=created_at.desc&limit=1`),
      q('sanctions_checks', `workflow_run_id=eq.${runId}&order=created_at.desc&limit=1`),
      q('provider_uploads', `workflow_run_id=eq.${runId}&order=created_at.desc`).catch(() => []),
    ]);
    const r = runs[0];
    if (!r) { view.innerHTML = '<div class="err">Solicitud no encontrada</div>'; return; }
    const ext = extraction[0]?.extracted_json;
    const risks = ext?.riesgos_detectados ?? [];
    const sanct = sanctions[0];

    view.innerHTML = `
      <div class="breadcrumb"><a href="#workflows">← Volver a solicitudes</a></div>

        <div>
          <h2>${r.razon_social}</h2>

        <h3 style="margin-bottom:12px">Sanciones</h3>
        ${sanct.hit ? `<div class="err">⚠️ Match en lista de sanciones</div><pre>${JSON.stringify(sanct.matches, null, 2)}</pre>` : `<div class="ok">✓ Sin matches</div>`}

      ${uploads.length ? `<div class="card" style="margin-bottom:16px">

            <td>${dotPill(u.rag_status, u.rag_status === 'done' ? 'green' : u.rag_status === 'failed' ? 'red' : 'yellow')}</td>
            <td>${dotPill(u.validation_status, u.validation_status === 'match' ? 'green' : u.validation_status === 'mismatch' ? 'red' : 'yellow')}</td>

    mountDocViewer(runId);
  },

  async providers() {
    const list = await q('providers', 'order=created_at.desc&limit=200').catch(() => []);
    view.innerHTML = `
      <div class="header-row">
        <h2>Proveedores</h2>
        <span class="muted" style="font-size:13px">${list.length} registrados</span>
      </div>
      <div class="toolbar">
        <input type="search" id="filter" placeholder="🔍 Buscar…">
        <select id="status-filter">
          <option value="">Todos los estados</option>

function renderStepper(r) {
  const phase = r.current_phase;
  const intApproved = r.internal_approval_status === 'approved';
  const intRejected = r.internal_approval_status === 'rejected';
  const stages = [
    { num: 1, label: 'Solicitud', who: 'Solicitante interno' },
    { num: 2, label: 'Aprobación interna', who: 'Aprobador Global66' },
    { num: 3, label: 'Datos proveedor', who: 'Proveedor' },
    { num: 4, label: 'Validación docs', who: 'IA + Compliance' },
    { num: 5, label: 'Firma', who: 'Apoderado + Proveedor' },
    { num: 6, label: 'Cerrado', who: '—' },
  ];

  // Determine current step index 0..5
  let cur = 0;
  if (intRejected || phase === 'rejected') cur = 1;
  else if (!intApproved && phase === 'fase1') cur = 1;
  else if (intApproved && phase === 'fase1') cur = 2;
  else if (phase === 'hito1') cur = 3;
  else if (phase === 'fase2') cur = 3;
  else if (phase === 'fase3') cur = 4;
  else if (phase === 'signed') cur = 5;

  const rejected = intRejected || phase === 'rejected';

  return `<div class="stepper">${stages.map((s, i) => {
    const cls = rejected && i === cur ? 'rejected' : i < cur ? 'done' : i === cur ? 'active' : '';
    return `<div class="step ${cls}">
      <div class="num">${i < cur ? '✓' : s.num}</div>
      <div class="label">${s.label}</div>
      <div class="who">${s.who}</div>
    </div>`;
  }).join('')}</div>`;
}

async function authedFetch(path, opts = {}) {
  // Cookie httpOnly viaja sola. No leemos tokens del JS.
  return fetch(path, {
    ...opts,
    credentials: 'include',
    headers: { ...(opts.headers ?? {}) },
  });
}

        </div>

      </div>
      <div id="invite-result" style="margin-top:12px"></div>

        <thead><tr><th>Email</th><th>Roles</th><th>Sociedades</th><th>Confirmado</th><th>Último login</th><th>Creado</th><th></th></tr></thead>
        <tbody>${users.map(u => `<tr data-id="${u.id}" data-email="${u.email}">

          <td>${renderRolesCell(u)}</td>

          <td>${u.confirmed ? '✓' : '—'}</td>

        </tr>`).join('')}</tbody>

    const email = $('#new-user-email').value.trim();

  });

  document.querySelectorAll('.del-btn').forEach((btn) => {
    btn.addEventListener('click', async (e) => {
      if (!confirm(`¿Eliminar usuario ${e.target.dataset.email}?`)) return;
      await authedFetch('/api/admin/users?id=' + e.target.dataset.id, { method: 'DELETE' });
      location.reload();
    });
  });
}

window.submitApproval = async function (runId, decision) {
  const sociedad = document.getElementById('approve-sociedad').value;
  const apoderado = document.getElementById('approve-apoderado').value;
  const comment = document.getElementById('approve-comment').value;
  if (decision === 'approved' && !sociedad) {
    document.getElementById('approve-err').textContent = 'Asigná la sociedad contratante antes de aprobar';
    document.getElementById('approve-err').hidden = false;
    return;
  }
  try {
    const r = await fetch('/api/intake/approve', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        run_id: runId,
        decision,
        sociedad_contratante: sociedad || undefined,
        sociedad_apoderado_email: apoderado || undefined,
        comment,
        approver_email: window.__me?.email,
      }),
    });
    const result = await r.json();
    if (!r.ok) throw new Error(result.error ?? 'Error');
    const ok = document.getElementById('approve-ok');
    ok.innerHTML = decision === 'approved'
      ? `✓ Aprobado. ${result.provider_invited ? 'Email enviado al proveedor.' : 'Proveedor sin email.'} <a href="${result.profile_url}" target="_blank">Link perfil</a>`
      : `Decisión registrada: ${decision}`;
    ok.hidden = false;
    setTimeout(() => location.reload(), 1500);
  } catch (e) {
    document.getElementById('approve-err').textContent = e.message;
    document.getElementById('approve-err').hidden = false;
  }
};

    lookupBanner.innerHTML = html;
    lookupBanner.style.background = kind === 'ok' ? 'rgba(2,167,87,0.08)' : kind === 'info' ? 'rgba(31,73,182,0.08)' : 'rgba(240,180,41,0.08)';
    lookupBanner.style.color = kind === 'ok' ? '#02A757' : kind === 'info' ? '#1F49B6' : '#a8780a';
  }
  async function lookupProvider() {
    const v = rutInput.value.trim();
    if (!v) { lookupBanner?.remove(); lookupBanner = null; return; }
    setLookupBanner('Buscando…', 'info');
    try {
      const r = await fetch(`/api/providers/lookup?tax_id=${encodeURIComponent(v)}`, { credentials: 'include' });
      if (r.status === 404) { setLookupBanner('Proveedor nuevo. Completá los datos abajo.', 'info'); return; }
      if (!r.ok) { setLookupBanner('Error consulta: ' + r.status, 'warn'); return; }
      const p = await r.json();
      // Prefill todos los campos que correspondan
      const map = {
        razon_social: p.razon_social,
        pais: p.pais,
        tipo_proveedor: p.tipo_proveedor,
        representante_legal: p.representante_legal,
        email_contacto: p.email_contacto,
        email_facturacion: p.email_facturacion,
        proveedor_existente: 'true',
      };
      for (const [field, value] of Object.entries(map)) {
        if (value == null || value === '') continue;
        const el = document.querySelector(`[name=${field}]`);
        if (!el) continue;
        if (el.tagName === 'SELECT') {
          // Si la option existe, seleccionarla
          const opt = Array.from(el.options).find((o) => o.value === value || o.text === value);
          if (opt) el.value = opt.value;
        } else {
          el.value = value;
        }
      }
      setLookupBanner(`✓ Proveedor existente encontrado: <b>${p.razon_social}</b> · ${p.status}. Campos autocompletados.`, 'ok');
    } catch (e) {
      setLookupBanner('Error: ' + e.message, 'warn');
    }
  }
  rutInput.addEventListener('blur', lookupProvider);
  rutInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); lookupProvider(); } });

  // Auto: si soy Owner, prefill email
  document.querySelector('#owner-toggle').addEventListener('change', (e) => {
    if (e.target.value === 'true') {
      const oe = document.querySelector('[name=owner_email]');
      const se = document.querySelector('[name=solicitante_email]').value;
      if (!oe.value && se) oe.value = se;
    }
  });

  // Dropzones: registrar y mantener archivos pendientes en memoria.
  const pendingFiles = { main: null, anexo: [] };
  function wireDropzone(el) {
    const kind = el.dataset.kind;
    const input = el.querySelector('input[type=file]');
    const list = el.querySelector('.drop-list');
    el.querySelector('.drop-pick').addEventListener('click', (e) => { e.preventDefault(); input.click(); });
    ['dragenter', 'dragover'].forEach((ev) => el.addEventListener(ev, (e) => { e.preventDefault(); el.classList.add('drag'); }));
    ['dragleave', 'drop'].forEach((ev) => el.addEventListener(ev, (e) => { e.preventDefault(); el.classList.remove('drag'); }));
    el.addEventListener('drop', (e) => { input.files = e.dataTransfer.files; addFiles(input.files); });
    input.addEventListener('change', () => addFiles(input.files));

    function addFiles(fileList) {
      const arr = Array.from(fileList ?? []);
      if (!arr.length) return;
      if (kind === 'main') pendingFiles.main = arr[0];
      else pendingFiles.anexo.push(...arr);
      render();
    }
    function render() {
      const items = kind === 'main' ? (pendingFiles.main ? [pendingFiles.main] : []) : pendingFiles.anexo;
      list.innerHTML = items.map((f, i) => `
        <div class="drop-item" data-idx="${i}">
          <span class="drop-icon">${f.type.includes('pdf') ? '📕' : f.type.includes('word') || f.name.match(/\\.docx?$/) ? '📘' : '📎'}</span>
          <span class="drop-name">${f.name}</span>
          <span class="drop-size">${(f.size / 1024 / 1024).toFixed(2)} MB</span>
          <span class="drop-status" data-status="ready">listo</span>
          <button type="button" class="drop-remove" aria-label="Quitar">×</button>
        </div>
      `).join('');
      list.querySelectorAll('.drop-remove').forEach((b) => b.addEventListener('click', (e) => {
        const idx = Number(e.target.closest('.drop-item').dataset.idx);
        if (kind === 'main') pendingFiles.main = null;
        else pendingFiles.anexo.splice(idx, 1);
        render();
      }));
    }
  }
  document.querySelectorAll('#drop-main, #drop-anexos').forEach(wireDropzone);

  async function uploadOne(runId, providerId, kind, file, statusEl) {
    if (statusEl) { statusEl.dataset.status = 'uploading'; statusEl.textContent = 'subiendo…'; }
    const fd = new FormData();
    fd.append('workflow_run_id', runId);
    if (providerId) fd.append('provider_id', providerId);
    fd.append('kind', kind);
    fd.append('file', file);
    const r = await fetch('/api/files/upload', { method: 'POST', credentials: 'include', body: fd });
    if (!r.ok) {
      const err = await r.text();
      if (statusEl) { statusEl.dataset.status = 'error'; statusEl.textContent = 'error'; }
      throw new Error(err);
    }
    if (statusEl) { statusEl.dataset.status = 'done'; statusEl.textContent = '✓ subido'; }
    return r.json();
  }

  document.querySelector('#intake-form').addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const data = Object.fromEntries(new FormData(ev.target));
    data.monto = data.monto ? Number(data.monto) : null;
    data.owner_es_solicitante = data.owner_es_solicitante === 'true';
    data.proveedor_existente = data.proveedor_existente === 'true';
    data.id = `intake-${Date.now()}`;

    if (!pendingFiles.main) {
      document.querySelector('#intake-err').textContent = 'El borrador del contrato (archivo principal) es obligatorio.';
      document.querySelector('#intake-err').hidden = false;
      return;
    }

    const btn = document.querySelector('#submit-intake');
    btn.disabled = true; btn.textContent = 'Creando solicitud…';
    document.querySelector('#intake-err').hidden = true;

    try {
      const r = await fetch('/api/intake', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const result = await r.json();
      if (!r.ok) throw new Error(result.error ?? 'Error');

      btn.textContent = 'Subiendo archivos…';

      const runId = result.run_id;
      const provId = result.provider_id;
      const statusEls = Array.from(document.querySelectorAll('.drop-status'));
      const uploads = [];
      uploads.push(uploadOne(runId, provId, 'main', pendingFiles.main, statusEls[0]));
      pendingFiles.anexo.forEach((f, i) => uploads.push(uploadOne(runId, provId, 'anexo', f, statusEls[i + 1])));
      const results = await Promise.allSettled(uploads);
      const okCount = results.filter((r) => r.status === 'fulfilled').length;
      const failed = results.filter((r) => r.status === 'rejected');

      const ok = document.querySelector('#intake-ok');
      ok.innerHTML = `
        ✓ Solicitud creada · <code>${runId.slice(0, 8)}</code><br>
        ${result.provider_new ? `📨 Email al proveedor enviado` : `📂 Proveedor reusado`}<br>
        📎 ${okCount} de ${uploads.length} archivos subidos correctamente${failed.length ? ` (${failed.length} con error)` : ''}
        <div style="margin-top:12px"><a href="#workflows/${runId}">Ver detalle →</a></div>
      `;
      ok.hidden = false;
      if (failed.length) {
        document.querySelector('#intake-err').textContent = 'Errores en uploads: ' + failed.map((f) => f.reason?.message ?? 'unknown').join('; ');
        document.querySelector('#intake-err').hidden = false;
      }
      btn.textContent = 'Crear otra';
      btn.disabled = false;
      ev.target.reset();
      pendingFiles.main = null; pendingFiles.anexo = [];
      document.querySelectorAll('.drop-list').forEach((el) => el.innerHTML = '');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (e) {
      document.querySelector('#intake-err').textContent = e.message;
      document.querySelector('#intake-err').hidden = false;
      btn.disabled = false; btn.textContent = 'Crear solicitud →';
    }
  });
}

// ─── Doc viewer + comments + mentions (PR2) ──────────────────────────────

let pdfjsLoaded = null;
async function ensurePdfJs() {
  if (pdfjsLoaded) return pdfjsLoaded;
  pdfjsLoaded = (async () => {
    const mod = await import('https://esm.sh/pdfjs-dist@4.7.76/build/pdf.mjs');
    mod.GlobalWorkerOptions.workerSrc = 'https://esm.sh/pdfjs-dist@4.7.76/build/pdf.worker.mjs';
    return mod;
  })();
  return pdfjsLoaded;
}

let mammothLoaded = null;
async function ensureMammoth() {
  if (mammothLoaded) return mammothLoaded;
  mammothLoaded = (async () => {
    const mod = await import('https://esm.sh/mammoth@1.8.0/mammoth.browser.js');
    return mod.default ?? mod;
  })();
  return mammothLoaded;
}

async function fetchSignedUrl(fileId, { download = false } = {}) {
  const r = await fetch(`/api/files/url?id=${fileId}${download ? '&download=1' : ''}`, { credentials: 'include' });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function renderPdf(container, url) {
  const pdfjs = await ensurePdfJs();
  const doc = await pdfjs.getDocument(url).promise;
  container.innerHTML = '';
  for (let p = 1; p <= doc.numPages; p++) {
    const page = await doc.getPage(p);
    const viewport = page.getViewport({ scale: 1.4 });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width; canvas.height = viewport.height;
    canvas.style.maxWidth = '100%'; canvas.style.boxShadow = '0 1px 6px rgba(19,32,70,0.1)'; canvas.style.marginBottom = '12px';
    container.appendChild(canvas);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  }
}

async function renderDocx(container, url) {
  const mammoth = await ensureMammoth();
  const r = await fetch(url);
  const buf = await r.arrayBuffer();
  const { value } = await mammoth.convertToHtml({ arrayBuffer: buf });
  const wrap = document.createElement('div');
  wrap.className = 'docx-render';
  wrap.innerHTML = value;
  container.innerHTML = '';
  container.appendChild(wrap);
}

async function mountDocViewer(runId) {
  const host = document.querySelector('#doc-viewer-host');
  if (!host) return;
  const files = await fetch(`/api/files?workflow_run_id=${runId}`, { credentials: 'include' }).then((r) => r.json()).catch(() => []);
  if (!files.length) {
    host.innerHTML = '<div class="muted" style="padding:16px">Aún no hay archivos subidos para este flujo.</div>';
    return;
  }

  const sorted = files.sort((a, b) => (a.kind === 'main' ? -1 : 1));
  host.innerHTML = `
    <div class="doc-files-list">
      ${sorted.map((f) => `
        <span class="file-pill" data-id="${f.id}" data-mime="${f.mime_type}" data-name="${f.filename}">
          ${f.kind === 'main' ? '⭐' : f.kind === 'anexo' ? '📎' : '📁'} ${f.filename}
          <span class="muted" style="margin-left:6px;font-size:11px">${(f.size_bytes / 1024 / 1024).toFixed(1)}MB</span>
        </span>
      `).join('')}
    </div>
    <div class="doc-viewer-wrap">
      <div class="doc-preview">
        <div class="doc-preview-header">
          <span id="doc-active-name" style="font-weight:600">Seleccioná un archivo</span>
          <span style="margin-left:auto;display:flex;gap:6px">
            <button type="button" class="ghost" id="doc-download">Descargar</button>
          </span>
        </div>
        <div class="doc-preview-body" id="doc-preview-body"><div class="muted" style="padding:16px">Click un archivo arriba para previsualizar.</div></div>
      </div>
      <div class="comments-panel" id="comments-panel">
        <div class="comments-header"><span>Comentarios</span><span class="muted" id="comments-count" style="font-size:12px"></span></div>
        <div class="comments-list" id="comments-list"><div class="muted" style="padding:16px;font-size:12.5px">Seleccioná un archivo para ver el hilo.</div></div>
      </div>
    </div>
  `;

  let activeFileId = null;
  let cachedUrl = null;

  async function selectFile(fileId, mime, name) {
    activeFileId = fileId;
    host.querySelectorAll('.file-pill').forEach((p) => p.classList.toggle('active', p.dataset.id === fileId));
    document.querySelector('#doc-active-name').textContent = name;
    const body = document.querySelector('#doc-preview-body');
    body.innerHTML = '<div class="muted" style="padding:16px">Cargando preview…</div>';
    try {
      const signed = await fetchSignedUrl(fileId, { download: false });
      cachedUrl = signed.url;
      if (mime === 'application/pdf') {
        body.innerHTML = '';
        await renderPdf(body, signed.url);
      } else if (mime === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' || name.toLowerCase().endsWith('.docx')) {
        await renderDocx(body, signed.url);
      } else if (mime?.startsWith('image/')) {
        body.innerHTML = `<img src="${signed.url}" style="max-width:100%;border-radius:8px">`;
      } else {
        body.innerHTML = `<div class="muted" style="padding:16px">Preview no soportado para ${mime}. <a href="${signed.url}" target="_blank">Descargar</a></div>`;
      }
    } catch (e) {
      body.innerHTML = `<div class="err">Error: ${e.message}</div>`;
    }
    await loadComments(fileId, runId);
  }

  document.querySelector('#doc-download').addEventListener('click', async () => {
    if (!activeFileId) return;
    const signed = await fetchSignedUrl(activeFileId, { download: true });
    const a = document.createElement('a'); a.href = signed.url; a.download = signed.filename ?? 'archivo'; a.click();
  });

  host.querySelectorAll('.file-pill').forEach((p) => p.addEventListener('click', () => selectFile(p.dataset.id, p.dataset.mime, p.dataset.name)));
  // Auto-select main file.
  const main = sorted.find((f) => f.kind === 'main') ?? sorted[0];
  if (main) selectFile(main.id, main.mime_type, main.filename);
}

const canCommentRoles = () => hasRole('admin') || hasRole('aprobador');

async function loadComments(fileId, runId) {
  const listEl = document.querySelector('#comments-list');
  const countEl = document.querySelector('#comments-count');
  listEl.innerHTML = '<div class="muted" style="padding:16px;font-size:12.5px">Cargando…</div>';
  const r = await fetch(`/api/comments?file_id=${fileId}`, { credentials: 'include' });
  if (!r.ok) { listEl.innerHTML = `<div class="err">${await r.text()}</div>`; return; }
  const comments = await r.json();
  countEl.textContent = comments.length ? `${comments.length} comentarios` : '';
  if (!comments.length) {
    listEl.innerHTML = '<div class="muted" style="padding:16px;font-size:12.5px">Aún sin comentarios. Iniciá el hilo abajo.</div>';
  } else {
    const meEmail = window.__me?.email;
    listEl.innerHTML = comments.map((c) => `
      <div class="comment ${c.author_email === meEmail ? 'is-mine' : ''}">
        <div class="comment-meta">
          <span class="comment-author">${c.author_email}</span>
          ${c.page_number ? `<span class="comment-page">p.${c.page_number}</span>` : ''}
          <span class="ts" style="margin-left:auto">${dt(c.created_at)}</span>
        </div>
        <div class="comment-body">${highlightMentions(escapeHtml(c.body))}</div>
      </div>
    `).join('');
  }
  renderComposer(fileId, runId);
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function highlightMentions(html) {
  return html.replace(/@([a-z0-9._-]+@[a-z0-9.-]+\.[a-z]{2,})/gi, '<span class="mention">@$1</span>');
}

function renderComposer(fileId, runId) {
  const panel = document.querySelector('#comments-panel');
  if (!canCommentRoles()) {
    panel.querySelector('.comment-composer')?.remove();
    panel.insertAdjacentHTML('beforeend', '<div class="comment-composer"><div class="muted" style="font-size:12px">Solo aprobadores pueden comentar este flujo.</div></div>');
    return;
  }
  panel.querySelector('.comment-composer')?.remove();
  panel.insertAdjacentHTML('beforeend', `
    <div class="comment-composer">
      <textarea id="composer-body" placeholder="Escribí tu comentario. Usá @ para mencionar."></textarea>
      <div class="composer-row">
        <input type="number" id="composer-page" min="1" placeholder="p.">
        <button class="primary" id="composer-send" type="button" style="margin-left:auto;padding:8px 14px;font-size:13px">Comentar</button>
      </div>
    </div>
  `);
  wireMentionAutocomplete(document.querySelector('#composer-body'));
  document.querySelector('#composer-send').addEventListener('click', async () => {
    const body = document.querySelector('#composer-body').value.trim();
    const page = Number(document.querySelector('#composer-page').value) || null;
    if (!body) return;
    const r = await fetch('/api/comments', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file_id: fileId, workflow_run_id: runId, body, page_number: page }),
    });
    if (!r.ok) { alert(await r.text()); return; }
    document.querySelector('#composer-body').value = '';
    document.querySelector('#composer-page').value = '';
    loadComments(fileId, runId);
  });
}

function wireMentionAutocomplete(textarea) {
  let popup = null; let focusIdx = 0; let items = [];

  function close() { popup?.remove(); popup = null; items = []; focusIdx = 0; }
  async function showAt(query) {
    const r = await fetch(`/api/users/mentions?q=${encodeURIComponent(query)}`, { credentials: 'include' });
    items = r.ok ? await r.json() : [];
    if (!items.length) { close(); return; }
    if (!popup) {
      popup = document.createElement('div');
      popup.className = 'mention-popup';
      textarea.closest('.comment-composer').appendChild(popup);
    }
    popup.innerHTML = items.map((u, i) => `
      <div class="mention-item ${i === focusIdx ? 'focus' : ''}" data-email="${u.email}">
        <span>${u.display_name ?? u.email.split('@')[0]}</span>
        <span class="mention-roles">${(u.roles ?? []).join(', ')}</span>
      </div>
    `).join('');
    popup.querySelectorAll('.mention-item').forEach((el, i) => el.addEventListener('click', () => insert(items[i].email)));
  }

  function insert(email) {
    const v = textarea.value;
    const caret = textarea.selectionStart;
    const before = v.slice(0, caret);
    const after = v.slice(caret);
    const m = before.match(/@[^\s@]*$/);
    const start = m ? caret - m[0].length : caret;
    textarea.value = v.slice(0, start) + `@${email} ` + after;
    textarea.focus();
    const pos = start + email.length + 2;
    textarea.setSelectionRange(pos, pos);
    close();
  }

  textarea.addEventListener('input', () => {
    const caret = textarea.selectionStart;
    const before = textarea.value.slice(0, caret);
    const m = before.match(/@([^\s@]*)$/);
    if (m) showAt(m[1]);
    else close();
  });
  textarea.addEventListener('keydown', (e) => {
    if (!popup) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); focusIdx = Math.min(items.length - 1, focusIdx + 1); showAt(''); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); focusIdx = Math.max(0, focusIdx - 1); showAt(''); }
    else if (e.key === 'Enter' && items[focusIdx]) { e.preventDefault(); insert(items[focusIdx].email); }
    else if (e.key === 'Escape') close();
  });
  textarea.addEventListener('blur', () => setTimeout(close, 200));
}

// ─── Notif bell ──────────────────────────────────────────────────────────
async function refreshNotifBadge() {
  if (!window.__me) return;
  try {
    const r = await fetch('/api/notifications?limit=10', { credentials: 'include' });
    if (!r.ok) return;
    const { items, unread_count } = await r.json();
    window.__notifications = items;
    const bell = document.querySelector('#notif-bell-badge');
    if (bell) {
      bell.textContent = unread_count > 0 ? (unread_count > 99 ? '99+' : String(unread_count)) : '';
      bell.style.display = unread_count > 0 ? '' : 'none';
    }
  } catch {}
}

function mountNotifBell() {
  if (document.querySelector('#notif-bell')) return;
  const aside = document.querySelector('aside .nav-bottom');
  if (!aside) return;
  const row = aside.querySelector('.user-row');
  row?.insertAdjacentHTML('afterbegin', `
    <button id="notif-bell" class="notif-bell" title="Notificaciones" type="button" style="border:none;cursor:pointer">
      🔔<span id="notif-bell-badge" class="badge" style="display:none">0</span>
    </button>
  `);
  document.querySelector('#notif-bell').addEventListener('click', toggleNotifPopup);
}

function toggleNotifPopup() {
  let pop = document.querySelector('#notif-popup');
  if (pop) { pop.remove(); return; }
  const items = window.__notifications ?? [];
  pop = document.createElement('div');
  pop.id = 'notif-popup';
  pop.className = 'notif-popup';
  pop.innerHTML = `
    <div class="notif-popup-header">
      <span>Notificaciones</span>
      <button type="button" class="ghost" id="notif-mark-all" style="padding:2px 8px;font-size:11px">Marcar leídas</button>
    </div>
    <div class="notif-popup-list">
      ${items.length ? items.map((n) => `
        <div class="notif-item ${n.read_at ? '' : 'unread'}" data-id="${n.id}" data-run="${n.workflow_run_id ?? ''}" data-file="${n.payload?.file_id ?? ''}">
          <div><span class="notif-author">${n.payload?.author ?? '—'}</span> te mencionó${n.payload?.page ? ` · p.${n.payload.page}` : ''}</div>
          <div class="muted" style="font-size:12px;margin-top:2px">${(n.payload?.body ?? '').slice(0, 100)}</div>
          <div class="notif-time">${dt(n.created_at)}</div>
        </div>
      `).join('') : '<div class="muted" style="padding:20px;text-align:center;font-size:12.5px">Sin notificaciones</div>'}
    </div>
  `;
  document.body.appendChild(pop);
  pop.querySelector('#notif-mark-all').addEventListener('click', async () => {
    await fetch('/api/notifications/read', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ all: true }),
    });
    pop.remove();
    refreshNotifBadge();
  });
  pop.querySelectorAll('.notif-item').forEach((el) => el.addEventListener('click', async () => {
    await fetch('/api/notifications/read', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids: [el.dataset.id] }),
    });
    const runId = el.dataset.run; const fileId = el.dataset.file;
    location.hash = runId ? `workflows/${runId}${fileId ? `?file=${fileId}` : ''}` : 'dashboard';
    pop.remove();
    refreshNotifBadge();
  }));
}

// Init: chequear sesión via cookie, montar bell, poll notif cada 60s.
checkAuth().then(() => {
  if (window.__me) {
    mountNotifBell();
    refreshNotifBadge();
    setInterval(refreshNotifBadge, 60000);
  }
});
