<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard — Global66 Contratos</title>
<style>
  body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, #f5f7fe, #fff); font-family: 'Inter', system-ui, sans-serif; color: #132046; display: grid; place-items: center; padding: 40px 20px }
  .center { text-align: center; max-width: 480px }
  .logo-mark { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, #3F5EDF, #33d9b2); display: inline-flex; align-items: center; justify-content: center; font-weight: 800; color: white; font-size: 28px; box-shadow: 0 8px 24px rgba(31,73,182,0.25); margin-bottom: 24px }
  h1 { font-family: 'Montserrat', sans-serif; font-size: 32px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px }
  p { color: #565656; margin-bottom: 32px }
  a { display: inline-block; background: #1F49B6; color: white; padding: 12px 24px; border-radius: 999px; text-decoration: none; font-weight: 600; box-shadow: 0 4px 14px rgba(31,73,182,0.3) }
  a:hover { background: #003eea }
</style>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="center">
  <div class="logo-mark">G</div>
  <h1>Plataforma Contratos</h1>
  <p>Sistema interno de gestión de contratos con proveedores de Global66</p>
  <a href="/admin">Entrar a la plataforma →</a>
</div>
</body>
</html>
